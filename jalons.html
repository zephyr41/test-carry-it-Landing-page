<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carry It — Focus Trajectoire</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --bg: #080809;
            --text: #FFFDF6;
            --dim: #929292;
            --accent: #EE4408;
            --confirm: #0A2A53;
            --secondary: #F34C0A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 500px; }

        /* Navbar */
        .navbar-top {
            margin-bottom: 60px;
        }

        .navbar-back {
            color: var(--text);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        /* Victoire : Le point de départ (Haut) */
        .victory-node {
            border-left: 2px solid var(--secondary);
            padding: 0 0 40px 24px;
            position: relative;
            margin-bottom: 40px;
        }

        .victory-node::before {
            content: '';
            position: absolute;
            left: -9px;
            top: 0;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--secondary);
            box-shadow: 0 0 15px var(--secondary);
        }

        .victory-label {
            color: var(--secondary);
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .victory-title {
            font-size: 1.5rem;
            font-weight: 900;
            margin-top: 4px;
            line-height: 1.3;
        }

        /* Chat IA : Le guide */
        .ai-guide {
            margin: 40px 0;
            font-size: 1.1rem;
            line-height: 1.6;
            font-weight: 500;
            color: var(--text);
        }

        /* La carte active : Focus unique */
        .step-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 24px;
        }

        .input-label {
            display: block;
            color: var(--dim);
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        input, textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            color: var(--text);
            padding: 12px 0;
            font-size: 1rem;
            margin-bottom: 24px;
            outline: none;
            font-family: inherit;
            resize: none;
        }

        input:focus, textarea:focus {
            border-bottom-color: var(--accent);
        }

        .btn-main {
            background: var(--accent);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 12px;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .btn-main:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn-ai {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-ai:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Timeline discrète */
        .steps-left {
            margin-top: 40px;
            text-align: center;
            color: var(--dim);
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .hidden { display: none !important; }

        .ai-typing {
            color: var(--accent);
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 10px;
            animation: pulse 1s infinite;
            display: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .final-screen {
            text-align: center;
            padding-top: 40px;
        }

        .final-screen h2 {
            color: var(--confirm);
            font-size: 2rem;
            margin-bottom: 20px;
            font-weight: 900;
        }

        .final-screen p {
            color: var(--dim);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        @media (max-width: 600px) {
            body { padding: 20px; }
            .victory-title { font-size: 1.2rem; }
            .ai-guide { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <!-- Navbar -->
    <div class="navbar-top">
        <a href="dashboard.html" class="navbar-back">← Retour</a>
    </div>

    <!-- 1. La Victoire (Objectif Final) -->
    <div class="victory-node">
        <div class="victory-label">Objectif Atteint</div>
        <div class="victory-title" id="goal-title">Chargement...</div>
    </div>

    <!-- 2. Guide IA -->
    <div class="ai-guide" id="ai-question">
        Analyse de votre objectif...
    </div>

    <!-- 3. Formulaire Minimaliste -->
    <div class="step-card">
        <div class="ai-typing" id="ai-loading">✨ L'IA déconstruit votre succès...</div>

        <label class="input-label">Titre de cette étape</label>
        <input type="text" id="input-titre" placeholder="Ex: Finaliser mon offre">

        <label class="input-label">Preuve de succès (KPI)</label>
        <input type="text" id="input-kpi" placeholder="Ex: 10 clients satisfaits">

        <label class="input-label">Plan d'action</label>
        <textarea id="input-desc" placeholder="Détails de ce qui doit être fait" rows="3"></textarea>

        <button class="btn-main" onclick="nextStep()">Valider cette étape</button>
        <button class="btn-ai" onclick="askAI()">✨ Laisser l'IA suggérer</button>
    </div>

    <!-- 4. Footer progression -->
    <div class="steps-left" id="progression">
        ÉTAPE 1 SUR 3
    </div>
</div>

<!-- Écran Final -->
<div class="container hidden" id="final">
    <div class="final-screen">
        <h2>Trajectoire Prête</h2>
        <p>Votre ambition est découpée.<br>Le chemin est sécurisé.</p>
        <button class="btn-main" onclick="location.href='dashboard.html'">Retour au tableau de bord</button>
    </div>
</div>

<script>
    let milestones = [];
    let currentObjectif = null;
    let currentStepIndex = 0;

    const questions = [
        "Pour réussir {objectif}, quelle est la toute dernière étape juste avant la ligne d'arrivée ?",
        "Pour que cette étape soit possible, que devez-vous avoir accompli au milieu du projet ?",
        "Pour ne pas rester dans le rêve, quelle est la première action concrète à valider ce mois-ci ?"
    ];

    const aiSuggestions = [
        { titre: "Validation finale", kpi: "100% prêt et approuvé", desc: "Vérifier tous les détails et obtenir les validations finales" },
        { titre: "Point de contrôle majeur", kpi: "50% des objectifs atteints", desc: "Évaluer la progression et ajuster la stratégie si nécessaire" },
        { titre: "Lancer le projet", kpi: "Première étape validée", desc: "Commencer immédiatement avec la première action" }
    ];

    function loadData() {
        const allObjectifs = JSON.parse(localStorage.getItem('carryItAllObjectifs') || '[]');
        if (allObjectifs.length === 0) {
            window.location.href = 'objectif.html';
            return;
        }

        currentObjectif = allObjectifs[allObjectifs.length - 1];
        milestones = JSON.parse(localStorage.getItem('carryItMilestones') || '[]');

        if (milestones.length === 0) {
            milestones = [{ id: 'm_' + Date.now(), titre: '', kpi: '', desc: '', progression: 100 }];
        }

        // Trier par progression DÉCROISSANTE (du futur au passé)
        milestones.sort((a, b) => (b.progression || 0) - (a.progression || 0));

        init();
    }

    function init() {
        document.getElementById('goal-title').innerText = currentObjectif.titre;
        updateAIQuestion();
        loadMilestoneData();
    }

    function updateAIQuestion() {
        const question = questions[currentStepIndex]
            .replace('{objectif}', currentObjectif.titre);
        document.getElementById('ai-question').innerText = question;
        document.getElementById('progression').innerText = `ÉTAPE ${currentStepIndex + 1} SUR ${milestones.length}`;
    }

    function loadMilestoneData() {
        const milestone = milestones[currentStepIndex];
        if (milestone) {
            document.getElementById('input-titre').value = milestone.titre || '';
            document.getElementById('input-kpi').value = milestone.kpi || '';
            document.getElementById('input-desc').value = milestone.desc || '';
        }
    }

    function askAI() {
        const loading = document.getElementById('ai-loading');
        loading.style.display = 'block';

        setTimeout(() => {
            const suggestion = aiSuggestions[Math.min(currentStepIndex, aiSuggestions.length - 1)];
            document.getElementById('input-titre').value = suggestion.titre;
            document.getElementById('input-kpi').value = suggestion.kpi;
            document.getElementById('input-desc').value = suggestion.desc;
            loading.style.display = 'none';
        }, 1200);
    }

    function nextStep() {
        // Sauvegarder les données
        const milestone = milestones[currentStepIndex];
        if (milestone) {
            milestone.titre = document.getElementById('input-titre').value;
            milestone.kpi = document.getElementById('input-kpi').value;
            milestone.desc = document.getElementById('input-desc').value;
        }
        localStorage.setItem('carryItMilestones', JSON.stringify(milestones));

        currentStepIndex++;

        if (currentStepIndex >= milestones.length) {
            // Montrer l'écran final
            document.getElementById('app').classList.add('hidden');
            document.getElementById('final').classList.remove('hidden');
        } else {
            // Charger l'étape suivante
            updateAIQuestion();
            loadMilestoneData();
            // Reset inputs pour animation
            document.getElementById('input-titre').value = '';
            document.getElementById('input-kpi').value = '';
            document.getElementById('input-desc').value = '';
            setTimeout(() => loadMilestoneData(), 100);
        }
    }

    // Init
    loadData();
</script>

</body>
</html>

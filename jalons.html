<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carry It — Rétroplanning</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* === DESIGN SYSTEM === */
        :root {
            --bg: #080809;
            --surface: rgba(28, 28, 30, 0.6);
            --surface-dark: #0D1D32;
            --border: rgba(255, 255, 255, 0.1);
            --text-primary: #FFFDF6;
            --text-secondary: #A8A8A8;
            --text-tertiary: #86868B;
            --accent: #EE4408;

            --space-xs: 8px;
            --space-sm: 16px;
            --space-md: 24px;
            --space-lg: 32px;
            --space-xl: 48px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 16px;
            line-height: 1.5;
        }

        /* === LAYOUT === */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: var(--space-lg) var(--space-md);
        }

        /* === HEADER === */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-xl);
            padding-bottom: var(--space-lg);
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .btn-back {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-back:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* === FOUNDATION SECTION === */
        .foundation-section {
            margin-bottom: var(--space-xl);
        }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: var(--space-sm);
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: var(--space-sm);
        }

        .section-date {
            font-size: 14px;
            color: var(--accent);
            margin-bottom: var(--space-lg);
        }

        /* === CARD === */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 0;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: border-color 0.3s, background-color 0.3s;
        }

        .card:focus-within {
            border-color: rgba(255, 255, 255, 0.3);
            background-color: rgba(35, 35, 37, 0.8);
        }

        .foundation-card {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* === FIELDS === */
        .field {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 28px 24px 28px 24px;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .field:first-child {
            padding-top: 32px;
        }

        .field:last-child {
            border-bottom: none;
            padding-bottom: 32px;
        }

        .field-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-tertiary);
            display: block;
            margin: 0;
            opacity: 0.8;
        }

        .field-number {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-tertiary);
            opacity: 0.5;
            margin-bottom: 4px;
        }

        .field-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.3;
            word-break: break-word;
        }

        .field-value.accent {
            color: var(--accent);
            font-size: 24px;
        }

        .field-value.text-block {
            font-size: 15px;
            font-weight: 400;
            line-height: 1.7;
            color: var(--text-secondary);
        }

        /* === LOADING STATE === */
        .loading {
            opacity: 0.5;
        }

        .error {
            background: rgba(255, 59, 48, 0.1);
            border-color: rgba(255, 59, 48, 0.3);
            color: #FF3B30;
            padding: var(--space-md);
            border-radius: 12px;
            margin: var(--space-lg) 0;
        }

        /* === GPT CTA SECTION === */
        .gpt-cta-section {
            margin-top: var(--space-xl);
            margin-bottom: var(--space-xl);
        }

        .gpt-cta-card {
            background: linear-gradient(135deg, rgba(238, 68, 8, 0.08), rgba(238, 68, 8, 0.03));
            border-color: rgba(238, 68, 8, 0.2);
        }

        .gpt-cta-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: var(--space-lg) var(--space-md);
            gap: var(--space-md);
        }

        .gpt-icon {
            font-size: 48px;
            display: block;
        }

        .gpt-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
        }

        .gpt-hint {
            font-size: 14px;
            color: var(--text-secondary);
            margin: 0;
            max-width: 400px;
            line-height: 1.5;
        }

        .btn-cta {
            background-color: var(--accent);
            color: white;
            border: none;
            font-size: 16px;
            font-weight: 600;
            padding: 14px 32px;
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(238, 68, 8, 0.25);
        }

        .btn-cta:hover {
            background-color: #ff5d1a;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(238, 68, 8, 0.35);
        }

        .btn-cta:active {
            transform: translateY(0);
        }

        .btn-cta:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .gpt-cta-card.gpt-opened::after {
            content: '✅ GPT ouvert';
            position: absolute;
            top: 16px;
            right: 16px;
            font-size: 12px;
            color: var(--accent);
            font-weight: 600;
        }

        /* === WIZARD SECTION === */
        .wizard-section {
            margin-top: var(--space-xl);
        }

        .btn-add-milestone {
            display: block;
            width: 100%;
            background: transparent;
            border: 1px dashed var(--border);
            color: var(--text-secondary);
            padding: var(--space-md) var(--space-lg);
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .btn-add-milestone:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(238, 68, 8, 0.05);
        }

        .wizard-container {
            margin-top: var(--space-lg);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .wizard-card {
            display: flex;
            flex-direction: column;
            gap: var(--space-lg);
            padding: var(--space-lg) var(--space-md);
        }

        .wizard-header {
            display: flex;
            align-items: center;
            gap: var(--space-md);
        }

        .wizard-step {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            min-width: 40px;
        }

        .wizard-progress {
            flex: 1;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 1px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 25%;
            transition: width 0.3s ease;
        }

        .wizard-content {
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
        }

        .wizard-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .wizard-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 18px;
            padding: var(--space-sm) 0;
            outline: none;
            transition: border-color 0.2s;
        }

        .wizard-input:focus {
            border-bottom-color: var(--accent);
        }

        .wizard-input::placeholder {
            color: var(--text-tertiary);
        }

        .wizard-hint {
            font-size: 12px;
            color: var(--text-tertiary);
            min-height: 16px;
        }

        .wizard-actions {
            display: flex;
            gap: var(--space-sm);
            justify-content: flex-end;
            margin-top: var(--space-md);
            border-top: 1px solid var(--border);
            padding-top: var(--space-md);
        }

        .btn-wizard-back {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 10px 24px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-wizard-back:hover {
            border-color: var(--text-secondary);
            color: var(--text-primary);
        }

        .btn-wizard-next {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-wizard-next:hover:not(:disabled) {
            background-color: #ff5d1a;
            transform: translateY(-2px);
        }

        .btn-wizard-next:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* === TIMELINE SECTION === */
        .timeline-section {
            margin-top: var(--space-xl);
            margin-bottom: var(--space-xl);
        }

        .timeline-container {
            position: relative;
            padding-left: 60px;
        }

        .timeline-container::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 8px;
            bottom: 0;
            width: 1px;
            background: linear-gradient(180deg, var(--accent), rgba(238, 68, 8, 0.1));
        }

        .timeline-item {
            position: relative;
            margin-bottom: 48px;
            display: flex;
            align-items: flex-start;
            gap: var(--space-lg);
        }

        .timeline-item:last-child {
            margin-bottom: 0;
        }

        .timeline-dot {
            position: absolute;
            left: -53px;
            top: 8px;
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 0 6px rgba(238, 68, 8, 0.2);
            z-index: 2;
        }

        .timeline-item.timeline-today .timeline-dot {
            width: 8px;
            height: 8px;
            left: -51px;
            background: var(--text-secondary);
            box-shadow: 0 0 0 6px rgba(168, 168, 168, 0.15);
        }

        .timeline-date {
            position: absolute;
            left: -180px;
            top: 0;
            font-size: 12px;
            color: var(--text-tertiary);
            text-align: right;
            width: 120px;
            font-weight: 500;
        }

        .timeline-content {
            flex: 1;
            padding-top: 2px;
        }

        .timeline-card {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .timeline-card.foundation-card {
            opacity: 1;
        }

        .timeline-card.milestone-card {
            opacity: 1;
        }

        .timeline-card.today-card {
            min-height: auto;
            padding: var(--space-lg) var(--space-md);
        }

        .today-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .today-hint {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        @media (max-width: 768px) {
            .timeline-container {
                padding-left: 40px;
            }

            .timeline-container::before {
                left: 4px;
            }

            .timeline-dot {
                left: -34px;
                width: 8px;
                height: 8px;
                box-shadow: 0 0 0 4px rgba(238, 68, 8, 0.2);
            }

            .timeline-item.timeline-today .timeline-dot {
                left: -32px;
            }

            .timeline-date {
                position: relative;
                left: 0;
                top: 0;
                text-align: left;
                width: 100%;
                margin-bottom: 8px;
                font-size: 11px;
            }

            .timeline-item {
                margin-bottom: 32px;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <h1>Carry It — Rétroplanning</h1>
            <button class="btn-back" onclick="location.href='dashboard.html'" title="Retour">
                <i class="ri-arrow-left-line"></i>
            </button>
        </div>

        <!-- FOUNDATION SECTION -->
        <div class="foundation-section" id="foundationSection">
            <div class="section-label">🎯 Fondation — Objectif Final</div>
            <div class="section-title" id="foundationTitle">...</div>
            <div class="section-date" id="foundationDate">📅 ...</div>

            <div class="card foundation-card">
                <div class="field">
                    <div class="field-number">01 //</div>
                    <div class="field-label">Nom du Jalon</div>
                    <div class="field-value" id="fieldObjectif">...</div>
                </div>
                <div class="field">
                    <div class="field-number">02 //</div>
                    <div class="field-label">Le KPI (Mesurable)</div>
                    <div class="field-value accent" id="fieldMesurable">...</div>
                </div>
                <div class="field">
                    <div class="field-number">03 //</div>
                    <div class="field-label">Objectif Concret</div>
                    <div class="field-value text-block" id="fieldSpecifique">...</div>
                </div>
            </div>
        </div>

        <!-- ERROR STATE (hidden by default) -->
        <div id="errorMessage" class="error" style="display: none;"></div>

        <!-- GPT CTA SECTION -->
        <div class="gpt-cta-section">
            <div class="card gpt-cta-card">
                <div class="gpt-cta-content">
                    <div class="gpt-icon">🤖</div>
                    <h3 class="gpt-title">Besoin d'aide pour définir vos jalons ?</h3>
                    <p class="gpt-hint">Le GPT vous aidera à découper votre objectif en étapes claires et mesurables.</p>
                    <button class="btn-cta" onclick="openGPT()" id="btnOpenGPT">
                        Ouvrir le GPT Custom
                    </button>
                </div>
            </div>
        </div>

        <!-- TIMELINE SECTION -->
        <div class="timeline-section" id="timelineSection" style="display: none;">
            <div class="timeline-container" id="timelineContainer">
                <!-- Timeline items will be generated here by JavaScript -->
            </div>
        </div>

        <!-- WIZARD SECTION -->
        <div class="wizard-section" id="wizardSection" style="display: none;">
            <button class="btn-add-milestone" id="btnAddMilestone" onclick="startWizard()">
                + Ajouter un jalon intermédiaire
            </button>

            <div class="wizard-container" id="wizardContainer" style="display: none;">
                <div class="card wizard-card">
                    <div class="wizard-header">
                        <div class="wizard-step" id="wizardStep">1/4</div>
                        <div class="wizard-progress">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                    </div>

                    <div class="wizard-content">
                        <div class="wizard-label" id="wizardLabel">Titre du jalon</div>
                        <input
                            type="text"
                            class="wizard-input"
                            id="wizardInput"
                            placeholder="Ex: Valider le MVP"
                            onkeyup="checkWizardInput(event)"
                        >
                        <div class="wizard-hint" id="wizardHint"></div>
                    </div>

                    <div class="wizard-actions">
                        <button class="btn-wizard-back" onclick="cancelWizard()" id="btnWizardCancel">
                            Annuler
                        </button>
                        <button class="btn-wizard-next" id="btnWizardNext" onclick="nextWizardStep()" disabled>
                            Continuer
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GPT_URL = 'https://chatgpt.com/g/g-692ca373fe108191a36c15ad1250a4a8-carry-it-ai';

        // Open GPT Custom
        function openGPT() {
            window.open(GPT_URL, '_blank');
            const btn = document.getElementById('btnOpenGPT');
            const card = document.querySelector('.gpt-cta-card');
            if (card) {
                card.classList.add('gpt-opened');
            }
        }

        // Load data from localStorage
        function initializeFoundation() {
            try {
                // Load objectifs and smart data
                const allObjectifs = JSON.parse(localStorage.getItem('carryItAllObjectifs') || '[]');
                if (allObjectifs.length === 0) {
                    window.location.href = 'objectif.html';
                    return;
                }

                const currentObjectif = allObjectifs[allObjectifs.length - 1];
                const smartData = JSON.parse(localStorage.getItem('carryItObjectifSMART') || '{}');

                // Validate required fields
                if (!currentObjectif.titre || !smartData.temporel) {
                    showError('Données SMART incomplètes. Veuillez retourner à l\'étape objectif.');
                    return;
                }

                // Format deadline
                const deadline = new Date(smartData.temporel);
                const dateStr = deadline.toLocaleDateString('fr-FR', {
                    day: 'numeric',
                    month: 'long',
                    year: 'numeric'
                });

                // Populate foundation section
                document.getElementById('foundationTitle').textContent = currentObjectif.titre;
                document.getElementById('foundationDate').textContent = `📅 ${dateStr}`;
                document.getElementById('fieldObjectif').textContent = currentObjectif.titre;
                document.getElementById('fieldSpecifique').textContent = smartData.specifique || '(Non défini)';
                document.getElementById('fieldMesurable').textContent = smartData.mesurable || '(Non défini)';

                // Remove loading state
                document.getElementById('foundationSection').classList.remove('loading');

            } catch (error) {
                console.error('Erreur lors du chargement:', error);
                showError('Une erreur est survenue. Veuillez rafraîchir la page.');
            }
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            document.getElementById('foundationSection').style.display = 'none';
        }

        // ===== WIZARD FUNCTIONS =====
        let wizardData = { titre: '', kpi: '', contexte: '', date: null };
        let wizardCurrentStep = 0;

        function startWizard() {
            wizardData = { titre: '', kpi: '', contexte: '', date: null };
            wizardCurrentStep = 0;
            document.getElementById('btnAddMilestone').style.display = 'none';
            document.getElementById('wizardContainer').style.display = 'block';
            document.getElementById('wizardInput').focus();
        }

        function cancelWizard() {
            document.getElementById('btnAddMilestone').style.display = 'block';
            document.getElementById('wizardContainer').style.display = 'none';
            document.getElementById('wizardInput').value = '';
            wizardCurrentStep = 0;
            wizardData = { titre: '', kpi: '', contexte: '', date: null };
        }

        function checkWizardInput(e) {
            const input = e.target;
            const btn = document.getElementById('btnWizardNext');
            btn.disabled = input.value.trim() === '';

            if (e.key === 'Enter' && !btn.disabled) {
                nextWizardStep();
            }
        }

        function nextWizardStep() {
            const input = document.getElementById('wizardInput');
            const value = input.value.trim();

            if (!value) return;

            // Save current step
            if (wizardCurrentStep === 0) wizardData.titre = value;
            else if (wizardCurrentStep === 1) wizardData.kpi = value;
            else if (wizardCurrentStep === 2) wizardData.contexte = value;

            wizardCurrentStep++;

            if (wizardCurrentStep < 3) {
                updateWizardStep();
            } else if (wizardCurrentStep === 3) {
                showDatePicker();
            } else {
                saveMilestone();
            }
        }

        function updateWizardStep() {
            const labels = ['Titre du jalon', 'KPI mesurable', 'Contexte / Spécifique'];
            const placeholders = [
                'Ex: Valider le MVP',
                'Ex: 50 utilisateurs inscrits',
                'Décris précisément ce que c\'est...'
            ];
            const hints = [
                'Donne un nom court à cette étape de ton projet',
                'Quel est l\'indicateur qui mesure cette étape ?',
                'Ajoute du contexte pour bien comprendre cette étape'
            ];

            const progressPercent = ((wizardCurrentStep + 1) / 4) * 100;
            document.getElementById('progressFill').style.width = `${progressPercent}%`;
            document.getElementById('wizardStep').textContent = `${wizardCurrentStep + 1}/4`;
            document.getElementById('wizardLabel').textContent = labels[wizardCurrentStep];
            document.getElementById('wizardInput').value = '';
            document.getElementById('wizardInput').placeholder = placeholders[wizardCurrentStep];
            document.getElementById('wizardHint').textContent = hints[wizardCurrentStep];
            document.getElementById('btnWizardNext').disabled = true;
            document.getElementById('wizardInput').focus();
        }

        function showDatePicker() {
            const progressPercent = 100;
            document.getElementById('progressFill').style.width = `${progressPercent}%`;
            document.getElementById('wizardStep').textContent = `4/4`;
            document.getElementById('wizardLabel').textContent = 'Date cible';
            document.getElementById('wizardHint').textContent = 'Quand veux-tu atteindre ce jalon ?';

            const input = document.getElementById('wizardInput');
            input.type = 'date';
            input.value = '';
            input.style.fontSize = '16px';
            input.focus();

            // Update button behavior for date
            input.onchange = function() {
                document.getElementById('btnWizardNext').disabled = !input.value;
            };
        }

        function saveMilestone() {
            const dateInput = document.getElementById('wizardInput');
            wizardData.date = dateInput.value;

            if (!wizardData.titre || !wizardData.kpi || !wizardData.contexte || !wizardData.date) {
                alert('Tous les champs sont obligatoires');
                return;
            }

            // Save to localStorage
            const milestones = JSON.parse(localStorage.getItem('carryItMilestones') || '[]');
            const newMilestone = {
                id: Date.now().toString(),
                titre: wizardData.titre,
                kpi: wizardData.kpi,
                contexte: wizardData.contexte,
                dateCible: wizardData.date,
                ordre: milestones.length + 1
            };

            milestones.push(newMilestone);
            localStorage.setItem('carryItMilestones', JSON.stringify(milestones));

            // Reset and show timeline
            cancelWizard();
            location.reload(); // Reload to display new milestone
        }

        // ===== TIMELINE RENDERING =====
        function renderTimeline() {
            try {
                const allObjectifs = JSON.parse(localStorage.getItem('carryItAllObjectifs') || '[]');
                const smartData = JSON.parse(localStorage.getItem('carryItObjectifSMART') || '{}');
                const milestones = JSON.parse(localStorage.getItem('carryItMilestones') || '[]');

                if (allObjectifs.length === 0) return;

                const currentObjectif = allObjectifs[allObjectifs.length - 1];
                const timelineContainer = document.getElementById('timelineContainer');
                timelineContainer.innerHTML = '';

                // 1. Add Foundation (Objectif Final)
                const foundationDeadline = new Date(smartData.temporel);
                const foundationItem = createTimelineItem({
                    titre: currentObjectif.titre,
                    kpi: smartData.mesurable || '(Non défini)',
                    contexte: smartData.specifique || '(Non défini)',
                    dateCible: smartData.temporel,
                    isFoundation: true
                });
                timelineContainer.appendChild(foundationItem);

                // 2. Sort and add milestones (by date, descending - future to past)
                const sortedMilestones = milestones.sort((a, b) => new Date(b.dateCible) - new Date(a.dateCible));
                sortedMilestones.forEach(milestone => {
                    const item = createTimelineItem({
                        titre: milestone.titre,
                        kpi: milestone.kpi,
                        contexte: milestone.contexte,
                        dateCible: milestone.dateCible,
                        isMilestone: true
                    });
                    timelineContainer.appendChild(item);
                });

                // 3. Add "Aujourd'hui"
                const today = new Date();
                const todayItem = createTimelineItem({
                    titre: 'Aujourd\'hui',
                    dateCible: today.toISOString().split('T')[0],
                    isToday: true
                });
                timelineContainer.appendChild(todayItem);

                document.getElementById('timelineSection').style.display = 'block';

            } catch (error) {
                console.error('Erreur lors du rendu timeline:', error);
            }
        }

        function createTimelineItem(data) {
            const item = document.createElement('div');
            item.className = 'timeline-item' + (data.isToday ? ' timeline-today' : '');

            const dateObj = new Date(data.dateCible);
            const dateStr = dateObj.toLocaleDateString('fr-FR', {
                day: 'numeric',
                month: 'short',
                year: 'numeric'
            });

            const dateEl = document.createElement('div');
            dateEl.className = 'timeline-date';
            dateEl.textContent = data.isToday ? 'Aujourd\'hui' : dateStr;

            const dot = document.createElement('div');
            dot.className = 'timeline-dot';

            const content = document.createElement('div');
            content.className = 'timeline-content';

            if (data.isToday) {
                const card = document.createElement('div');
                card.className = 'card timeline-card today-card';
                card.innerHTML = `
                    <div class="today-label">🏁 Point de départ</div>
                    <div class="today-hint">C'est maintenant que tu commences. À toi de jouer !</div>
                `;
                content.appendChild(card);
            } else {
                const card = document.createElement('div');
                card.className = 'card timeline-card' + (data.isFoundation ? ' foundation-card' : ' milestone-card');

                const titleEl = document.createElement('div');
                titleEl.className = 'field';
                titleEl.innerHTML = `
                    <div class="field-number">01 //</div>
                    <div class="field-label">Nom du Jalon</div>
                    <div class="field-value">${data.titre}</div>
                `;

                const kpiEl = document.createElement('div');
                kpiEl.className = 'field';
                kpiEl.innerHTML = `
                    <div class="field-number">02 //</div>
                    <div class="field-label">Le KPI (Mesurable)</div>
                    <div class="field-value accent">${data.kpi}</div>
                `;

                const contexteEl = document.createElement('div');
                contexteEl.className = 'field';
                contexteEl.innerHTML = `
                    <div class="field-number">03 //</div>
                    <div class="field-label">Objectif Concret</div>
                    <div class="field-value text-block">${data.contexte}</div>
                `;

                card.appendChild(titleEl);
                card.appendChild(kpiEl);
                card.appendChild(contexteEl);
                content.appendChild(card);
            }

            item.appendChild(dateEl);
            item.appendChild(dot);
            item.appendChild(content);
            return item;
        }

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', function() {
            initializeFoundation();
            renderTimeline();
            document.getElementById('wizardSection').style.display = 'block';
        });
    </script>
</body>
</html>

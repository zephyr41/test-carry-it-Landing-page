<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Carry It - Configuration des Jalons</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <style>
        @font-face {
            font-family: 'Rifton';
            src: url('Rifton Font/rifton-regular.otf') format('opentype');
        }

        :root {
            --bg-body: #000000;
            --bg-panel: #050507;
            --text-primary: #FFFFFF;
            --text-secondary: #AAAAAA;
            --accent: #FF5A1F;
            --surface-card: rgba(28, 28, 30, 0.75);
            --border-subtle: rgba(255, 255, 255, 0.1);
            --ease-ios: cubic-bezier(0.32, 0.72, 0, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-font-smoothing: antialiased; }

        body {
            background-color: var(--bg-body);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 72px;
            background: rgba(5, 5, 7, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-subtle);
            padding: 0 64px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.05);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s var(--ease-ios);
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .navbar-brand {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-family: 'Rifton', serif;
            opacity: 0.8;
            cursor: pointer;
            transition: opacity 0.2s var(--ease-ios);
        }

        .navbar-brand:hover {
            opacity: 1;
        }

        /* MAIN */
        main {
            height: calc(100vh - 72px);
            margin-top: 72px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* JALON DISPLAY CONTAINER */
        .jalon-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            width: 100%;
            height: 100%;
            padding: 40px;
        }

        .nav-btn {
            background: var(--surface-card);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s var(--ease-ios);
            font-size: 20px;
        }

        .nav-btn:hover:not(:disabled) {
            background: rgba(255, 90, 31, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* JALON DISPLAY */
        .jalon-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            flex: 1;
            max-width: 600px;
        }

        .jalon-badge {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--accent);
            color: #000;
            font-size: 32px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(255, 90, 31, 0.4);
        }

        .jalon-info {
            text-align: center;
        }

        .jalon-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .jalon-date {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .jalon-counter {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 24px;
        }

        /* CONTROLS */
        .controls {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 999;
        }

        .btn-control {
            background: var(--surface-card);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            padding: 12px 20px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s var(--ease-ios);
            backdrop-filter: blur(20px);
        }

        .btn-control:hover {
            background: rgba(255, 90, 31, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-control.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #000;
            font-weight: 600;
        }

        .btn-control.primary:hover {
            background: rgba(255, 90, 31, 0.9);
        }

        /* PROJECT TITLE */
        #projectTitle {
            padding: 20px 40px;
        }

        #projectTitle h2 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
        }

        /* TIMELINE MONTHS */
        .timeline-months {
            position: fixed;
            bottom: 120px;
            left: 0;
            right: 0;
            height: 80px;
            display: flex;
            align-items: center;
            padding: 0 40px;
            overflow-x: auto;
            overflow-y: hidden;
            gap: 16px;
            scrollbar-width: thin;
            scrollbar-color: var(--border-subtle) transparent;
        }

        .timeline-months::-webkit-scrollbar {
            height: 4px;
        }

        .timeline-months::-webkit-scrollbar-track {
            background: transparent;
        }

        .timeline-months::-webkit-scrollbar-thumb {
            background: var(--border-subtle);
            border-radius: 2px;
        }

        .month-marker {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            min-width: 60px;
            padding: 8px;
            border-radius: 12px;
            background: transparent;
            border: 1px solid var(--border-subtle);
            transition: all 0.3s var(--ease-ios);
            flex-shrink: 0;
        }

        .month-marker.active {
            background: rgba(255, 90, 31, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

        .month-number {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .month-marker.active .month-number {
            color: var(--accent);
        }

        .month-label {
            font-size: 10px;
            color: var(--text-secondary);
        }

        .month-marker.active .month-label {
            color: var(--accent);
        }

        /* MOBILE */
        @media (max-width: 1024px) {
            .navbar {
                padding: 0 20px;
            }

            .jalon-container {
                gap: 20px;
            }

            .nav-btn {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }

            .jalon-badge {
                width: 70px;
                height: 70px;
                font-size: 28px;
            }

            .jalon-title {
                font-size: 24px;
            }

            .jalon-date {
                font-size: 14px;
            }

            .timeline-months {
                bottom: 100px;
                padding: 0 20px;
                gap: 12px;
            }

            .month-marker {
                min-width: 50px;
                padding: 6px;
            }

            .month-number {
                font-size: 11px;
            }

            .month-label {
                font-size: 9px;
            }

            .controls {
                bottom: 20px;
            }

            .btn-control {
                padding: 10px 16px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <button class="btn-back" onclick="window.history.back()">
            <i class="ri-arrow-left-line"></i>
        </button>
        <span class="navbar-brand" onclick="window.location.href='index.html'">CARRY IT</span>
    </nav>

    <main>
        <div id="projectTitle" style="text-align: center; margin-bottom: 40px; margin-top: 20px;">
            <!-- Project title inserted here -->
        </div>

        <div class="jalon-container">
            <button class="nav-btn" id="prevBtn" title="Jalon précédent">
                <i class="ri-arrow-left-s-line"></i>
            </button>

            <div class="jalon-display" id="jalonDisplay">
                <!-- Jalon info displayed here -->
            </div>

            <button class="nav-btn" id="nextBtn" title="Jalon suivant">
                <i class="ri-arrow-right-s-line"></i>
            </button>
        </div>

        <div class="timeline-months" id="timelineMonths">
            <!-- Months generated dynamically -->
        </div>

        <div class="controls">
            <button class="btn-control primary" id="validateBtn">Valider mes Jalons</button>
        </div>
    </main>

    <script src="jalons.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Carry It - Timeline Stratégique</title>

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <!-- Font : Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            /* --- PALETTE DARK MODE --- */
            --bg-primary: #050505;     /* Noir très sombre */
            --bg-card: #1a1a1a;        /* Gris très sombre pour les cartes */

            --text-primary: #FFFFFF;   /* Blanc pur */
            --text-secondary: #A3A3A3; /* Gris clair */
            --text-muted: #808080;     /* Gris moyen */

            --accent: #FF4D00;         /* Orange moderne */
            --accent-light: rgba(255, 77, 0, 0.1);
            --accent-glow: rgba(255, 77, 0, 0.2);

            --border: #333333;         /* Gris très sombre */
            --border-hover: #4a4a4a;   /* Gris sombre hover */

            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.5);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.7);

            /* Safe Areas */
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        input, textarea { user-select: text; }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            font-weight: 400;
            line-height: 1.6;
        }

        /* --- NAVBAR --- */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 72px;
            background: rgba(5, 6, 8, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .navbar-logo {
            font-family: 'Rifton', serif;
            font-size: 20px;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: normal;
        }

        .navbar-links {
            display: flex;
            gap: 32px;
            align-items: center;
        }

        .navbar-link {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s ease;
            position: relative;
        }

        .navbar-link:hover {
            color: var(--text-primary);
            transform: translateY(-1px);
        }

        /* --- TIMELINE VIEWPORT (Main scroll container) --- */
        .timeline-viewport {
            flex: 1;
            width: 100%;
            overflow-x: hidden;
            overflow-y: auto;
            scroll-behavior: smooth;
            scrollbar-width: none;
            position: relative;
            display: flex;
            flex-direction: row;
            background-color: var(--bg-primary);
            max-width: 900px;
            margin: 0 auto;
        }
        .timeline-viewport::-webkit-scrollbar { display: none; }

        /* Flex container pour le scroll vertical */
        .timeline-scroll {
            display: flex;
            flex-direction: column;
            flex: 1;
            width: 100%;
            padding: 0 20px 120px 0;
        }

        /* --- CARD SLOTS --- */
        .card-slot {
            flex: 0 0 auto;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            position: relative;
            padding: 40px 20px 40px 0;
            opacity: 1;
            transform: none;
            transition: opacity 0.3s;
        }

        .card-slot.active {
            opacity: 1;
        }

        .card-wrapper {
            width: 100%;
            max-width: 650px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            box-shadow: var(--shadow-md);
        }

        /* SENTINEL BLOCK (DATE) */
        .sentinel-block {
            text-align: center;
            border: none;
            background: transparent;
            padding: 0;
            border-radius: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            align-self: flex-start;
            margin-bottom: 0;
        }
        .sentinel-date {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .sentinel-year {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 400;
        }
        .sentinel-icon { color: var(--accent); font-size: 16px; }

        /* DATA BLOCKS */
        .data-block {
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
        }

        .block-label {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        /* INPUTS */
        .input-raw {
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--border);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            padding: 12px 0;
            border-radius: 0;
            transition: border-color 0.2s;
            width: 100%;
            font-size: 16px;
        }
        .input-raw:focus {
            outline: none;
            border-bottom-color: var(--accent);
        }
        .input-raw:hover {
            border-bottom-color: var(--border-hover);
        }
        .input-raw::placeholder { color: var(--text-muted); }

        .input-title {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -0.5px;
            line-height: 1.3;
            color: var(--text-primary);
        }
        .input-title::placeholder { font-size: 18px; color: var(--text-muted); }

        .input-area {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            line-height: 1.6;
            padding: 12px 0;
            min-height: 100px;
            resize: none;
            border-radius: 0;
            transition: border-color 0.2s;
            border-left: none;
            border-right: none;
            border-top: none;
            border-bottom: 2px solid var(--border);
        }
        .input-area:focus {
            outline: none;
            border-bottom-color: var(--accent);
        }
        .input-area:hover {
            border-bottom-color: var(--border-hover);
        }
        .input-area::placeholder { color: var(--text-muted); }

        /* KPI WRAPPER */
        .kpi-wrapper {
            display: flex;
            align-items: baseline;
            gap: 12px;
            border-bottom: 2px solid var(--border);
            padding: 12px 0;
            transition: border-color 0.2s;
        }
        .kpi-wrapper:focus-within { border-bottom-color: var(--accent); }

        .kpi-icon { color: var(--accent); font-size: 18px; }

        .input-kpi {
            background: transparent;
            border: none;
            color: var(--accent);
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 600;
            flex: 1;
            padding: 0;
        }
        .input-kpi::placeholder { color: var(--text-muted); font-weight: 400; }

        /* DATE INPUT */
        input[type="date"] {
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--border);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            padding: 12px 0;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        input[type="date"]:hover {
            border-bottom-color: var(--border-hover);
        }
        input[type="date"]:focus {
            outline: none;
            border-bottom-color: var(--accent);
        }

        /* CARD CONNECTOR (Add button) */
        /* IMPORTANT: Positionné AU-DESSUS visuellement (car on remonte le temps vers le haut) */
        .card-connector {
            position: absolute;
            top: -20px; /* Au-dessus de la carte */
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 50;
            pointer-events: none;
        }

        .card-slot.active .card-connector {
            opacity: 1;
            pointer-events: auto;
        }

        .btn-add-jalon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid var(--accent);
            color: var(--accent);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: var(--shadow-md);
        }

        .btn-add-jalon:hover {
            transform: scale(1.1);
            background: var(--accent);
            color: white;
            box-shadow: 0 0 12px var(--accent-glow);
        }

        /* --- TIMELINE RAIL (Scrollable with content) --- */
        .timeline-rail {
            position: relative;
            width: 80px;
            border-right: 1px solid var(--border);
            background: transparent;
            display: flex;
            flex-direction: column;
            z-index: 50;
            box-shadow: none;
            flex-shrink: 0;
        }

        .timeline-indicator {
            position: sticky;
            top: 50%;
            left: 15px;
            right: 15px;
            height: 2px;
            background: var(--accent);
            z-index: 100;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .timeline-track {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        .timeline-month {
            flex: 1;
            width: 100%;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0.7;
            transition: opacity 0.3s;
            position: relative;
            cursor: pointer;
            padding: 0;
        }

        .timeline-month:hover { opacity: 0.85; }
        .timeline-month.active { opacity: 1; }

        .tick {
            order: 3;
            width: 14px;
            height: 1px;
            background: var(--border);
            margin-top: 6px;
        }
        .timeline-month.active .tick {
            width: 20px;
            height: 2px;
            background: var(--accent);
        }

        .month-label {
            order: 1;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1;
            color: var(--text-primary);
        }
        .year-label {
            order: 2;
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 3px;
            font-variant-numeric: tabular-nums;
            font-weight: 500;
        }
        .timeline-month.active .year-label { color: var(--text-primary); }

        .has-milestone::after {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            position: absolute;
            bottom: 10px;
            box-shadow: 0 0 5px var(--accent-glow);
        }

        /* --- CONTROLS --- */
        .controls-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            padding: 0 20px;
            padding-bottom: var(--safe-bottom);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }

        .btn-nav {
            height: 40px;
            padding: 0 20px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--accent);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            letter-spacing: 0.5px;
            border-radius: 6px;
        }
        .btn-nav:hover {
            border-color: var(--accent);
            background: var(--accent-light);
        }
        .btn-nav:active { transform: scale(0.98); }

        .btn-nav.primary {
            background: var(--accent);
            color: white;
            font-weight: 600;
            border-color: var(--accent);
        }
        .btn-nav.primary:hover {
            background: #1d4ed8;
            border-color: #1d4ed8;
        }

        .btn-nav.disabled { opacity: 0.4; pointer-events: none; }

        /* --- RESPONSIVE DESIGN --- */
        @media (max-width: 768px) {
            .timeline-rail {
                width: 70px;
            }

            .timeline-scroll {
                padding: 0 20px 150px 0;
            }

            .controls-bottom {
                height: 100px;
                flex-direction: column;
                gap: 8px;
                justify-content: center;
            }

            .btn-nav {
                width: 100%;
                justify-content: center;
                font-size: 12px;
            }

            .card-wrapper {
                max-width: 100%;
                padding: 32px 24px;
                gap: 24px;
            }

            .input-title {
                font-size: 24px;
            }

            .card-slot {
                padding: 32px 16px;
                min-height: 85vh;
            }

            .hud-label {
                font-size: 12px;
            }

            .btn-icon {
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            .timeline-rail {
                width: 60px;
            }

            .timeline-scroll {
                padding: 0 20px 150px 0;
            }

            .timeline-month {
                height: 60px;
            }

            .month-label {
                font-size: 10px;
            }

            .year-label {
                font-size: 9px;
            }

            .card-wrapper {
                padding: 24px 16px;
                gap: 20px;
                border-radius: 8px;
            }

            .input-title {
                font-size: 20px;
            }

            .data-block {
                gap: 6px;
            }

            .block-label {
                font-size: 11px;
            }

            .input-raw,
            input[type="date"],
            .input-area {
                font-size: 14px;
                padding: 10px 0;
            }

            .sentinel-date {
                font-size: 12px;
            }

            .sentinel-year {
                font-size: 11px;
            }

            .btn-add-jalon {
                width: 32px;
                height: 32px;
                font-size: 16px;
            }
        }

        /* --- FOCUS & KEYBOARD ACCESSIBILITY --- */
        button:focus-visible,
        input:focus-visible,
        textarea:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .btn-nav:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .btn-icon:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
            border-radius: 4px;
        }

        /* --- SMOOTH ANIMATIONS --- */
        * {
            transition: background-color 0.2s ease-in-out,
                        color 0.2s ease-in-out,
                        border-color 0.2s ease-in-out;
        }

        /* Exemptions de transition pour éviter les flickers */
        .timeline-scroll,
        .card-slot,
        .timeline-month {
            transition: none;
        }

    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="index.html" class="navbar-logo">Carry It</a>
        <div class="navbar-links">
            <a href="dashboard.html" class="navbar-link">Mes Objectifs</a>
            <a href="index.html" class="navbar-link">Accueil</a>
        </div>
    </nav>

    <!-- INTRO TEXT -->
    <div style="margin-top: 72px; padding: 60px 40px; border-bottom: 1px solid var(--border); background: linear-gradient(135deg, rgba(255, 77, 0, 0.05) 0%, rgba(5, 6, 8, 0) 100%); text-align: center; display: flex; flex-direction: column; align-items: center; gap: 24px;">
        <div>
            <h2 style="font-size: 28px; font-weight: 700; color: var(--text-primary); margin: 0 0 16px 0;">Le Rétroplanifiage</h2>
            <p style="font-size: 15px; color: var(--text-secondary); margin: 0; font-weight: 400; max-width: 600px;">
                Partez de votre objectif final et découpez-le en jalons concrets jusqu'à aujourd'hui — éditez inline, insérez des étapes, et utilisez le GPT Custom pour vous guider.
            </p>
        </div>
        <button onclick="window.open('https://chatgpt.com/g/g-692ca373fe108191a36c15ad1250a4a8-carry-it-ai', '_blank')" style="background: var(--accent); color: white; border: none; padding: 12px 28px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">
            💬 Ouvrir le GPT Custom
        </button>
    </div>

    <!-- TIMELINE VIEWPORT (Main scroll container) -->
    <div class="timeline-viewport" id="timelineViewport">
        <!-- TIMELINE RAIL (Scrollable with content) -->
        <div class="timeline-rail" id="timelineRail">
            <div class="timeline-indicator"></div>
            <div class="timeline-track" id="timelineTrack">
                <!-- Timeline mois générée par JS -->
            </div>
        </div>

        <!-- TIMELINE SCROLL (Cards) -->
        <div class="timeline-scroll" id="timelineScroll">
            <!-- Cartes générées par JS -->
        </div>
    </div>

    <!-- CONTROLS -->
    <div class="controls-bottom">
        <!-- BOUTON GAUCHE: Aller vers le HAUT (Futur) -->
        <button class="btn-nav" id="btnForward">
            <i class="ri-arrow-up-line"></i> VERS L'OBJECTIF
        </button>

        <!-- BOUTON DROITE: Aller vers le BAS (Passé) -->
        <button class="btn-nav primary" id="btnBackward">
            JALON ANTÉCÉDENT <i class="ri-arrow-down-line"></i>
        </button>
    </div>

    <script>
        // --- DATA & CONFIG ---
        const today = new Date();

        // Récupère la date temporelle du SMART (obligatoire)
        function getProjectDeadline() {
            const smart = JSON.parse(localStorage.getItem('carryItObjectifSMART')) || {};
            if (!smart.temporel) {
                console.error('Erreur: La date temporelle (T du SMART) doit être définie dans le localStorage');
                throw new Error('Date temporelle du SMART non définie');
            }
            return new Date(smart.temporel + 'T00:00:00');
        }

        const projectDeadline = getProjectDeadline();

        // Calcule la durée en mois
        function calculateProjectDuration() {
            const diffTime = projectDeadline - today;
            const diffMonths = Math.round(diffTime / (1000 * 60 * 60 * 24 * 30.44));
            return Math.max(1, diffMonths);
        }
        const projectDurationMonths = calculateProjectDuration();

        // DATA SOURCE - Utilise des dates ISO au lieu d'offsets
        let milestones = [
            { id: 'm1', date: projectDeadline.toISOString().split('T')[0], title: "Objectif Final", desc: "Le système est stable et autonome.", kpiValue: "300 Clients" },
            { id: 'm2', date: new Date(today.getFullYear(), today.getMonth() + 3, today.getDate()).toISOString().split('T')[0], title: "Optimisation", desc: "Maximisation de la conversion.", kpiValue: "" },
            { id: 'm3', date: new Date(today.getFullYear(), today.getMonth() + 12, today.getDate()).toISOString().split('T')[0], title: "MVP Validé", desc: "Première base d'utilisateurs.", kpiValue: "Oui" },
            { id: 'm4', date: today.toISOString().split('T')[0], title: "Lancement", desc: "Démarrage du projet.", kpiValue: "" }
        ];

        // --- DOM REFS ---
        const timelineViewport = document.getElementById('timelineViewport');
        const timelineScroll = document.getElementById('timelineScroll');
        const timelineTrack = document.getElementById('timelineTrack');
        const stepIndicator = document.getElementById('stepIndicator');
        const btnForward = document.getElementById('btnForward');
        const btnBackward = document.getElementById('btnBackward');

        // --- STATE ---
        let currentMilestoneId = null;
        let isScrollingViewport = false;
        let isScrollingTimeline = false;
        let isSyncingRail = false;

        // --- UTILS ---
        function calculateOffset(dateString) {
            const targetDate = new Date(dateString + 'T00:00:00');
            const diffTime = targetDate - today;
            const diffMonths = Math.round(diffTime / (1000 * 60 * 60 * 24 * 30.44));
            return diffMonths;
        }

        // Calcule l'offset par rapport à la DEADLINE du projet (pour le rail)
        function calculateRailOffset(dateString) {
            const targetDate = new Date(dateString + 'T00:00:00');
            const deadline = new Date(projectDeadline);
            const diffTime = deadline - targetDate;
            const diffMonths = Math.round(diffTime / (1000 * 60 * 60 * 24 * 30.44));
            return Math.max(0, Math.min(projectDurationMonths, diffMonths));
        }

        // Récupère les infos SMART depuis localStorage
        function getSMARTData() {
            try {
                const smart = JSON.parse(localStorage.getItem('carryItObjectifSMART')) || {};
                return {
                    specifique: smart.specifique || '',
                    mesurable: smart.mesurable || '',
                    temporel: smart.temporel || ''
                };
            } catch (e) {
                return { specifique: '', mesurable: '', temporel: '' };
            }
        }

        // Vérifie si c'est le premier jalon (date finale du projet)
        function isFirstMilestone(milestone) {
            const milestoneDate = new Date(milestone.date);
            const deadline = new Date(projectDeadline);
            return Math.abs(milestoneDate - deadline) < 24 * 60 * 60 * 1000; // Même jour
        }

        function formatDateDisplay(dateString) {
            const date = new Date(dateString + 'T00:00:00');
            return date.toLocaleDateString('fr-FR', { month: 'short', year: '2-digit' }).toUpperCase();
        }

        function formatDateYear(dateString) {
            const date = new Date(dateString + 'T00:00:00');
            return date.getFullYear();
        }

        // --- RENDER ALL CARDS ---
        function renderAllCards() {
            timelineScroll.innerHTML = '';

            // Trier du Futur (objectif) vers le Passé (aujourd'hui) - RÉTROPLANNING
            // L'Objectif Final en haut, Lancement en bas
            const sortedMilestones = [...milestones].sort((a, b) => {
                const dateA = new Date(a.date);
                const dateB = new Date(b.date);
                return dateB - dateA; // Descendant: futur en premier
            });

            sortedMilestones.forEach((milestone, index) => {
                const slot = document.createElement('div');
                slot.className = 'card-slot';
                slot.dataset.id = milestone.id;
                slot.id = `card-${milestone.id}`;

                // Card wrapper
                const wrapper = document.createElement('div');
                wrapper.className = 'card-wrapper';

                const dateMonth = formatDateDisplay(milestone.date);
                const dateYear = formatDateYear(milestone.date);
                const isFirst = isFirstMilestone(milestone);
                const smartData = isFirst ? getSMARTData() : {};

                // Contenu différent pour le premier jalon (SMART)
                if (isFirst) {
                    wrapper.innerHTML = `
                        <div style="padding-bottom: 16px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 24px;">
                            <span style="font-size: 11px; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">Votre Objectif Final</span>
                        </div>
                        <div class="sentinel-block">
                            <i class="ri-calendar-line sentinel-icon"></i>
                            <span class="sentinel-date">${dateMonth}</span>
                            <span class="sentinel-year">${dateYear}</span>
                        </div>
                        <div class="data-block">
                            <div class="block-label">Spécifique</div>
                            <input type="text" class="input-raw input-title"
                                   value="${smartData.specifique || ''}"
                                   data-id="${milestone.id}"
                                   placeholder="Description spécifique de l'objectif..."
                                   autocomplete="off"
                                   oninput="updateData('${milestone.id}', 'title', this.value)">
                        </div>
                        <div class="data-block">
                            <div class="block-label">Mesurable</div>
                            <textarea class="input-area"
                                      data-id="${milestone.id}"
                                      placeholder="Critères de mesure..."
                                      oninput="updateData('${milestone.id}', 'desc', this.value)">${smartData.mesurable || ''}</textarea>
                        </div>
                        <div class="data-block">
                            <div class="block-label">Temporel</div>
                            <input type="date"
                                   value="${milestone.date}"
                                   data-id="${milestone.id}"
                                   oninput="updateData('${milestone.id}', 'date', this.value)">
                        </div>
                    `;
                } else {
                    // Contenu normal pour les autres jalons
                    wrapper.innerHTML = `
                        <div class="sentinel-block">
                            <i class="ri-calendar-line sentinel-icon"></i>
                            <span class="sentinel-date">${dateMonth}</span>
                            <span class="sentinel-year">${dateYear}</span>
                        </div>
                        <div class="data-block">
                            <div class="block-label">Titre du Jalon</div>
                            <input type="text" class="input-raw input-title"
                                   value="${milestone.title}"
                                   data-id="${milestone.id}"
                                   placeholder="Saisir le titre..."
                                   autocomplete="off"
                                   oninput="updateData('${milestone.id}', 'title', this.value)">
                        </div>
                        <div class="data-block">
                            <div class="block-label">Description</div>
                            <textarea class="input-area"
                                      data-id="${milestone.id}"
                                      placeholder="Décrire ce jalon..."
                                      oninput="updateData('${milestone.id}', 'desc', this.value)">${milestone.desc}</textarea>
                        </div>
                        <div class="data-block">
                            <div class="block-label">KPI Mesurable</div>
                            <div class="kpi-wrapper">
                                <i class="ri-flag-fill kpi-icon"></i>
                                <input type="text" class="input-kpi"
                                       value="${milestone.kpiValue}"
                                       data-id="${milestone.id}"
                                       placeholder="Objectif mesurable..."
                                       autocomplete="off"
                                       oninput="updateData('${milestone.id}', 'kpiValue', this.value)">
                            </div>
                        </div>
                        <div class="data-block">
                            <div class="block-label">Date du Jalon</div>
                            <input type="date"
                                   value="${milestone.date}"
                                   data-id="${milestone.id}"
                                   oninput="updateData('${milestone.id}', 'date', this.value)">
                        </div>
                    `;
                }

                // Connector (Add button) - Placé visuellement à GAUCHE via CSS (left: -20px)
                // Ne pas afficher le bouton "+" pour la première carte (l'objectif final)
                if (!isFirst) {
                    const connector = document.createElement('div');
                    connector.className = 'card-connector';
                    connector.innerHTML = `<button class="btn-add-jalon" onclick="addJalonInline('${milestone.id}')" title="Ajouter une étape avant">+</button>`;
                    slot.appendChild(connector); // Le CSS le place à gauche
                }

                slot.appendChild(wrapper);
                timelineScroll.appendChild(slot);
            });

            setupIntersectionObserver();
        }

        function updateData(id, field, value) {
            const m = milestones.find(m => m.id === id);
            if (m) {
                m[field] = value;
                // Si la date change, re-rendre pour réappliquer le tri
                if (field === 'date') {
                    renderAllCards();
                    renderTimeline();
                }
            }
        }

        // --- ADD JALON INLINE ---
        function addJalonInline(refId) {
            const refMilestone = milestones.find(m => m.id === refId);
            if (!refMilestone) return;

            // Calculer une date intermédiaire : entre la référence et la précédente (vers le passé)
            const refDate = new Date(refMilestone.date + 'T00:00:00');
            const newOffsetMonths = Math.max(1, calculateOffset(refMilestone.date) - 1);
            const newDate = new Date(today);
            newDate.setMonth(today.getMonth() + newOffsetMonths);
            const newDateStr = newDate.toISOString().split('T')[0];

            const newId = 'm_' + Date.now();

            milestones.push({
                id: newId,
                date: newDateStr,
                title: "",
                desc: "",
                kpiValue: ""
            });

            // Re-render (le tri automatique placera la carte à gauche)
            renderAllCards();
            renderTimeline();

            // Scroll vers la nouvelle carte
            setTimeout(() => {
                const newSlot = document.getElementById(`card-${newId}`);
                if (newSlot) {
                    newSlot.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
                    // Focus titre
                    newSlot.querySelector('.input-title').focus();
                }
            }, 100);
        }

        // --- RENDER TIMELINE RAIL ---
        function renderTimeline() {
            timelineTrack.innerHTML = '';

            // Timeline verticale: Futur (0) en haut -> Passé (24) en bas (RÉTROPLANNING)
            // On boucle de 0 (Objectif Final) à 24 (Lancement/Aujourd'hui)
            for (let i = 0; i <= projectDurationMonths; i++) {
                const monthEl = document.createElement('div');
                // Vérifier si un jalon a un offset proche (calculé depuis sa date)
                const isMilestone = milestones.some(m => Math.abs(calculateOffset(m.date) - i) < 0.5);

                monthEl.className = `timeline-month ${isMilestone ? 'has-milestone' : ''}`;
                monthEl.dataset.offset = i;

                // Clic sur rail
                monthEl.onclick = () => {
                   // Trouver le jalon le plus proche
                   const target = milestones.reduce((prev, curr) =>
                       Math.abs(calculateOffset(curr.date) - i) < Math.abs(calculateOffset(prev.date) - i) ? curr : prev
                   );
                   const slot = document.getElementById(`card-${target.id}`);
                   if(slot) slot.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
                };

                const dateObj = new Date(projectDeadline);
                dateObj.setMonth(projectDeadline.getMonth() - i);

                let label, year;
                if (i === 0) {
                    label = 'FIN';
                    year = dateObj.getFullYear();
                } else if (i === projectDurationMonths) {
                    label = 'AUJOURD\'HUI';
                    year = dateObj.getFullYear();
                } else {
                    label = dateObj.toLocaleDateString('fr-FR', { month: 'short' }).toUpperCase();
                    year = dateObj.getFullYear();
                }

                monthEl.innerHTML = `
                    <div class="tick"></div>
                    <span class="month-label">${label}</span>
                    <span class="year-label">${year}</span>
                `;

                timelineTrack.appendChild(monthEl);
            }
        }

        // --- INTERSECTION OBSERVER ---
        let lastSyncTime = 0;
        function setupIntersectionObserver() {
            const cards = document.querySelectorAll('.card-slot');
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        // Debounce: éviter les updates en cascade
                        const now = Date.now();
                        if (now - lastSyncTime < 300) return;
                        lastSyncTime = now;

                        // Highlight Card
                        document.querySelectorAll('.card-slot').forEach(c => c.classList.remove('active'));
                        entry.target.classList.add('active');

                        // Update State
                        currentMilestoneId = entry.target.dataset.id;
                        const m = milestones.find(m => m.id === currentMilestoneId);

                        // Sync Rail avec offset par rapport à la deadline
                        const railOffset = calculateRailOffset(m.date);
                        syncRail(railOffset);
                        updateButtons(m);
                    }
                });
            }, { threshold: 0.5, root: timelineViewport });

            cards.forEach(card => observer.observe(card));
        }

        function syncRail(offset) {
            // Marquer le mois actif
            document.querySelectorAll('.timeline-month').forEach(el => {
                el.classList.toggle('active', parseInt(el.dataset.offset) === offset);
            });

            // L'indicateur étant en position: sticky, il se place
            // naturellement en face du mois actif lors du scroll
        }

        // --- BUTTONS LOGIC ---
        function updateButtons(currentMilestone) {
            // Calculer l'offset depuis la deadline
            const railOffset = calculateRailOffset(currentMilestone.date);

            // Si on est à l'Objectif (Offset 0) -> Pas de bouton "Vers l'Objectif"
            if (railOffset === 0) {
                btnForward.style.opacity = '0.3';
                btnForward.style.pointerEvents = 'none';
            } else {
                btnForward.style.opacity = '1';
                btnForward.style.pointerEvents = 'auto';
            }

            // Bouton Action Principale (Antécédent)
            // Si on est au tout début du projet (Offset Max), ça devient "Terminer" ?
            // Ici on garde simple.
        }

        btnForward.addEventListener('click', () => {
            // Aller vers le HAUT (Futur/Objectif)
            timelineViewport.scrollBy({ top: -window.innerHeight * 0.85, behavior: 'smooth' });
        });

        btnBackward.addEventListener('click', () => {
            // Aller vers le BAS (Passé)
            timelineViewport.scrollBy({ top: window.innerHeight * 0.85, behavior: 'smooth' });
        });

        // --- SYNC INDICATOR WITH ACTIVE MONTH ---
        // L'indicateur suit le mois actif de la timeline rail
        function syncIndicator(offset) {
            const activeMonth = document.querySelector(`.timeline-month[data-offset="${offset}"]`);
            if (activeMonth) {
                const indicator = document.querySelector('.timeline-indicator');
                const monthTop = activeMonth.offsetTop;
                const monthHeight = activeMonth.offsetHeight;
                const centerPos = monthTop + (monthHeight / 2);

                indicator.style.top = `${centerPos}px`;
            }
        }

        // --- INIT ---
        function init() {
            renderAllCards();
            renderTimeline();

            // DEMARRAGE : SCROLL TOUT EN HAUT (Objectif Final)
            // On attend que le rendu soit fait
            setTimeout(() => {
                timelineViewport.scrollTop = 0;
            }, 100);
        }

        init();

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Carry It - Cockpit Jalons</title>

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <!-- Font : Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            /* --- PALETTE COCKPIT CARRY IT --- */
            --bg-deep: #050505;        /* Noir Absolu */
            --surface: #0F0F0F;        /* Surface Technique */
            --surface-active: #1A1A1A;

            --text-primary: #E0E0E0;   /* Blanc cassé technique */
            --text-secondary: #666666; /* Gris neutre */
            --text-dim: #333333;

            --accent: #FF4D00;         /* Orange Lave (Alerte/Action) */
            --accent-dim: rgba(255, 77, 0, 0.1);
            --accent-glow: rgba(255, 77, 0, 0.2);

            --border: #222222;         /* Limites strictes */
            --border-active: #444444;

            /* Safe Areas */
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);

            /* --- ANIMATIONS --- */
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        input, textarea { user-select: text; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- HUD (HEAD UP DISPLAY) --- */
        .hud-top {
            height: 50px;
            padding-top: var(--safe-top);
            padding-left: 20px;
            padding-right: 20px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: var(--bg-deep);
            z-index: 100;
            flex-shrink: 0;
        }

        .hud-label {
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hud-value { color: var(--accent); font-weight: 700; }

        .btn-icon {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            transition: color 0.2s;
        }
        .btn-icon:hover { color: var(--text-primary); }

        /* --- TIMELINE VIEWPORT (Main scroll container) --- */
        .timeline-viewport {
            flex: 1;
            width: 100vw;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            scrollbar-width: none;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .timeline-viewport::-webkit-scrollbar { display: none; }

        /* Flex container pour le scroll horizontal */
        .timeline-scroll {
            display: flex;
            flex-direction: row;
            width: fit-content;
            height: 100%;
            flex: 1;
        }

        /* --- CARD SLOTS --- */
        .card-slot {
            flex: 0 0 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            scroll-snap-align: center;
            scroll-snap-stop: always;
            position: relative;
            padding-top: 20px;
            padding-bottom: 200px;
        }

        .card-wrapper {
            width: 90%;
            max-width: 460px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* SENTINEL BLOCK (DATE) */
        .sentinel-block {
            text-align: center;
            border: 1px solid var(--border);
            background: var(--surface);
            padding: 12px;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            align-self: center;
            margin-bottom: 10px;
        }
        .sentinel-date {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-primary);
            text-transform: uppercase;
        }
        .sentinel-icon { color: var(--accent); font-size: 14px; }

        /* DATA BLOCKS */
        .data-block {
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
        }

        .block-label {
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        /* INPUTS */
        .input-raw {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            padding: 12px 0;
            border-radius: 0;
            transition: border-color 0.2s;
            width: 100%;
        }
        .input-raw:focus {
            border-bottom-color: var(--accent);
        }
        .input-raw::placeholder { color: var(--text-dim); }

        .input-title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            line-height: 1.1;
        }
        .input-title::placeholder { font-size: 16px; }

        .input-area {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            line-height: 1.6;
            padding: 16px;
            min-height: 120px;
            resize: none;
            border-radius: 4px;
            transition: border-color 0.2s;
        }
        .input-area:focus { border-color: var(--accent); }
        .input-area::placeholder { color: var(--text-dim); }

        /* KPI WRAPPER */
        .kpi-wrapper {
            display: flex;
            align-items: baseline;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            padding: 8px 0;
            transition: border-color 0.2s;
        }
        .kpi-wrapper:focus-within { border-bottom-color: var(--accent); }

        .kpi-icon { color: var(--accent); font-size: 16px; }

        .input-kpi {
            background: transparent;
            border: none;
            color: var(--accent);
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 700;
            flex: 1;
            padding: 0;
        }
        .input-kpi::placeholder { color: var(--text-dim); font-weight: 400; }

        /* CARD CONNECTOR (Add button) */
        .card-connector {
            position: absolute;
            right: -30px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.3;
            transition: opacity 0.2s;
        }

        .card-slot:hover .card-connector {
            opacity: 1;
        }

        .btn-add-jalon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--accent);
            border: 1px solid var(--accent);
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-add-jalon:hover {
            transform: scale(1.1);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        /* --- TIMELINE RAIL (Fixed at bottom) --- */
        .timeline-rail {
            position: fixed;
            bottom: 100px;
            left: 0;
            width: 100%;
            height: 90px;
            border-top: 1px solid var(--border);
            background: var(--bg-deep);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        .timeline-indicator {
            position: absolute;
            left: 50%;
            top: 10px;
            bottom: 10px;
            width: 2px;
            background: var(--accent);
            z-index: 10;
            transform: translateX(-50%);
            border-radius: 2px;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .timeline-track {
            display: flex;
            align-items: center;
            gap: 0;
            overflow-x: auto;
            padding: 0 50vw;
            scroll-behavior: smooth;
            height: 100%;
            scrollbar-width: none;
            cursor: grab;
            width: 100%;
        }
        .timeline-track:active { cursor: grabbing; }
        .timeline-track::-webkit-scrollbar { display: none; }

        .timeline-month {
            flex-shrink: 0;
            width: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0.3;
            transition: opacity 0.3s;
            position: relative;
            height: 100%;
            cursor: pointer;
            padding: 0 10px;
        }

        .timeline-month:hover {
            opacity: 0.7;
        }

        .timeline-month.active { opacity: 1; }

        .tick {
            width: 1px;
            height: 12px;
            background: var(--text-secondary);
            margin-bottom: 6px;
        }
        .timeline-month.active .tick {
            height: 18px;
            background: var(--text-primary);
            width: 2px;
        }

        .month-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1;
        }
        .year-label {
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 4px;
            font-variant-numeric: tabular-nums;
            font-weight: 500;
        }
        .timeline-month.active .year-label { color: var(--text-primary); }

        .has-milestone::after {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            position: absolute;
            bottom: 5px;
            box-shadow: 0 0 5px var(--accent-glow);
        }

        /* --- CONTROLS --- */
        .controls-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            padding: 0 20px;
            padding-bottom: var(--safe-bottom);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-deep);
            border-top: 1px solid var(--border);
            z-index: 100;
        }

        .btn-nav {
            height: 40px;
            padding: 0 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }
        .btn-nav:hover {
            border-color: var(--border-active);
            background: var(--surface-active);
        }
        .btn-nav:active { transform: scale(0.98); }

        .btn-nav.primary {
            background: var(--text-primary);
            color: var(--bg-deep);
            font-weight: 700;
            border-color: var(--text-primary);
        }
        .btn-nav.primary:hover {
            background: rgba(224, 224, 224, 0.9);
        }

        .btn-nav.disabled { opacity: 0.3; pointer-events: none; }

    </style>
</head>
<body>

    <!-- HUD TOP -->
    <div class="hud-top">
        <div class="hud-label">COCKPIT <span class="hud-value">CARRY IT</span></div>
        <div class="hud-label" id="stepIndicator">JALON --/--</div>
        <button class="btn-icon" title="Paramètres"><i class="ri-settings-3-line"></i></button>
    </div>

    <!-- TIMELINE VIEWPORT (Main scroll container) -->
    <div class="timeline-viewport" id="timelineViewport">
        <div class="timeline-scroll" id="timelineScroll">
            <!-- Cartes générées par JS -->
        </div>

        <!-- TIMELINE RAIL (Fixed) -->
        <div class="timeline-rail" id="timelineRail">
            <div class="timeline-indicator"></div>
            <div class="timeline-track" id="timelineTrack">
                <!-- Timeline mois générée par JS -->
            </div>
        </div>
    </div>

    <!-- CONTROLS -->
    <div class="controls-bottom">
        <button class="btn-nav" id="prevBtn" title="Revenir vers l'objectif final">
            VERS L'OBJECTIF <i class="ri-arrow-right-line"></i>
        </button>
        <button class="btn-nav primary" id="nextBtn">
            <i class="ri-arrow-left-line"></i> JALON ANTÉCÉDENT
        </button>
    </div>

    <script>
        // --- DATA & CONFIG ---
        const projectDurationMonths = 24;
        const projectDeadline = new Date();
        projectDeadline.setMonth(projectDeadline.getMonth() + projectDurationMonths);

        let milestones = [
            { offset: 0, title: "Objectif Final", desc: "Atteinte des 300 utilisateurs payants (~2400€/mois). Le système est stable et autonome.", kpiValue: "300" },
            { offset: 3, title: "Optimisation & Rentabilité", desc: "Maximisation de la conversion. Le produit est complet, on affine les coûts.", kpiValue: "" },
            { offset: 6, title: "Expansion", desc: "Mise en place des leviers de croissance. Le produit fonctionne, il faut du volume.", kpiValue: "" },
            { offset: 12, title: "Traction (MVP Validé)", desc: "Première base d'utilisateurs fidèles. Le produit délivre sa promesse de base.", kpiValue: "Oui" },
            { offset: 18, title: "Prototype & Bêta", desc: "Première version testable par des vrais utilisateurs. Feedback loop active.", kpiValue: "" },
            { offset: 24, title: "Lancement (Kick-off)", desc: "Démarrage du projet. Tout commence ici.", kpiValue: "" }
        ];

        // --- DOM REFS ---
        const timelineViewport = document.getElementById('timelineViewport');
        const timelineScroll = document.getElementById('timelineScroll');
        const timelineTrack = document.getElementById('timelineTrack');
        const stepIndicator = document.getElementById('stepIndicator');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        // --- STATE ---
        let currentMilestoneIndex = 0;
        let isScrollingViewport = false;
        let isScrollingTimeline = false;
        let lastViewportScroll = 0;
        let lastTimelineScroll = 0;

        // --- UTILS ---
        function formatDate(milestone) {
            const dateObj = new Date(projectDeadline);
            dateObj.setMonth(projectDeadline.getMonth() - milestone.offset);
            return dateObj.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' }).toUpperCase();
        }

        // --- RENDER ALL CARDS ---
        function renderAllCards() {
            timelineScroll.innerHTML = '';

            milestones.forEach((milestone, index) => {
                const slot = document.createElement('div');
                slot.className = 'card-slot';
                slot.dataset.index = index;

                // Card wrapper
                const wrapper = document.createElement('div');
                wrapper.className = 'card-wrapper';
                wrapper.innerHTML = `
                    <div class="sentinel-block">
                        <i class="ri-time-line sentinel-icon"></i>
                        <span class="sentinel-date">${formatDate(milestone)}</span>
                    </div>
                    <div class="data-block">
                        <div class="block-label">01 // Nom du Jalon</div>
                        <input type="text" class="input-raw input-title"
                               value="${milestone.title}"
                               data-index="${index}"
                               placeholder="Ex: Lancement V1"
                               autocomplete="off">
                    </div>
                    <div class="data-block">
                        <div class="block-label">02 // Le KPI (Mesurable)</div>
                        <div class="kpi-wrapper">
                            <i class="ri-flag-fill kpi-icon"></i>
                            <input type="text" class="input-kpi"
                                   value="${milestone.kpiValue}"
                                   data-index="${index}"
                                   placeholder="Ex: 500 utilisateurs ou Oui"
                                   autocomplete="off">
                        </div>
                    </div>
                    <div class="data-block">
                        <div class="block-label">03 // Objectif Spécifique (Vérité Concrète)</div>
                        <textarea class="input-area"
                                  data-index="${index}"
                                  placeholder="Ce qui aura été accompli. Pas de blabla, des faits observables.">${milestone.desc}</textarea>
                    </div>
                `;

                // Connector (Add button)
                const connector = document.createElement('div');
                connector.className = 'card-connector';
                connector.innerHTML = `<button class="btn-add-jalon" data-index="${index}" title="Ajouter un jalon après celui-ci">+</button>`;

                slot.appendChild(wrapper);
                slot.appendChild(connector);
                timelineScroll.appendChild(slot);
            });

            setupCardInputs();
            setupAddJalonButtons();
            setupIntersectionObserver();
        }

        // --- SETUP CARD INPUTS ---
        function setupCardInputs() {
            document.querySelectorAll('.input-title, .input-kpi, .input-area').forEach(input => {
                input.addEventListener('change', (e) => {
                    const index = parseInt(e.target.dataset.index);
                    const field = e.target.classList.contains('input-title') ? 'title' :
                                 e.target.classList.contains('input-kpi') ? 'kpiValue' : 'desc';
                    milestones[index][field] = e.target.value;
                });
            });
        }

        // --- SETUP ADD JALON BUTTONS ---
        function setupAddJalonButtons() {
            document.querySelectorAll('.btn-add-jalon').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const index = parseInt(btn.dataset.index);
                    addJalonInline(index);
                });
            });
        }

        // --- ADD JALON INLINE ---
        function addJalonInline(afterIndex) {
            const newJalon = {
                offset: milestones[afterIndex].offset + 1,
                title: '',
                desc: '',
                kpiValue: ''
            };

            milestones.splice(afterIndex + 1, 0, newJalon);
            renderAllCards();
            renderTimeline();

            // Scroll vers la nouvelle carte
            setTimeout(() => {
                const newSlot = document.querySelector(`[data-index="${afterIndex + 1}"]`);
                if (newSlot) {
                    newSlot.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
                    updateTimeline();
                }
            }, 100);
        }

        // --- INTERSECTION OBSERVER ---
        function setupIntersectionObserver() {
            const cards = document.querySelectorAll('.card-slot');

            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const index = parseInt(entry.target.dataset.index);
                        currentMilestoneIndex = index;
                        updateTimeline();
                        updateButtons();
                    }
                });
            }, {
                threshold: 0.5,
            });

            cards.forEach(card => observer.observe(card));
        }

        // --- TIMELINE CLICKABLE ---
        function setupTimelineClickable() {
            timelineTrack.addEventListener('click', (e) => {
                if (e.target.classList.contains('timeline-month')) {
                    const offset = parseInt(e.target.dataset.offset);
                    const milestoneIndex = milestones.findIndex(m => Math.abs(m.offset - offset) < 1);

                    if (milestoneIndex !== -1) {
                        const slot = document.querySelector(`[data-index="${milestoneIndex}"]`);
                        if (slot) {
                            slot.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
                        }
                    }
                }
            });
        }

        // --- UPDATE TIMELINE ---
        function updateTimeline() {
            const milestone = milestones[currentMilestoneIndex];
            const monthEls = document.querySelectorAll('.timeline-month');

            monthEls.forEach(el => {
                const offset = parseInt(el.dataset.offset);
                el.classList.toggle('active', Math.abs(milestone.offset - offset) < 1);
            });

            // Scroll timeline pour montrer le mois actif
            const activeMonth = document.querySelector('.timeline-month.active');
            if (activeMonth) {
                activeMonth.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        }

        // --- RENDER TIMELINE ---
        function renderTimeline() {
            timelineTrack.innerHTML = '';

            // Inverser pour que la timeline aille de gauche (passé/24) à droite (futur/0)
            for (let i = 0; i <= projectDurationMonths; i++) {
                const d = new Date(projectDeadline);
                d.setMonth(projectDeadline.getMonth() - i);

                const linkedIndex = milestones.findIndex(m => Math.abs(m.offset - i) < 1);

                const monthEl = document.createElement('div');
                monthEl.className = `timeline-month ${linkedIndex !== -1 ? 'has-milestone' : ''}`;
                monthEl.dataset.offset = i;
                monthEl.dataset.index = linkedIndex;

                const label = d.toLocaleDateString('fr-FR', { month: 'short' }).toUpperCase();
                const year = d.getFullYear();

                monthEl.innerHTML = `
                    <div class="tick"></div>
                    <span class="month-label">${label}</span>
                    <span class="year-label">${year}</span>
                `;

                timelineTrack.appendChild(monthEl);
            }

            setupTimelineClickable();
        }

        // --- UPDATE BUTTONS ---
        function updateButtons() {
            // Prev button
            if (currentMilestoneIndex > 0) {
                prevBtn.innerHTML = 'VERS L\'OBJECTIF <i class="ri-arrow-right-line"></i>';
                prevBtn.style.opacity = '1';
                prevBtn.style.pointerEvents = 'auto';
            } else {
                prevBtn.style.opacity = '0.3';
                prevBtn.style.pointerEvents = 'none';
            }

            // Next button
            if (currentMilestoneIndex < milestones.length - 1) {
                nextBtn.innerHTML = '<i class="ri-arrow-left-line"></i> JALON ANTÉCÉDENT';
            } else {
                nextBtn.innerHTML = '<i class="ri-check-double-line"></i> VALIDER LE PLAN';
            }

            // Step indicator
            stepIndicator.innerText = `JALON ${currentMilestoneIndex + 1}/${milestones.length}`;
        }

        // --- NAVIGATION ---
        prevBtn.addEventListener('click', () => {
            if (currentMilestoneIndex > 0) {
                const slot = document.querySelector(`[data-index="${currentMilestoneIndex - 1}"]`);
                if (slot) {
                    slot.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
                }
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentMilestoneIndex < milestones.length - 1) {
                const slot = document.querySelector(`[data-index="${currentMilestoneIndex + 1}"]`);
                if (slot) {
                    slot.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
                }
            } else {
                alert('Retroplanning validé !');
            }
        });

        // --- KEYBOARD NAVIGATION ---
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                const slot = document.querySelector(`[data-index="${currentMilestoneIndex + 1}"]`);
                if (slot) slot.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
            }
            if (e.key === 'ArrowRight') {
                const slot = document.querySelector(`[data-index="${currentMilestoneIndex - 1}"]`);
                if (slot) slot.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
            }
        });

        // --- SYNC SCROLLS ---
        function syncScrolls() {
            // Quand le viewport scroll, la timeline scroll aussi
            timelineViewport.addEventListener('scroll', () => {
                if (isScrollingTimeline) return; // Éviter la boucle infinie

                isScrollingViewport = true;
                const viewportScrollDelta = timelineViewport.scrollLeft - lastViewportScroll;
                lastViewportScroll = timelineViewport.scrollLeft;

                // Appliquer le même delta à la timeline
                lastTimelineScroll += viewportScrollDelta;
                timelineTrack.scrollLeft = lastTimelineScroll;

                // Reset flag après un délai pour permettre au scroll listener de se déclencher
                requestAnimationFrame(() => {
                    isScrollingViewport = false;
                });
            });

            // Quand la timeline scroll, le viewport scroll aussi
            timelineTrack.addEventListener('scroll', () => {
                if (isScrollingViewport) return; // Éviter la boucle infinie

                isScrollingTimeline = true;
                const timelineScrollDelta = timelineTrack.scrollLeft - lastTimelineScroll;
                lastTimelineScroll = timelineTrack.scrollLeft;

                // Appliquer le même delta au viewport
                lastViewportScroll += timelineScrollDelta;
                timelineViewport.scrollLeft = lastViewportScroll;

                // Reset flag après un délai pour permettre au scroll listener de se déclencher
                requestAnimationFrame(() => {
                    isScrollingTimeline = false;
                });
            });
        }

        // --- INIT ---
        function init() {
            renderAllCards();
            renderTimeline();
            syncScrolls();
            updateTimeline();
            updateButtons();
        }

        init();

    </script>
</body>
</html>

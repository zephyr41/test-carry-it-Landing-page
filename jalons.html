<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Carry It - Cockpit Jalons</title>

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <!-- Font : Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            /* --- PALETTE COCKPIT CARRY IT --- */
            --bg-deep: #050505;        /* Noir Absolu */
            --surface: #0F0F0F;        /* Surface Technique */
            --surface-active: #1A1A1A;

            --text-primary: #E0E0E0;   /* Blanc cassé technique */
            --text-secondary: #666666; /* Gris neutre */
            --text-dim: #333333;

            --accent: #FF4D00;         /* Orange Lave (Alerte/Action) */
            --accent-dim: rgba(255, 77, 0, 0.1);
            --accent-glow: rgba(255, 77, 0, 0.2);

            --border: #222222;         /* Limites strictes */
            --border-active: #444444;

            /* Safe Areas */
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        input, textarea { user-select: text; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- HUD (HEAD UP DISPLAY) --- */
        .hud-top {
            height: 50px;
            padding-top: var(--safe-top);
            padding-left: 20px;
            padding-right: 20px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: var(--bg-deep);
            z-index: 100;
            flex-shrink: 0;
        }

        .hud-label {
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hud-value { color: var(--accent); font-weight: 700; }

        .btn-icon {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            transition: color 0.2s;
        }
        .btn-icon:hover { color: var(--text-primary); }

        /* --- AI ASSISTANT BUTTON --- */
        .btn-ai-assistant {
            background: linear-gradient(135deg, rgba(238, 68, 8, 0.15), rgba(220, 176, 138, 0.15));
            border: 1px solid rgba(238, 68, 8, 0.4);
            color: #dcb08a;
            padding: 6px 12px;
            border-radius: 18px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-ai-assistant:hover {
            background: rgba(238, 68, 8, 0.2);
            border-color: var(--accent);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .btn-ai-assistant i {
            font-size: 14px;
        }

        /* --- TIMELINE VIEWPORT (Main scroll container) --- */
        .timeline-viewport {
            flex: 1;
            width: 100vw;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            scrollbar-width: none;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .timeline-viewport::-webkit-scrollbar { display: none; }

        /* Flex container pour le scroll horizontal */
        .timeline-scroll {
            display: flex;
            flex-direction: row; /* On garde ROW standard, c'est le tri JS qui fera le boulot */
            width: fit-content;
            height: 100%;
            flex: 1;
            padding: 0 10vw; /* Padding pour centrer les cartes extrêmes */
        }

        /* --- CARD SLOTS --- */
        .card-slot {
            flex: 0 0 85vw; /* 85vw pour voir un bout des voisines */
            margin: 0 5px;  /* Espacement léger */
            display: flex;
            align-items: center;
            justify-content: center;
            scroll-snap-align: center;
            scroll-snap-stop: always;
            position: relative;
            padding-top: 20px;
            padding-bottom: 200px;
            opacity: 0.3;
            transform: scale(0.95);
            transition: opacity 0.3s, transform 0.3s;
        }
        
        .card-slot.active {
            opacity: 1;
            transform: scale(1);
        }

        .card-wrapper {
            width: 100%;
            max-width: 460px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* SENTINEL BLOCK (DATE) */
        .sentinel-block {
            text-align: center;
            border: 1px solid var(--border);
            background: var(--surface);
            padding: 12px;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            align-self: center;
            margin-bottom: 10px;
        }
        .sentinel-date {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-primary);
            text-transform: uppercase;
        }
        .sentinel-icon { color: var(--accent); font-size: 14px; }

        /* DATA BLOCKS */
        .data-block {
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
        }

        .block-label {
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        /* INPUTS */
        .input-raw {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            padding: 12px 0;
            border-radius: 0;
            transition: border-color 0.2s;
            width: 100%;
        }
        .input-raw:focus {
            border-bottom-color: var(--accent);
        }
        .input-raw::placeholder { color: var(--text-dim); }

        .input-title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            line-height: 1.1;
        }
        .input-title::placeholder { font-size: 16px; }

        .input-area {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            line-height: 1.6;
            padding: 16px;
            min-height: 120px;
            resize: none;
            border-radius: 4px;
            transition: border-color 0.2s;
        }
        .input-area:focus { border-color: var(--accent); }
        .input-area::placeholder { color: var(--text-dim); }

        /* KPI WRAPPER */
        .kpi-wrapper {
            display: flex;
            align-items: baseline;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            padding: 8px 0;
            transition: border-color 0.2s;
        }
        .kpi-wrapper:focus-within { border-bottom-color: var(--accent); }

        .kpi-icon { color: var(--accent); font-size: 16px; }

        .input-kpi {
            background: transparent;
            border: none;
            color: var(--accent);
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 700;
            flex: 1;
            padding: 0;
        }
        .input-kpi::placeholder { color: var(--text-dim); font-weight: 400; }

        /* CARD CONNECTOR (Add button) */
        /* IMPORTANT: Positionné à GAUCHE visuellement (car on remonte le temps) */
        .card-connector {
            position: absolute;
            left: -20px; /* À gauche de la carte */
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 50;
            pointer-events: none;
        }

        .card-slot.active .card-connector {
            opacity: 1;
            pointer-events: auto;
        }

        .btn-add-jalon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg-deep);
            border: 1px solid var(--accent);
            color: var(--accent);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .btn-add-jalon:hover {
            transform: scale(1.1);
            background: var(--accent);
            color: white;
            box-shadow: 0 0 12px var(--accent-glow);
        }

        /* --- TIMELINE RAIL (Fixed at bottom) --- */
        .timeline-rail {
            position: fixed;
            bottom: 80px;
            left: 0;
            width: 100%;
            height: 80px;
            border-top: 1px solid var(--border);
            background: var(--bg-deep);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        .timeline-indicator {
            position: absolute;
            left: 50%;
            top: 10px;
            bottom: 10px;
            width: 2px;
            background: var(--accent);
            z-index: 10;
            transform: translateX(-50%);
            border-radius: 2px;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .timeline-track {
            display: flex;
            align-items: center;
            gap: 0;
            overflow-x: auto;
            padding: 0 50vw;
            scroll-behavior: smooth;
            height: 100%;
            scrollbar-width: none;
            cursor: grab;
            width: 100%;
        }
        .timeline-track:active { cursor: grabbing; }
        .timeline-track::-webkit-scrollbar { display: none; }

        .timeline-month {
            flex-shrink: 0;
            width: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0.3;
            transition: opacity 0.3s;
            position: relative;
            height: 100%;
            cursor: pointer;
            padding: 0 5px;
        }

        .timeline-month:hover { opacity: 0.7; }
        .timeline-month.active { opacity: 1; }

        .tick {
            width: 1px;
            height: 12px;
            background: var(--text-secondary);
            margin-bottom: 6px;
        }
        .timeline-month.active .tick {
            height: 18px;
            background: var(--text-primary);
            width: 2px;
        }

        .month-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1;
        }
        .year-label {
            font-size: 9px;
            color: var(--text-dim);
            margin-top: 4px;
            font-variant-numeric: tabular-nums;
            font-weight: 500;
        }
        .timeline-month.active .year-label { color: var(--text-primary); }

        .has-milestone::after {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            position: absolute;
            bottom: 10px;
            box-shadow: 0 0 5px var(--accent-glow);
        }

        /* --- CONTROLS --- */
        .controls-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            padding: 0 20px;
            padding-bottom: var(--safe-bottom);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-deep);
            border-top: 1px solid var(--border);
            z-index: 100;
        }

        .btn-nav {
            height: 40px;
            padding: 0 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }
        .btn-nav:hover {
            border-color: var(--border-active);
            background: var(--surface-active);
        }
        .btn-nav:active { transform: scale(0.98); }

        .btn-nav.primary {
            background: var(--text-primary);
            color: var(--bg-deep);
            font-weight: 700;
            border-color: var(--text-primary);
        }
        .btn-nav.primary:hover {
            background: rgba(224, 224, 224, 0.9);
        }

        .btn-nav.disabled { opacity: 0.3; pointer-events: none; }

        /* --- MODAL (AI Sheet) --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: var(--surface);
            border: 1px solid var(--border);
            width: 90%;
            max-width: 450px;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.open .modal-box {
            transform: scale(1);
        }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .modal-text {
            color: var(--text-secondary);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .modal-btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        .btn-go {
            background: var(--accent);
            color: white;
        }

        .btn-go:hover {
            background: rgba(255, 77, 0, 0.9);
            transform: translateY(-2px);
        }

        .btn-close {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            margin-bottom: 0;
        }

        .btn-close:hover {
            border-color: var(--border-active);
            color: var(--text-primary);
        }

    </style>
</head>
<body>

    <!-- HUD TOP -->
    <div class="hud-top">
        <div class="hud-label">COCKPIT <span class="hud-value">CARRY IT</span></div>
        <div style="display: flex; gap: 12px; align-items: flex-end;">
            <div class="hud-label" id="stepIndicator">JALON --/--</div>
            <button class="btn-ai-assistant" onclick="openAIAssistant()" title="Assistant IA">
                <i class="ri-magic-line"></i> ASSISTANT IA
            </button>
            <button class="btn-icon" title="Paramètres"><i class="ri-settings-3-line"></i></button>
        </div>
    </div>

    <!-- TIMELINE VIEWPORT (Main scroll container) -->
    <div class="timeline-viewport" id="timelineViewport">
        <div class="timeline-scroll" id="timelineScroll">
            <!-- Cartes générées par JS -->
        </div>

        <!-- TIMELINE RAIL (Fixed) -->
        <div class="timeline-rail" id="timelineRail">
            <div class="timeline-indicator"></div>
            <div class="timeline-track" id="timelineTrack">
                <!-- Timeline mois générée par JS -->
            </div>
        </div>
    </div>

    <!-- CONTROLS -->
    <div class="controls-bottom">
        <!-- BOUTON GAUCHE: Aller vers la DROITE (Futur) -->
        <button class="btn-nav" id="btnForward">
            VERS L'OBJECTIF <i class="ri-arrow-right-line"></i>
        </button>

        <!-- BOUTON DROITE: Aller vers la GAUCHE (Passé) -->
        <button class="btn-nav primary" id="btnBackward">
            <i class="ri-arrow-left-line"></i> JALON ANTÉCÉDENT
        </button>
    </div>

    <script>
        // --- DATA & CONFIG ---
        const projectDurationMonths = 24;
        const projectDeadline = new Date();
        projectDeadline.setMonth(projectDeadline.getMonth() + projectDurationMonths);

        // DATA SOURCE (Ordre logique : 0 = Futur, N = Passé)
        let milestones = [
            { id: 'm1', offset: 0, title: "Objectif Final", desc: "Le système est stable et autonome.", kpiValue: "300 Clients" },
            { id: 'm2', offset: 3, title: "Optimisation", desc: "Maximisation de la conversion.", kpiValue: "" },
            { id: 'm3', offset: 12, title: "MVP Validé", desc: "Première base d'utilisateurs.", kpiValue: "Oui" },
            { id: 'm4', offset: 24, title: "Lancement", desc: "Démarrage du projet.", kpiValue: "" }
        ];

        // --- DOM REFS ---
        const timelineViewport = document.getElementById('timelineViewport');
        const timelineScroll = document.getElementById('timelineScroll');
        const timelineTrack = document.getElementById('timelineTrack');
        const stepIndicator = document.getElementById('stepIndicator');
        const btnForward = document.getElementById('btnForward');
        const btnBackward = document.getElementById('btnBackward');

        // --- STATE ---
        let currentMilestoneId = null;
        let isScrollingViewport = false;
        let isScrollingTimeline = false;

        // --- UTILS ---
        function formatDate(offset) {
            const dateObj = new Date(projectDeadline);
            dateObj.setMonth(projectDeadline.getMonth() - offset);
            return dateObj.toLocaleDateString('fr-FR', { month: 'short', year: '2-digit' }).toUpperCase();
        }

        // --- RENDER ALL CARDS ---
        function renderAllCards() {
            timelineScroll.innerHTML = '';

            // LOGIQUE INVERSÉE : On trie du Passé (Offset Max) vers le Futur (Offset 0)
            // Ainsi, dans le DOM Flex ROW :
            // Gauche = Passé (Offset 24)
            // Droite = Futur (Offset 0)
            const sortedMilestones = [...milestones].sort((a, b) => b.offset - a.offset);

            sortedMilestones.forEach((milestone, index) => {
                const slot = document.createElement('div');
                slot.className = 'card-slot';
                slot.dataset.id = milestone.id;
                slot.id = `card-${milestone.id}`;

                // Card wrapper
                const wrapper = document.createElement('div');
                wrapper.className = 'card-wrapper';
                wrapper.innerHTML = `
                    <div class="sentinel-block">
                        <i class="ri-time-line sentinel-icon"></i>
                        <span class="sentinel-date">${milestone.offset === 0 ? 'FIN PROJET' : formatDate(milestone.offset)}</span>
                    </div>
                    <div class="data-block">
                        <div class="block-label">01 // Nom du Jalon</div>
                        <input type="text" class="input-raw input-title"
                               value="${milestone.title}"
                               data-id="${milestone.id}"
                               placeholder="Titre..."
                               autocomplete="off"
                               oninput="updateData('${milestone.id}', 'title', this.value)">
                    </div>
                    <div class="data-block">
                        <div class="block-label">02 // Le KPI (Mesurable)</div>
                        <div class="kpi-wrapper">
                            <i class="ri-flag-fill kpi-icon"></i>
                            <input type="text" class="input-kpi"
                                   value="${milestone.kpiValue}"
                                   data-id="${milestone.id}"
                                   placeholder="Ex: 500 utilisateurs"
                                   autocomplete="off"
                                   oninput="updateData('${milestone.id}', 'kpiValue', this.value)">
                        </div>
                    </div>
                    <div class="data-block">
                        <div class="block-label">03 // Objectif Concret</div>
                        <textarea class="input-area"
                                  data-id="${milestone.id}"
                                  placeholder="Description factuelle..."
                                  oninput="updateData('${milestone.id}', 'desc', this.value)">${milestone.desc}</textarea>
                    </div>
                `;

                // Connector (Add button) - Placé visuellement à GAUCHE via CSS (left: -20px)
                const connector = document.createElement('div');
                connector.className = 'card-connector';
                connector.innerHTML = `<button class="btn-add-jalon" onclick="addJalonInline('${milestone.id}')" title="Ajouter une étape avant">+</button>`;

                slot.appendChild(connector); // Le CSS le place à gauche
                slot.appendChild(wrapper);
                timelineScroll.appendChild(slot);
            });

            setupIntersectionObserver();
        }

        function updateData(id, field, value) {
            const m = milestones.find(m => m.id === id);
            if (m) m[field] = value;
        }

        // --- ADD JALON INLINE ---
        function addJalonInline(refId) {
            const refMilestone = milestones.find(m => m.id === refId);
            if (!refMilestone) return;

            // On ajoute un jalon avec un offset un peu plus grand (donc vers le passé)
            // Pour simplifier, on prend l'offset actuel + 1 (ou moyenne si besoin)
            const newOffset = refMilestone.offset + 1;
            const newId = 'm_' + Date.now();

            milestones.push({
                id: newId,
                offset: newOffset,
                title: "",
                desc: "",
                kpiValue: ""
            });

            // Re-render (le tri automatique placera la carte à gauche)
            renderAllCards();
            renderTimeline();

            // Scroll vers la nouvelle carte
            setTimeout(() => {
                const newSlot = document.getElementById(`card-${newId}`);
                if (newSlot) {
                    newSlot.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
                    // Focus titre
                    newSlot.querySelector('.input-title').focus();
                }
            }, 100);
        }

        // --- RENDER TIMELINE RAIL ---
        function renderTimeline() {
            timelineTrack.innerHTML = '';

            // Timeline: Passé (24) à gauche -> Futur (0) à droite
            // On boucle de 24 (Start) à 0 (End)
            for (let i = projectDurationMonths; i >= 0; i--) {
                const monthEl = document.createElement('div');
                const isMilestone = milestones.some(m => Math.abs(m.offset - i) < 0.5);
                
                monthEl.className = `timeline-month ${isMilestone ? 'has-milestone' : ''}`;
                monthEl.dataset.offset = i;
                
                // Clic sur rail
                monthEl.onclick = () => {
                   // Trouver le jalon le plus proche
                   const target = milestones.reduce((prev, curr) => 
                       Math.abs(curr.offset - i) < Math.abs(prev.offset - i) ? curr : prev
                   );
                   const slot = document.getElementById(`card-${target.id}`);
                   if(slot) slot.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
                };

                const dateObj = new Date(projectDeadline);
                dateObj.setMonth(projectDeadline.getMonth() - i);
                
                const label = i === 0 ? 'FIN' : dateObj.toLocaleDateString('fr-FR', { month: 'short' }).toUpperCase();
                const year = dateObj.getFullYear();

                monthEl.innerHTML = `
                    <div class="tick"></div>
                    <span class="month-label">${label}</span>
                    <span class="year-label">${year}</span>
                `;

                timelineTrack.appendChild(monthEl);
            }
        }

        // --- INTERSECTION OBSERVER ---
        function setupIntersectionObserver() {
            const cards = document.querySelectorAll('.card-slot');
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        // Highlight Card
                        document.querySelectorAll('.card-slot').forEach(c => c.classList.remove('active'));
                        entry.target.classList.add('active');

                        // Update State
                        currentMilestoneId = entry.target.dataset.id;
                        const m = milestones.find(m => m.id === currentMilestoneId);

                        // Update HUD
                        const total = milestones.length;
                        // Index visuel (trié)
                        const sortedIds = [...milestones].sort((a, b) => b.offset - a.offset).map(m => m.id);
                        const visualIndex = sortedIds.indexOf(currentMilestoneId) + 1;
                        stepIndicator.innerText = `JALON ${visualIndex}/${total}`;

                        // Sync Rail
                        syncRail(m.offset);
                        updateButtons(m);
                    }
                });
            }, { threshold: 0.5, root: timelineViewport });

            cards.forEach(card => observer.observe(card));
        }

        function syncRail(offset) {
            document.querySelectorAll('.timeline-month').forEach(el => {
                el.classList.toggle('active', parseInt(el.dataset.offset) === offset);
            });
            const activeMonth = document.querySelector('.timeline-month.active');
            if (activeMonth && !isScrollingTimeline) {
                activeMonth.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        }

        // --- BUTTONS LOGIC ---
        function updateButtons(currentMilestone) {
            // Si on est à l'Objectif (Offset 0) -> Pas de bouton "Vers l'Objectif"
            if (currentMilestone.offset === 0) {
                btnForward.style.opacity = '0.3';
                btnForward.style.pointerEvents = 'none';
            } else {
                btnForward.style.opacity = '1';
                btnForward.style.pointerEvents = 'auto';
            }

            // Bouton Action Principale (Antécédent)
            // Si on est au tout début du projet (Offset Max), ça devient "Terminer" ?
            // Ici on garde simple.
        }

        btnForward.addEventListener('click', () => {
            // Aller vers la Droite (Futur)
            timelineViewport.scrollBy({ left: window.innerWidth * 0.85, behavior: 'smooth' });
        });

        btnBackward.addEventListener('click', () => {
            // Aller vers la Gauche (Passé)
            timelineViewport.scrollBy({ left: -window.innerWidth * 0.85, behavior: 'smooth' });
        });

        // --- SYNC SCROLLS (Approximation pour l'effet visuel) ---
        // On simplifie pour éviter les boucles infinies : seul le viewport pilote le rail via l'observer

        // --- AI ASSISTANT FUNCTIONS ---
        const GPT_URL = 'https://chatgpt.com/g/g-692ca373fe108191a36c15ad1250a4a8-carry-it-ai';

        function getCurrentObjectif() {
            const allObjectifs = JSON.parse(localStorage.getItem('carryItAllObjectifs') || '[]');
            if (allObjectifs.length === 0) return null;
            return allObjectifs[allObjectifs.length - 1]; // Plus récent
        }

        function getActiveMilestoneIndex() {
            const activeCard = document.querySelector('.card-slot.active');
            if (!activeCard) return 0;

            const activeId = activeCard.dataset.id;
            const sortedMilestones = [...milestones].sort((a, b) => b.offset - a.offset);
            return sortedMilestones.findIndex(m => m.id === activeId);
        }

        function generateMilestonePrompt() {
            const objectif = getCurrentObjectif();
            if (!objectif) {
                alert("Aucun objectif SMART trouvé. Veuillez d'abord créer un objectif.");
                return null;
            }

            const currentIndex = getActiveMilestoneIndex();
            const sortedMilestones = [...milestones].sort((a, b) => b.offset - a.offset);
            const currentMilestone = sortedMilestones[currentIndex];

            // Contexte des jalons précédents
            let previousContext = "";
            if (currentIndex > 0) {
                const filled = sortedMilestones.slice(0, currentIndex)
                    .filter(m => m.title && m.title.trim())
                    .map(m => `- ${m.title} (${formatDate(m.offset)}): ${m.desc || 'Non rempli'}`)
                    .join('\n');
                if (filled) previousContext = `\n\nJalons déjà définis:\n${filled}`;
            }

            const position = currentMilestone.offset === 0
                ? 'FIN PROJET (Objectif Final)'
                : formatDate(currentMilestone.offset);

            const prompt = `Tu es l'assistant Carry It AI. Aide-moi à définir le jalon ${currentIndex + 1}/${sortedMilestones.length} de mon projet.

## CONTEXTE SMART DE MON OBJECTIF:
- **Objectif**: ${objectif.specifique}
- **KPI**: ${objectif.mesurable} (mesuré ${objectif.frequence}, chaque ${objectif.jour})
- **Faisabilité**: ${objectif.atteignable}
- **Réalisme**: ${objectif.realiste}
- **Échéance finale**: ${formatDate(0)} (${objectif.temporel})
- **Nom du projet**: ${objectif.titre}${previousContext}

## JALON À REMPLIR MAINTENANT:
- **Position temporelle**: ${position}
- **Progression attendue**: ${Math.round((currentIndex + 1) / sortedMilestones.length * 100)}%

## TA MISSION:
Pose-moi 3-4 questions ciblées pour m'aider à définir:

1. **Nom du Jalon**: Un titre court et percutant (3-5 mots max)
2. **KPI (Mesurable)**: Quelle valeur de mon KPI principal (${objectif.mesurable}) je devrais atteindre à cette date ?
3. **Objectif Concret**: Description factuelle de ce qui sera accompli (2-3 phrases)

Une fois que nous aurons terminé, formate ta réponse finale comme ceci:
\`\`\`
NOM: [Titre du jalon]
KPI: [Valeur du KPI]
DESCRIPTION: [Description détaillée]
\`\`\`

Commence par me poser la première question pour comprendre mon intention pour ce jalon.`;

            return prompt;
        }

        function openAIAssistant() {
            const prompt = generateMilestonePrompt();
            if (!prompt) return; // Erreur déjà affichée

            // Copier dans le clipboard
            navigator.clipboard.writeText(prompt).then(() => {
                document.getElementById('aiModal').classList.add('open');
            }).catch(err => {
                console.error('Clipboard error:', err);
                // Fallback: ouvrir directement
                proceedToAI();
            });
        }

        function proceedToAI() {
            window.open(GPT_URL, '_blank');
            closeAIModal();
        }

        function closeAIModal() {
            document.getElementById('aiModal').classList.remove('open');
        }

        // Smart Paste Detection
        document.addEventListener('paste', (e) => {
            const text = e.clipboardData.getData('text');

            // Parser le format structuré
            const nomMatch = text.match(/NOM:\s*(.+)/i);
            const kpiMatch = text.match(/KPI:\s*(.+)/i);
            const descMatch = text.match(/DESCRIPTION:\s*(.+?)(?=\n\n|$)/is);

            if (nomMatch && kpiMatch && descMatch) {
                e.preventDefault();

                const activeCard = document.querySelector('.card-slot.active');
                if (!activeCard) return;

                // Remplir les champs
                const titleInput = activeCard.querySelector('.input-title');
                const kpiInput = activeCard.querySelector('.input-kpi');
                const descTextarea = activeCard.querySelector('.input-area');

                titleInput.value = nomMatch[1].trim();
                kpiInput.value = kpiMatch[1].trim();
                descTextarea.value = descMatch[1].trim();

                // Update data
                const milestoneId = activeCard.dataset.id;
                updateData(milestoneId, 'title', titleInput.value);
                updateData(milestoneId, 'kpiValue', kpiInput.value);
                updateData(milestoneId, 'desc', descTextarea.value);

                // Feedback visuel
                activeCard.style.transform = 'scale(1.02)';
                setTimeout(() => activeCard.style.transform = '', 300);
            }
        });

        // --- INIT ---
        function init() {
            renderAllCards();
            renderTimeline();
            
            // DEMARRAGE : SCROLL TOUT A DROITE (Objectif Final)
            // On attend que le rendu soit fait
            setTimeout(() => {
                timelineViewport.scrollLeft = timelineViewport.scrollWidth;
            }, 100);
        }

        init();

    </script>

    <!-- Modal AI -->
    <div class="modal-overlay" id="aiModal">
        <div class="modal-box">
            <div class="modal-title">Contexte copié !</div>
            <div class="modal-text">
                Le contexte de votre objectif et du jalon actuel est dans votre presse-papier.<br>
                Collez-le dans le chat (Ctrl+V), puis copiez la réponse de l'IA pour remplir le jalon.
            </div>
            <button class="modal-btn btn-go" onclick="proceedToAI()">Ouvrir le chat</button>
            <button class="modal-btn btn-close" onclick="closeAIModal()">Fermer</button>
        </div>
    </div>

</body>
</html>

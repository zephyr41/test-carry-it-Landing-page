<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Carry It - Cockpit Jalons Vertical</title>

    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #050505;
            --surface: #0F0F0F;
            --surface-active: #1A1A1A;
            --text-primary: #E0E0E0;
            --text-secondary: #666666;
            --text-dim: #333333;
            --accent: #FF4D00;
            --accent-dim: rgba(255, 77, 0, 0.1);
            --accent-glow: rgba(255, 77, 0, 0.2);
            --border: #222222;
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- HUD TOP --- */
        .hud-top {
            height: 60px;
            padding: var(--safe-top) 20px 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: var(--bg-deep);
            z-index: 100;
        }

        .hud-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hud-value { color: var(--accent); font-weight: 700; }

        /* --- LAYOUT PRINCIPAL --- */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: row;
            overflow: hidden;
            position: relative;
        }

        /* --- SIDEBAR RAIL (Vertical) --- */
        .timeline-rail {
            width: 60px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
            background: var(--bg-deep);
        }

        .timeline-track {
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding: 50vh 0; /* Centrage vertical */
            scrollbar-width: none;
        }
        .timeline-track::-webkit-scrollbar { display: none; }

        .timeline-month {
            height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0.2;
            transition: all 0.3s;
            cursor: pointer;
        }

        .timeline-month.active { opacity: 1; }

        .tick {
            width: 12px;
            height: 1px;
            background: var(--text-secondary);
            margin-bottom: 4px;
        }
        .timeline-month.active .tick {
            width: 20px;
            height: 2px;
            background: var(--accent);
        }

        .month-label { font-size: 9px; font-weight: 700; }

        /* --- VIEWPORT DES CARTES --- */
        .timeline-viewport {
            flex: 1;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            scrollbar-width: none;
            padding: 0 20px;
        }
        .timeline-viewport::-webkit-scrollbar { display: none; }

        .timeline-scroll {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0 300px 0;
            position: relative;
        }

        /* Ligne verticale de fond */
        .timeline-scroll::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 0;
            bottom: 0;
            width: 1px;
            background: linear-gradient(to bottom, transparent, var(--border) 10%, var(--border) 90%, transparent);
        }

        .card-slot {
            width: 100%;
            max-width: 400px;
            min-height: 80vh; /* On force une hauteur pour le snap */
            display: flex;
            align-items: center;
            scroll-snap-align: center;
            opacity: 0.2;
            transform: scale(0.95);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .card-slot.active { opacity: 1; transform: scale(1); }

        .card-wrapper {
            width: 100%;
            background: var(--surface);
            padding: 24px;
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-left: 20px; /* Espace pour la ligne */
            position: relative;
        }

        /* Indicateur de connexion sur la ligne */
        .card-wrapper::before {
            content: '';
            position: absolute;
            left: -25px;
            top: 50%;
            width: 10px;
            height: 10px;
            background: var(--bg-deep);
            border: 2px solid var(--accent);
            border-radius: 50%;
            transform: translateY(-50%);
            z-index: 2;
        }

        .sentinel-block {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 800;
            color: var(--accent);
        }

        .block-label {
            font-size: 9px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .input-title {
            background: transparent; border: none;
            color: var(--text-primary); font-size: 24px; font-weight: 800;
            width: 100%; border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .input-area {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px; border-radius: 4px;
            min-height: 80px; font-family: inherit; resize: none;
        }

        /* --- ADD BUTTON --- */
        .card-connector {
            position: absolute;
            bottom: -40vh; /* Entre deux cartes */
            left: -5px;
            z-index: 10;
        }
        .btn-add-jalon {
            width: 30px; height: 30px; border-radius: 50%;
            background: var(--bg-deep); border: 1px solid var(--accent);
            color: var(--accent); cursor: pointer;
        }

        /* --- CONTROLS --- */
        .controls-bottom {
            height: 80px;
            padding: 0 20px var(--safe-bottom);
            display: flex;
            gap: 10px;
            background: var(--bg-deep);
            border-top: 1px solid var(--border);
        }

        .btn-nav {
            flex: 1; height: 44px;
            background: var(--surface); border: 1px solid var(--border);
            color: var(--text-primary); font-size: 11px; font-weight: 700;
            text-transform: uppercase; cursor: pointer;
        }
        .btn-nav.primary { background: var(--text-primary); color: var(--bg-deep); }

    </style>
</head>
<body>

    <div class="hud-top">
        <div class="hud-label">COCKPIT <span class="hud-value">CARRY IT</span></div>
        <div class="hud-label" id="stepIndicator">JALON --/--</div>
        <i class="ri-settings-3-line" style="color: var(--text-secondary)"></i>
    </div>

    <div class="main-container">
        <div class="timeline-rail">
            <div class="timeline-track" id="timelineTrack"></div>
        </div>

        <div class="timeline-viewport" id="timelineViewport">
            <div class="timeline-scroll" id="timelineScroll"></div>
        </div>
    </div>

    <div class="controls-bottom">
        <button class="btn-nav" id="btnForward">PRÉCÉDENT</button>
        <button class="btn-nav primary" id="btnBackward">JALON SUIVANT</button>
    </div>

    <script>
        const projectDurationMonths = 24;
        const projectDeadline = new Date();
        projectDeadline.setMonth(projectDeadline.getMonth() + projectDurationMonths);

        let milestones = [
            { id: 'm1', offset: 0, title: "Objectif Final", desc: "Le système est stable.", kpiValue: "300 Clients" },
            { id: 'm2', offset: 6, title: "Optimisation", desc: "Maximisation conversion.", kpiValue: "" },
            { id: 'm3', offset: 12, title: "MVP Validé", desc: "Première base.", kpiValue: "Oui" },
            { id: 'm4', offset: 24, title: "Lancement", desc: "Démarrage du projet.", kpiValue: "" }
        ];

        const timelineViewport = document.getElementById('timelineViewport');
        const timelineScroll = document.getElementById('timelineScroll');
        const timelineTrack = document.getElementById('timelineTrack');
        const stepIndicator = document.getElementById('stepIndicator');

        function formatDate(offset) {
            const d = new Date(projectDeadline);
            d.setMonth(projectDeadline.getMonth() - offset);
            return d.toLocaleDateString('fr-FR', { month: 'short', year: '2-digit' }).toUpperCase();
        }

        function renderAllCards() {
            timelineScroll.innerHTML = '';
            // Tri : Du plus récent (en haut) au plus ancien (en bas)
            const sorted = [...milestones].sort((a, b) => a.offset - b.offset);

            sorted.forEach((m, idx) => {
                const slot = document.createElement('div');
                slot.className = 'card-slot';
                slot.dataset.id = m.id;
                slot.id = `card-${m.id}`;

                slot.innerHTML = `
                    <div class="card-wrapper">
                        <div class="sentinel-block">
                            <i class="ri-calendar-event-line"></i>
                            <span>${m.offset === 0 ? 'FIN PROJET' : formatDate(m.offset)}</span>
                        </div>
                        <div>
                            <div class="block-label">01 // Titre</div>
                            <input type="text" class="input-title" value="${m.title}">
                        </div>
                        <div>
                            <div class="block-label">02 // Objectif</div>
                            <textarea class="input-area">${m.desc}</textarea>
                        </div>
                    </div>
                    ${idx < sorted.length - 1 ? `<div class="card-connector"><button class="btn-add-jalon">+</button></div>` : ''}
                `;
                timelineScroll.appendChild(slot);
            });
            setupObserver();
        }

        function renderRail() {
            timelineTrack.innerHTML = '';
            for (let i = 0; i <= projectDurationMonths; i++) {
                const isM = milestones.some(m => m.offset === i);
                const el = document.createElement('div');
                el.className = `timeline-month ${isM ? 'active' : ''}`;
                el.dataset.offset = i;
                
                const d = new Date(projectDeadline);
                d.setMonth(projectDeadline.getMonth() - i);
                
                el.innerHTML = `
                    <div class="tick"></div>
                    <span class="month-label">${d.toLocaleDateString('fr-FR', {month: 'short'}).toUpperCase()}</span>
                `;
                el.onclick = () => {
                    const target = milestones.reduce((prev, curr) => Math.abs(curr.offset - i) < Math.abs(prev.offset - i) ? curr : prev);
                    document.getElementById(`card-${target.id}`).scrollIntoView({behavior:'smooth'});
                };
                timelineTrack.appendChild(el);
            }
        }

        function setupObserver() {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        document.querySelectorAll('.card-slot').forEach(c => c.classList.remove('active'));
                        entry.target.classList.add('active');
                        
                        const mid = entry.target.dataset.id;
                        const m = milestones.find(ms => ms.id === mid);
                        
                        // Sync Rail
                        document.querySelectorAll('.timeline-month').forEach(el => {
                            el.classList.toggle('active', parseInt(el.dataset.offset) === m.offset);
                            if(parseInt(el.dataset.offset) === m.offset) el.scrollIntoView({block:'center', behavior:'smooth'});
                        });

                        const sortedIds = [...milestones].sort((a,b)=>a.offset-b.offset).map(ms=>ms.id);
                        stepIndicator.innerText = `JALON ${sortedIds.indexOf(mid)+1}/${milestones.length}`;
                    }
                });
            }, { threshold: 0.6, root: timelineViewport });

            document.querySelectorAll('.card-slot').forEach(s => observer.observe(s));
        }

        document.getElementById('btnBackward').onclick = () => timelineViewport.scrollBy({top: window.innerHeight * 0.8, behavior:'smooth'});
        document.getElementById('btnForward').onclick = () => timelineViewport.scrollBy({top: -window.innerHeight * 0.8, behavior:'smooth'});

        renderAllCards();
        renderRail();
    </script>
</body>
</html>

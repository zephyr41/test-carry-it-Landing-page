<!DOCTYPE html>
<html>
<head>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<!-- CommonJS globals shim so Babel's export->exports.X output doesn't throw -->
<script>var exports = {}; var module = { exports: exports };</script>
</head>
<body>
<div id="out">pending</div>
<script type="text/babel">
const Bar = () => 2;
export { Bar };
Object.assign(window, { Bar });
</script>
<script type="text/babel">
export { };  // make this a module too, like a second component file
const Baz = () => 3;
// can this module see Bar by bare name?
let bareBar;
try { bareBar = (typeof Bar !== 'undefined') ? 'bare-Bar-VISIBLE' : 'bare-Bar-undefined'; }
catch(e) { bareBar = 'bare-Bar-THROW'; }
const winBar = (typeof window.Bar === 'function') ? 'window.Bar-ok' : 'window.Bar-MISSING';
document.getElementById('out').textContent = bareBar + ' | ' + winBar;
</script>
</body>
</html>

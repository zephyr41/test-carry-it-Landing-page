<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Spacing — Token Scale" subtitle="Base-4 spacing scale: 4px → 96px with visual bars" viewport="700x340" -->
<html lang="fr">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080809; font-family: 'DM Sans', sans-serif; padding: 28px 32px; }
  .label { font-size: 9.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #929292; margin-bottom: 16px; }
  .grid { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
  .token-row { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
  .bar { background: #EE4408; border-radius: 2px; height: 12px; flex-shrink: 0; }
  .tok { font-family: 'Courier New', monospace; font-size: 10px; color: #929292; width: 60px; }
  .px { font-size: 10px; color: #FFFDF6; font-weight: 600; width: 30px; }
  .divider { height: 1px; background: rgba(255,253,246,0.07); margin: 18px 0; }
</style>
</head>
<body>
  <div class="label">Échelle d'espacement — base 4px</div>
  <div class="token-row"><div class="tok">--space-1</div><div class="bar" style="width:4px;"></div><div class="px">4px</div></div>
  <div class="token-row"><div class="tok">--space-2</div><div class="bar" style="width:8px;"></div><div class="px">8px</div></div>
  <div class="token-row"><div class="tok">--space-3</div><div class="bar" style="width:12px;"></div><div class="px">12px</div></div>
  <div class="token-row"><div class="tok">--space-4</div><div class="bar" style="width:16px;"></div><div class="px">16px</div></div>
  <div class="token-row"><div class="tok">--space-5</div><div class="bar" style="width:20px;"></div><div class="px">20px</div></div>
  <div class="token-row"><div class="tok">--space-6</div><div class="bar" style="width:24px;"></div><div class="px">24px</div></div>
  <div class="token-row"><div class="tok">--space-8</div><div class="bar" style="width:32px;"></div><div class="px">32px</div></div>
  <div class="token-row"><div class="tok">--space-10</div><div class="bar" style="width:40px;"></div><div class="px">40px</div></div>
  <div class="token-row"><div class="tok">--space-12</div><div class="bar" style="width:48px;"></div><div class="px">48px</div></div>
  <div class="token-row"><div class="tok">--space-16</div><div class="bar" style="width:64px;"></div><div class="px">64px</div></div>
  <div class="token-row"><div class="tok">--space-20</div><div class="bar" style="width:80px;"></div><div class="px">80px</div></div>
  <div class="token-row"><div class="tok">--space-24</div><div class="bar" style="width:96px;"></div><div class="px">96px</div></div>
</body>
</html>

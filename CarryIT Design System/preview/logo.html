<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Brand — Logo" subtitle="Logo mark + Rifton wordmark lockup, variants" viewport="700x150" -->
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: "Rifton";
    src: url("../fonts/rifton-regular.woff2") format("woff2");
    font-weight: 400; font-style: normal;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #080809;
    display: flex; align-items: center; justify-content: center;
    min-height: 150px; padding: 24px 32px;
  }
  .logo-lockup {
    display: flex; align-items: center; gap: 16px;
  }
  .logo-mark { width: 56px; height: 56px; }
  .logo-text {
    display: flex; flex-direction: column;
  }
  .wordmark {
    font-family: "Rifton", Georgia, serif;
    font-size: 32px; font-weight: 400;
    color: #FFFDF6; letter-spacing: -0.03em; line-height: 1;
  }
  .tagline {
    font-family: 'system-ui', sans-serif;
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: #929292; margin-top: 4px;
  }
  .divider-v { width: 1px; height: 48px; background: rgba(255,253,246,0.1); margin: 0 12px; }
  .variants { display: flex; flex-direction: column; gap: 16px; align-items: center; flex: 1; }
  .logo-sm {
    font-family: "Rifton", Georgia, serif; font-size: 20px; color: #FFFDF6;
    letter-spacing: -0.02em;
  }
  .logo-accent {
    font-family: "Rifton", Georgia, serif; font-size: 28px; color: #FFFDF6;
    letter-spacing: -0.03em;
  }
  .logo-accent span { color: #EE4408; }
</style>
</head>
<body>
  <div class="logo-lockup">
    <img class="logo-mark" src="../assets/logo.png" alt="CarryIT logo mark">
    <div class="logo-text">
      <div class="wordmark">CarryIT</div>
      <div class="tagline">Goal tracking</div>
    </div>
    <div class="divider-v"></div>
    <div class="variants">
      <div class="logo-sm">CarryIT</div>
      <div class="logo-accent">Carry<span>IT</span></div>
    </div>
  </div>
</body>
</html>

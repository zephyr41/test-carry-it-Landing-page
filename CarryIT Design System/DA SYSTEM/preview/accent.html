<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DA System — Accent</title>
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="accent.css">
</head>
<body>
  <main class="accent-preview">
    <section class="accent-preview__shell">
      <header class="accent-preview__header">
        <div class="type-label">Accent</div>
        <h1 class="type-h1">Orange action</h1>
      </header>

      <div class="accent-grid">
        <article class="accent-card">
          <div class="accent-swatch accent-swatch--primary"></div>
          <div class="type-h3">Primary</div>
          <div class="type-caption accent-meta">--color-accent-primary · #EE4408</div>
        </article>

        <article class="accent-card">
          <div class="accent-swatch accent-swatch--hover"></div>
          <div class="type-h3">Hover</div>
          <div class="type-caption accent-meta">--color-accent-hover · #d83a06</div>
        </article>

        <article class="accent-card">
          <div class="accent-swatch accent-swatch--active"></div>
          <div class="type-h3">Active</div>
          <div class="type-caption accent-meta">--color-accent-active · #C83205</div>
        </article>

      </div>

      <section class="accent-card">
        <button class="accent-action" type="button">Structurer mon ambition</button>
      </section>
    </section>
  </main>
</body>
</html>

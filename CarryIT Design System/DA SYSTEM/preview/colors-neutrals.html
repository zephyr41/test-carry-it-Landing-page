<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DA System — Couleurs des cartes (background / surface)</title>
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="colors-neutrals.css">
</head>
<body>
  <main class="colors-preview">
    <section class="colors-preview__shell">
      <header class="colors-preview__header">
        <div class="type-label">Colors</div>
        <h1 class="type-h1">Background / Surface</h1>
      </header>

      <div class="colors-grid">
        <div class="swatch swatch--bg">
          <div class="type-label">background</div>
          <div class="swatch-hex">#0A0A0B</div>
          <div class="type-caption">Fond de page de base</div>
        </div>
        <div class="swatch swatch--surface">
          <div class="type-label">surface</div>
          <div class="swatch-hex">#161617</div>
          <div class="type-caption">Toute carte / panneau — un seul niveau</div>
        </div>
        <div class="swatch swatch--surface-raised">
          <div class="type-label">surface-raised</div>
          <div class="swatch-hex">#262628</div>
          <div class="type-caption">Champs (input/textarea) — se détache du panneau derrière</div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>

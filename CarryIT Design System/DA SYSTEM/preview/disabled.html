<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DA System — Disabled</title>
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="disabled.css">
</head>
<body>
  <main class="disabled-preview">
    <section class="disabled-preview__shell">
      <header class="disabled-preview__header">
        <div class="type-label">Disabled</div>
        <h1 class="type-h1">État indisponible générique</h1>
      </header>

      <div class="disabled-grid">
        <article class="disabled-card">
          <div class="type-h3">État normal</div>
          <p class="type-body-md">Surface active, lisible, disponible.</p>
          <div class="type-caption">Container standard</div>
        </article>

        <article class="disabled-card disabled-card--off">
          <div class="type-h3">État disabled</div>
          <p class="type-body-md">Élément visible mais indisponible.</p>
          <div class="type-caption">Disabled générique</div>
        </article>
      </div>
    </section>
  </main>
</body>
</html>

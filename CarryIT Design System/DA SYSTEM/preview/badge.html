<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DA System — Badge</title>
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="badge.css">
</head>
<body>
  <main class="badge-preview">
    <section class="badge-preview__shell">
      <header class="badge-preview__header">
        <div class="type-label">Badge</div>
        <h1 class="type-h1">Statut de jalon</h1>
      </header>

      <section class="badge-stage">
        <span class="ds-badge ds-badge--muted">Passé</span>
        <span class="ds-badge ds-badge--active">Actif</span>
        <span class="ds-badge">Futur</span>
      </section>

      <header class="badge-preview__header badge-preview__header--secondary">
        <div class="type-label">Badge</div>
        <h1 class="type-h2">Statut de tâche</h1>
      </header>

      <section class="badge-stage">
        <span class="ds-badge">À faire</span>
        <span class="ds-badge ds-badge--active">En cours</span>
        <span class="ds-badge ds-badge--muted">Terminé</span>
      </section>
    </section>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DA System — Spacing</title>
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="spacing.css">
</head>
<body>
  <main class="spacing-preview">
    <section class="spacing-preview__shell">
      <header class="spacing-preview__header">
        <div class="type-label">Espacement</div>
        <h1 class="type-h1">Base 4px</h1>
      </header>

      <div class="spacing-scale">
        <div class="spacing-row">
          <div class="type-caption spacing-row__meta">--space-4 · 4px</div>
          <div class="spacing-bar spacing-bar--4"></div>
        </div>
        <div class="spacing-row">
          <div class="type-caption spacing-row__meta">--space-8 · 8px</div>
          <div class="spacing-bar spacing-bar--8"></div>
        </div>
        <div class="spacing-row">
          <div class="type-caption spacing-row__meta">--space-12 · 12px</div>
          <div class="spacing-bar spacing-bar--12"></div>
        </div>
        <div class="spacing-row">
          <div class="type-caption spacing-row__meta">--space-16 · 16px</div>
          <div class="spacing-bar spacing-bar--16"></div>
        </div>
        <div class="spacing-row">
          <div class="type-caption spacing-row__meta">--space-24 · 24px</div>
          <div class="spacing-bar spacing-bar--24"></div>
        </div>
        <div class="spacing-row">
          <div class="type-caption spacing-row__meta">--space-32 · 32px</div>
          <div class="spacing-bar spacing-bar--32"></div>
        </div>
        <div class="spacing-row">
          <div class="type-caption spacing-row__meta">--space-48 · 48px</div>
          <div class="spacing-bar spacing-bar--48"></div>
        </div>
        <div class="spacing-row">
          <div class="type-caption spacing-row__meta">--space-64 · 64px</div>
          <div class="spacing-bar spacing-bar--64"></div>
        </div>
      </div>

      <section class="spacing-usage">
        <article class="spacing-card">
          <div class="type-h3">Carte dashboard</div>
          <p class="type-body-md">Padding carte : 24px. Gap élément : 12px. Gap section : 32px.</p>
        </article>
        <article class="spacing-card spacing-card--compact">
          <div class="type-h3">Carte KPI compacte</div>
          <p class="type-body-md">Padding compact : 16px.</p>
        </article>
      </section>
    </section>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DA System — Radius</title>
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="radius.css">
</head>
<body>
  <main class="radius-preview">
    <section class="radius-preview__shell">
      <header class="radius-preview__header">
        <div class="type-label">Radius</div>
        <h1 class="type-h1">Rayons sobres</h1>
      </header>

      <div class="radius-grid">
        <div class="radius-item">
          <div class="radius-box radius-box--sm"></div>
          <div class="type-caption radius-meta">--radius-sm<br>6px · badges</div>
        </div>
        <div class="radius-item">
          <div class="radius-box radius-box--md"></div>
          <div class="type-caption radius-meta">--radius-md<br>8px · buttons</div>
        </div>
        <div class="radius-item">
          <div class="radius-box radius-box--lg"></div>
          <div class="type-caption radius-meta">--radius-lg<br>8px · cards</div>
        </div>
        <div class="radius-item">
          <div class="radius-box radius-box--xl"></div>
          <div class="type-caption radius-meta">--radius-xl<br>12px · modals</div>
        </div>
        <div class="radius-item">
          <div class="radius-box radius-box--full"></div>
          <div class="type-caption radius-meta">--radius-full<br>pill</div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>

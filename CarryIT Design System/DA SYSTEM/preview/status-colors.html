<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DA System — Status Colors</title>
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="status-colors.css">
</head>
<body>
  <main class="status-preview">
    <section class="status-preview__shell">
      <header class="status-preview__header">
        <div class="type-label">Status</div>
        <h1 class="type-h1">Couleurs texte sémantiques</h1>
      </header>

      <div class="status-grid">
        <article class="status-card status-card--danger">
          <div class="type-h3 status-title">Danger</div>
          <p class="type-body-md status-text">Erreur critique ou action destructive.</p>
          <div class="type-caption status-meta">--color-danger · #F87171</div>
        </article>

        <article class="status-card status-card--success">
          <div class="type-h3 status-title">Success</div>
          <p class="type-body-md status-text">Confirmation système, pas récompense.</p>
          <div class="type-caption status-meta">--color-success · #4ADE80</div>
        </article>

      </div>
    </section>
  </main>
</body>
</html>

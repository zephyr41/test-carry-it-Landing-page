<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DA System — Timeline</title>
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="timeline.css">
</head>
<body>
  <main class="timeline-preview">
    <section class="timeline-preview__shell">
      <header class="timeline-preview__header">
        <div class="type-label">Component tokens</div>
        <h1 class="type-h1">Timeline</h1>
      </header>

      <article class="ds-timeline">
        <header class="ds-timeline__head">
          <span class="type-data-label">Jalons</span>
          <span class="ds-timeline__count type-data-label" data-timeline-count>—</span>
        </header>

        <ol class="ds-timeline__list" data-timeline-list></ol>
      </article>

      <article class="ds-jalon-active" data-jalon-active hidden>
        <span class="ds-jalon-active__eyebrow type-data-label" data-active-eyebrow></span>
        <h3 class="ds-jalon-active__title type-h2" data-active-title></h3>
        <ol class="ds-jalon-active__steps" data-active-steps></ol>
      </article>
    </section>
  </main>
  <script src="timeline.js"></script>
</body>
</html>

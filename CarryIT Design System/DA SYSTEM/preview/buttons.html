<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DA System — Buttons</title>
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="buttons.css">
</head>
<body>
  <main class="buttons-preview">
    <section class="buttons-preview__shell">
      <header class="buttons-preview__header">
        <div class="type-label">Buttons</div>
        <h1 class="type-h1">Trois intentions</h1>
      </header>

      <section class="buttons-stage">
        <div class="buttons-row">
          <button class="ds-button ds-button--primary" type="button">Structurer mon ambition.</button>
          <button class="ds-button ds-button--ghost" type="button">Voir le système</button>
          <button class="ds-button ds-button--inverse" type="button">Définir les Jalons →</button>
        </div>

        <div class="buttons-row">
          <button class="ds-button ds-button--primary" type="button" disabled>Structurer mon ambition.</button>
          <button class="ds-button ds-button--ghost" type="button" disabled>Voir le système</button>
          <button class="ds-button ds-button--inverse" type="button" disabled>Définir les Jalons →</button>
        </div>
      </section>
    </section>
  </main>
</body>
</html>

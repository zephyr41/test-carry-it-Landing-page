<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DA System — Motion</title>
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="motion.css">
</head>
<body>
  <main class="motion-preview">
    <section class="motion-preview__shell">
      <header class="motion-preview__header">
        <div class="type-label">Motion</div>
        <h1 class="type-h1">Transitions sobres</h1>
      </header>

      <article class="motion-sample">
        <div class="type-h3">État hover / focus</div>

        <div class="motion-progress">
          <div class="motion-progress__bar"></div>
        </div>

      </article>
    </section>
  </main>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DA System — Borders</title>
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="borders.css">
</head>
<body>
  <main class="borders-preview">
    <section class="borders-preview__shell">
      <header class="borders-preview__header">
        <div class="type-label">Borders</div>
        <h1 class="type-h1">1px fonctionnel</h1>
      </header>

      <div class="borders-grid">
        <article class="border-card border-card--subtle">
          <div class="type-h3">Carte standard</div>
          <div class="border-divider"></div>
          <p class="type-body-md">Border subtle pour séparer une surface sans attirer l’attention.</p>
          <div class="type-caption border-card__meta">--border-subtle</div>
        </article>

        <article class="border-card border-card--strong">
          <div class="type-h3">État actif</div>
          <div class="border-divider"></div>
          <p class="type-body-md">Border strong pour une limite fonctionnelle, sélection ou focus à forte lisibilité.</p>
          <div class="type-caption border-card__meta">--border-strong</div>
        </article>
      </div>
    </section>
  </main>
</body>
</html>

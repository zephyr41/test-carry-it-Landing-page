<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DA System — Icons audit</title>
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="icons-audit.css">
</head>
<body>
  <main class="icons-audit-preview">
    <section class="icons-audit-preview__shell">
      <header class="icons-audit-preview__header">
        <div class="type-label">Icons audit</div>
        <h1 class="type-h1">Variantes tranchées</h1>
        <p class="icons-audit-preview__hint type-body-md">Une seule icône par intention, choisie parmi les candidates de la prod.</p>
      </header>

      <section class="icons-audit-group">
        <div class="icons-audit-row">
          <div class="icons-audit-card">
            <svg class="icons-audit-card__icon" viewBox="0 0 20 20"><path d="M5 7.5l5 5 5-5" stroke-width="1.5" /></svg>
            <span class="icons-audit-card__label type-caption">Chevron bas</span>
          </div>
          <div class="icons-audit-card">
            <svg class="icons-audit-card__icon" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12" stroke-width="2.2" /></svg>
            <span class="icons-audit-card__label type-caption">Fermer</span>
          </div>
          <div class="icons-audit-card">
            <svg class="icons-audit-card__icon" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2.5" /></svg>
            <span class="icons-audit-card__label type-caption">Plus / Ajouter</span>
          </div>
          <div class="icons-audit-card">
            <svg class="icons-audit-card__icon" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2" /></svg>
            <span class="icons-audit-card__label type-caption">Corbeille</span>
          </div>
          <div class="icons-audit-card">
            <svg class="icons-audit-card__icon" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" stroke-width="1.8" /></svg>
            <span class="icons-audit-card__label type-caption">Édition</span>
          </div>
          <div class="icons-audit-card">
            <svg class="icons-audit-card__icon" viewBox="0 0 14 14"><path d="M9 2L4 7L9 12" stroke-width="1.8" /></svg>
            <span class="icons-audit-card__label type-caption">Retour</span>
          </div>
        </div>
      </section>
    </section>
  </main>
</body>
</html>

<!DOCTYPE html>
<!-- @dsCard group="Components" name="Components — Form Inputs" subtitle="Unifié avec components.css" viewport="700x520" -->
<html lang="fr">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>
  body { padding: 28px 32px; }
  .row { display: flex; gap: 16px; }
  .row .form-group { flex: 1; }

  /* Snap states — visuels figés pour la référence */
  .input--hover {
    border-color: rgba(242,241,236,0.22);
  }
</style>
</head>
<body>

  <div class="ds-label">Input — 5 états</div>

  <div class="row">
    <div class="form-group">
      <label class="form-label">default</label>
      <input class="input" type="text" placeholder="Nom du KPI…">
    </div>
    <div class="form-group">
      <label class="form-label">hover</label>
      <input class="input input--hover" type="text" placeholder="Nom du KPI…">
    </div>
    <div class="form-group">
      <label class="form-label">focus</label>
      <input class="input input--focus" type="text" value="Clients actifs">
    </div>
  </div>

  <div class="sep"></div>

  <div class="row">
    <div class="form-group">
      <label class="form-label">error</label>
      <input class="input input--error" type="text" value="clients">
      <div class="form-error">Champ requis</div>
    </div>
    <div class="form-group">
      <label class="form-label">disabled</label>
      <input class="input input--disabled" type="text" disabled value="Clients actifs">
    </div>
    <div class="form-group"></div>
  </div>

  <div class="ds-divider"></div>
  <div class="ds-label">Tâches — cases à cocher</div>
  <div class="task-row">
    <div class="checkbox checkbox--checked"><span class="checkbox__mark">✓</span></div>
    <span class="task-label task-label--done">Cahier des charges finalisé</span>
  </div>
  <div class="task-row">
    <div class="checkbox"></div>
    <span class="task-label">Définir l'ICP du produit</span>
  </div>
  <div class="task-row">
    <div class="checkbox"></div>
    <span class="task-label">Rédiger la USP principale</span>
  </div>

</body>
</html>

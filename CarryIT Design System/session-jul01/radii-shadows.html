<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Spacing — Radii & Shadows" subtitle="4 border radii + pill + 5 elevation shadows" viewport="700x280" -->
<html lang="fr">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>
  body { padding: 28px 32px; }
  .label { font-size: 9.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #929292; margin-bottom: 16px; }
  .divider { height: 1px; background: rgba(255,253,246,0.07); margin: 20px 0; }

  /* Radii */
  .radii-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
  .radius-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .radius-box { width: 52px; height: 52px; background: #1A1A1C; border: 1px solid rgba(255,253,246,0.15); }
  .radius-meta { font-size: 9.5px; color: #929292; text-align: center; font-family: var(--font-mono); }

  .r-sm   { border-radius: var(--radius-sm); }
  .r-md   { border-radius: var(--radius-md); }
  .r-lg   { border-radius: var(--radius-lg); }
  .r-xl   { border-radius: var(--radius-xl); }
  .r-full { border-radius: var(--radius-full); width: 80px; height: 34px; }

  /* Shadows */
  .shadow-row { display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-end; padding-top: 4px; }
  .shadow-item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .shadow-box { width: 64px; height: 40px; background: #111112; border-radius: var(--radius-md); border: 1px solid rgba(255,253,246,0.08); }
  .shadow-meta { font-size: 9.5px; color: #929292; text-align: center; font-family: var(--font-mono); }

  .s-sm     { box-shadow: var(--shadow-sm); }
  .s-md     { box-shadow: var(--shadow-md); }
  .s-lg     { box-shadow: var(--shadow-lg); }
  .s-xl     { box-shadow: var(--shadow-xl); }
  .s-accent { box-shadow: var(--shadow-accent); border-color: rgba(238,68,8,0.3); }
</style>
</head>
<body>
  <div class="label">Rayons de bordure</div>
  <div class="radii-row">
    <div class="radius-item">
      <div class="radius-box r-sm"></div>
      <div class="radius-meta">--radius-sm<br>6px · badges</div>
    </div>
    <div class="radius-item">
      <div class="radius-box r-md"></div>
      <div class="radius-meta">--radius-md<br>8px · buttons</div>
    </div>
    <div class="radius-item">
      <div class="radius-box r-lg"></div>
      <div class="radius-meta">--radius-lg<br>12px · cards</div>
    </div>
    <div class="radius-item">
      <div class="radius-box r-xl"></div>
      <div class="radius-meta">--radius-xl<br>16px · modals</div>
    </div>
    <div class="radius-item">
      <div class="radius-box r-full"></div>
      <div class="radius-meta">--radius-full<br>pill</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="label">Ombres — élévation</div>
  <div class="shadow-row">
    <div class="shadow-item">
      <div class="shadow-box s-sm"></div>
      <div class="shadow-meta">--shadow-sm</div>
    </div>
    <div class="shadow-item">
      <div class="shadow-box s-md"></div>
      <div class="shadow-meta">--shadow-md</div>
    </div>
    <div class="shadow-item">
      <div class="shadow-box s-lg"></div>
      <div class="shadow-meta">--shadow-lg</div>
    </div>
    <div class="shadow-item">
      <div class="shadow-box s-xl"></div>
      <div class="shadow-meta">--shadow-xl</div>
    </div>
    <div class="shadow-item">
      <div class="shadow-box s-accent"></div>
      <div class="shadow-meta">--shadow-accent</div>
    </div>
  </div>
</body>
</html>

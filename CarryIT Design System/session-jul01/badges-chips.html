<!DOCTYPE html>
<!-- @dsCard group="Components" name="Components — Badges & Chips" subtitle="Unifié avec components.css" viewport="700x320" -->
<html lang="fr">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../components.css">
<style>
  body { padding: 28px 32px; }
</style>
</head>
<body>
  <div class="ds-label">Badges SMART</div>
  <div class="ds-row" style="margin-bottom:16px;">
    <div class="badge-smart badge-smart--active">S</div>
    <div class="badge-smart badge-smart--default">M</div>
    <div class="badge-smart badge-smart--default">A</div>
    <div class="badge-smart badge-smart--default">R</div>
    <div class="badge-smart badge-smart--default">T</div>
  </div>

  <div class="ds-divider"></div>
  <div class="ds-label">Statut de jalon</div>
  <div class="ds-row" style="margin-bottom:16px;">
    <div class="chip chip--active"><div class="chip__dot"></div>En cours</div>
    <div class="chip chip--done"><div class="chip__dot"></div>Terminé</div>
    <div class="chip chip--upcoming"><div class="chip__dot"></div>À venir</div>
    <div class="chip chip--late"><div class="chip__dot"></div>En retard</div>
  </div>

  <div class="ds-divider"></div>
  <div class="ds-label">Position dans la timeline</div>
  <div class="ds-row" style="margin-bottom:16px;">
    <div class="badge-position">MOIS 1</div>
    <div class="badge-position" style="color:#EE4408;border-color:rgba(238,68,8,0.3);background:rgba(238,68,8,0.08);">Jalon 1/4 · En cours</div>
    <div class="badge-position">Avr 2026</div>
  </div>

  <div class="ds-divider"></div>
  <div class="ds-label">Tags inline</div>
  <div class="ds-row">
    <div class="tag tag--priority">Priorité</div>
    <div class="tag tag--neutral">En attente</div>
  </div>
</body>
</html>

<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Spacing — Token Scale" subtitle="Base-4 spacing scale : --space-1 à --space-24 (4px → 96px)" viewport="700x420" -->
<html lang="fr">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>
  body { padding: 28px 32px; }
  .label { font-size: 9.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #929292; margin-bottom: 16px; }
  .divider { height: 1px; background: rgba(255,253,246,0.07); margin: 20px 0; }

  .scale-row { display: flex; flex-direction: column; gap: 10px; }
  .scale-item { display: grid; grid-template-columns: 140px 1fr; align-items: center; gap: 16px; }
  .scale-meta { font-family: var(--font-mono); font-size: 9.5px; color: #929292; }
  .scale-meta strong { color: var(--color-text-primary); font-weight: 600; }
  .scale-bar { height: 10px; border-radius: var(--radius-sm); background: var(--color-accent); }

  .sp-1  { width: var(--space-1); }
  .sp-2  { width: var(--space-2); }
  .sp-3  { width: var(--space-3); }
  .sp-4  { width: var(--space-4); }
  .sp-5  { width: var(--space-5); }
  .sp-6  { width: var(--space-6); }
  .sp-8  { width: var(--space-8); }
  .sp-10 { width: var(--space-10); }
  .sp-12 { width: var(--space-12); }
  .sp-16 { width: var(--space-16); }
  .sp-20 { width: var(--space-20); }
  .sp-24 { width: var(--space-24); }
</style>
</head>
<body>
  <div class="label">Échelle d'espacement — base 4px</div>
  <div class="scale-row">
    <div class="scale-item">
      <div class="scale-meta"><strong>--space-1</strong><br>4px</div>
      <div class="scale-bar sp-1"></div>
    </div>
    <div class="scale-item">
      <div class="scale-meta"><strong>--space-2</strong><br>8px</div>
      <div class="scale-bar sp-2"></div>
    </div>
    <div class="scale-item">
      <div class="scale-meta"><strong>--space-3</strong><br>12px</div>
      <div class="scale-bar sp-3"></div>
    </div>
    <div class="scale-item">
      <div class="scale-meta"><strong>--space-4</strong><br>16px</div>
      <div class="scale-bar sp-4"></div>
    </div>
    <div class="scale-item">
      <div class="scale-meta"><strong>--space-5</strong><br>20px</div>
      <div class="scale-bar sp-5"></div>
    </div>
    <div class="scale-item">
      <div class="scale-meta"><strong>--space-6</strong><br>24px</div>
      <div class="scale-bar sp-6"></div>
    </div>
    <div class="scale-item">
      <div class="scale-meta"><strong>--space-8</strong><br>32px</div>
      <div class="scale-bar sp-8"></div>
    </div>
    <div class="scale-item">
      <div class="scale-meta"><strong>--space-10</strong><br>40px</div>
      <div class="scale-bar sp-10"></div>
    </div>
    <div class="scale-item">
      <div class="scale-meta"><strong>--space-12</strong><br>48px</div>
      <div class="scale-bar sp-12"></div>
    </div>
    <div class="scale-item">
      <div class="scale-meta"><strong>--space-16</strong><br>64px</div>
      <div class="scale-bar sp-16"></div>
    </div>
    <div class="scale-item">
      <div class="scale-meta"><strong>--space-20</strong><br>80px</div>
      <div class="scale-bar sp-20"></div>
    </div>
    <div class="scale-item">
      <div class="scale-meta"><strong>--space-24</strong><br>96px</div>
      <div class="scale-bar sp-24"></div>
    </div>
  </div>
</body>
</html>

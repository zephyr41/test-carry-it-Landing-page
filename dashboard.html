<!DOCTYPE html>
<html lang="fr" class="dark-mode">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dashboard · Carry It</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="styles.css">

    <style>
        /* ── CSS VARIABLES ── */
        :root {
            --mono: 'DM Mono', 'Courier New', monospace;
        }

        /* ── DASHBOARD PAGE ── */
        body {
            padding-top: var(--navbar-height, 72px);
            background: #070708;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.011) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.011) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .dashboard-section,
        .dashboard-section.active {
            display: block !important;
            min-height: 0 !important;
            padding: 32px 40px 80px !important;
            background: transparent;
            position: relative;
            z-index: 1;
        }

        .dashboard-container {
            padding: 0 !important;
            max-width: 1240px !important;
            margin: 0 auto !important;
        }

        #dbPanels,
        .db-panel,
        .db-panel.active {
            width: 100%;
        }

        .navbar-link.active {
            color: #F5F3EC;
        }

        /* ── PROJECT CARD ── */
        .proj-card {
            background: #0d0d0f;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 0;
            transition: none;
            box-shadow: 0 40px 80px rgba(0,0,0,0.45), 0 1px 0 rgba(255,255,255,0.04) inset;
        }

        .proj-header {
            padding: 32px 36px 28px;
            border-bottom: 1px solid rgba(255,255,255,0.055);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            position: relative;
            background: linear-gradient(180deg, rgba(238,68,8,0.035) 0%, transparent 100%);
        }

        .proj-header::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #EE4408 0%, rgba(238,68,8,0.15) 50%, transparent 100%);
        }

        .proj-header-left { flex: 1; }

        .proj-title {
            font-family: 'Rifton', serif;
            font-style: italic;
            font-size: clamp(28px, 3.8vw, 50px);
            color: #F5F3EC;
            line-height: 1.0;
            margin: 0 0 16px;
            letter-spacing: -0.03em;
        }

        .proj-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .proj-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            color: rgba(255,255,255,0.38);
            letter-spacing: 0.07em;
            text-transform: uppercase;
            font-family: var(--mono);
        }

        .proj-badge-t {
            background: rgba(238,68,8,0.06);
            border-color: rgba(238,68,8,0.18);
            color: #EE4408;
        }

        .proj-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            padding-top: 4px;
        }

        .proj-edit-link {
            font-size: 11px;
            font-weight: 600;
            color: rgba(255,255,255,0.28);
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.07);
            transition: all 0.2s;
            white-space: nowrap;
            letter-spacing: 0.03em;
            font-family: var(--mono);
        }

        .proj-edit-link:hover {
            color: #EE4408;
            border-color: rgba(238,68,8,0.28);
            background: rgba(238,68,8,0.06);
        }

        .proj-btn-icon {
            width: 34px;
            height: 34px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.07);
            background: transparent;
            color: rgba(255,255,255,0.22);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .proj-btn-icon:hover {
            background: rgba(255,59,48,0.08);
            border-color: rgba(255,59,48,0.22);
            color: #FF3B30;
        }

        /* ── BODY ── */
        .proj-body {
            padding: 28px 36px 36px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 2-col row */
        .db-2col {
            display: grid;
            grid-template-columns: 1fr 1.65fr;
            gap: 16px;
        }

        /* ── SMART PANEL ── */
        .smart-panel {
            background: rgba(255,255,255,0.018);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 20px 22px;
            display: flex;
            flex-direction: column;
        }

        .smart-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .smart-edit-btn {
            font-size: 10px;
            font-weight: 600;
            color: rgba(255,255,255,0.28);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 5px;
            border: 1px solid rgba(255,255,255,0.07);
            background: transparent;
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--mono);
            letter-spacing: 0.04em;
        }

        .smart-edit-btn:hover {
            color: #EE4408;
            border-color: rgba(238,68,8,0.28);
            background: rgba(238,68,8,0.06);
        }

        .smart-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.045);
        }

        .smart-row:last-child { border-bottom: none; }

        .smart-letter {
            flex-shrink: 0;
            padding-top: 1px;
        }

        .smart-letter-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            background: rgba(238,68,8,0.1);
            border: 1px solid rgba(238,68,8,0.2);
            border-radius: 5px;
            font-size: 11px;
            font-weight: 800;
            color: #EE4408;
            font-family: var(--mono);
        }

        .smart-texts { flex: 1; min-width: 0; }

        .smart-sublabel {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.11em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.2);
            margin-bottom: 3px;
            font-family: var(--mono);
        }

        .smart-value {
            font-size: 12px;
            color: rgba(255,255,255,0.62);
            line-height: 1.55;
            word-break: break-word;
            font-family: var(--mono);
        }

        .smart-edit {
            display: none;
            flex-direction: column;
            gap: 10px;
        }

        .smart-edit-row {
            display: grid;
            grid-template-columns: 18px 1fr;
            gap: 8px;
            align-items: start;
        }

        .smart-edit-label {
            font-size: 12px;
            font-weight: 800;
            color: #EE4408;
            padding-top: 8px;
            font-family: var(--mono);
        }

        .smart-input {
            width: 100%;
            min-height: 48px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 10px 12px;
            color: #F5F3EC;
            font-size: 13px;
            font-family: var(--mono);
            outline: none;
            resize: vertical;
            transition: border-color 0.2s;
        }

        .smart-input:focus { border-color: rgba(238,68,8,0.5); }
        .smart-input.invalid { border-color: #FF453A; }

        .smart-edit-actions {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }

        .smart-btn {
            height: 34px;
            padding: 0 14px;
            border-radius: 7px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid transparent;
            font-family: var(--mono);
        }

        .smart-btn-cancel {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.1);
            color: #F5F3EC;
        }

        .smart-btn-save {
            background: #EE4408;
            border-color: #EE4408;
            color: #fff;
        }

        .smart-error {
            font-size: 11px;
            color: #FF453A;
            display: none;
            font-family: var(--mono);
        }

        .smart-error.show { display: block; }

        /* ── KPI PANEL ── */
        .kpi-panel {
            background: rgba(255,255,255,0.018);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 20px 22px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .kpi-panel-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .kpi-title {
            font-size: 13px;
            font-weight: 700;
            color: #F5F3EC;
            margin-bottom: 2px;
        }

        .kpi-unit-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.28);
            font-family: var(--mono);
        }

        .kpi-add-btn {
            height: 30px;
            padding: 0 12px;
            background: rgba(238,68,8,0.08);
            border: 1px solid rgba(238,68,8,0.22);
            color: #EE4408;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            font-family: var(--mono);
            letter-spacing: 0.03em;
        }

        .kpi-add-btn:hover { background: rgba(238,68,8,0.18); }

        .kpi-chart-area {
            flex: 1;
            min-height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .kpi-chart-area canvas {
            width: 100% !important;
        }

        .kpi-empty {
            text-align: center;
            padding: 20px 16px;
            width: 100%;
        }

        .kpi-empty svg { opacity: 0.55; }

        .kpi-empty-title {
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,0.42);
            margin: 12px 0 6px;
        }

        .kpi-empty-sub {
            font-size: 11px;
            color: rgba(255,255,255,0.2);
            line-height: 1.6;
            font-family: var(--mono);
        }

        .kpi-single-wrap { text-align: center; width: 100%; }

        .kpi-big-val {
            font-size: 56px;
            font-weight: 800;
            color: #EE4408;
            letter-spacing: -3px;
            line-height: 1;
            font-family: 'Rifton', serif;
            font-style: italic;
        }

        .kpi-big-unit {
            font-size: 11px;
            color: rgba(255,255,255,0.28);
            margin-top: 8px;
            font-family: var(--mono);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .kpi-single-hint {
            font-size: 11px;
            color: rgba(255,255,255,0.18);
            margin-top: 14px;
            font-family: var(--mono);
        }

        .kpi-stats {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .kpi-current-val {
            font-size: 18px;
            font-weight: 700;
            color: #F5F3EC;
            font-family: var(--mono);
        }

        .kpi-current-label {
            font-size: 10px;
            color: rgba(255,255,255,0.26);
            margin-top: 2px;
            font-family: var(--mono);
            letter-spacing: 0.03em;
        }

        .kpi-prog-badge {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 4px;
            background: rgba(238,68,8,0.1);
            color: #EE4408;
            font-family: var(--mono);
            letter-spacing: 0.04em;
            border: 1px solid rgba(238,68,8,0.15);
        }

        /* ── TODO PANEL ── */
        .section-lbl {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.32);
            margin-bottom: 14px;
            font-family: var(--mono);
        }

        .todo-panel {
            background: rgba(255,255,255,0.018);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 20px 22px;
        }

        .todo-row {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }

        .todo-input {
            flex: 1;
            height: 40px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 8px;
            padding: 0 14px;
            color: #F5F3EC;
            font-size: 13px;
            font-family: var(--mono);
            outline: none;
            transition: border-color 0.2s;
        }

        .todo-input:focus { border-color: rgba(238,68,8,0.4); }
        .todo-input::placeholder { color: rgba(255,255,255,0.16); font-style: italic; }

        .todo-plus-btn {
            width: 40px;
            height: 40px;
            background: rgba(238,68,8,0.1);
            border: 1px solid rgba(238,68,8,0.25);
            color: #EE4408;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .todo-plus-btn:hover { background: rgba(238,68,8,0.2); }

        .todo-list { display: flex; flex-direction: column; gap: 2px; }

        .todo-empty {
            text-align: center;
            padding: 20px;
            font-size: 11px;
            color: rgba(255,255,255,0.18);
            font-family: var(--mono);
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 7px;
            transition: background 0.15s;
            cursor: default;
        }

        .todo-item:hover { background: rgba(255,255,255,0.03); }
        .todo-item:hover .todo-del { opacity: 1; }
        .todo-item:hover .todo-edit { opacity: 1; }

        .todo-cb {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            border: 1.5px solid rgba(255,255,255,0.18);
            background: transparent;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            pointer-events: none;
        }

        .todo-item.done .todo-cb {
            background: rgba(238,68,8,0.18);
            border-color: #EE4408;
        }

        .todo-item.done .todo-cb::after {
            content: '';
            width: 8px;
            height: 5px;
            border-left: 1.5px solid #EE4408;
            border-bottom: 1.5px solid #EE4408;
            transform: rotate(-45deg) translateY(-1px);
        }

        .todo-text {
            flex: 1;
            font-size: 13px;
            color: rgba(255,255,255,0.65);
            line-height: 1.4;
            user-select: none;
            font-family: var(--mono);
        }

        .todo-item.done .todo-text {
            text-decoration: line-through;
            color: rgba(255,255,255,0.2);
        }

        .todo-del {
            width: 22px;
            height: 22px;
            border-radius: 4px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.18);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .todo-del:hover {
            color: #EE4408;
            background: rgba(238,68,8,0.08);
        }

        .todo-drop {
            width: 22px;
            height: 22px;
            border-radius: 4px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.38);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .todo-drop:hover {
            color: #EE4408;
            background: rgba(238,68,8,0.08);
        }

        .todo-edit {
            width: 22px;
            height: 22px;
            border-radius: 4px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.18);
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .todo-edit:hover {
            color: #EE4408;
            background: rgba(238,68,8,0.08);
        }

        .todo-edit-row {
            display: flex;
            gap: 6px;
            align-items: center;
            width: 100%;
        }

        .todo-edit-input {
            flex: 1;
            height: 32px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            padding: 0 10px;
            color: #F5F3EC;
            font-size: 12px;
            font-family: var(--mono);
            outline: none;
        }

        .todo-mini-btn {
            height: 32px;
            padding: 0 10px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #F5F3EC;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--mono);
        }

        .todo-mini-btn.primary {
            background: rgba(238,68,8,0.12);
            border-color: rgba(238,68,8,0.3);
            color: #EE4408;
        }

        .todo-done-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed rgba(255,255,255,0.07);
        }

        .todo-done-toggle {
            font-size: 10px;
            font-weight: 600;
            color: rgba(255,255,255,0.28);
            border: 1px solid rgba(255,255,255,0.07);
            background: transparent;
            border-radius: 5px;
            padding: 4px 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--mono);
            letter-spacing: 0.04em;
        }

        .todo-done-toggle:hover {
            color: #EE4408;
            border-color: rgba(238,68,8,0.28);
            background: rgba(238,68,8,0.06);
        }

        .subtasks {
            margin: 4px 0 10px 26px;
            padding-left: 8px;
            border-left: 1px solid rgba(255,255,255,0.055);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .subtask-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 2px 0 6px;
        }

        .subtask-title {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.26);
            font-family: var(--mono);
        }

        .subtask-count {
            font-size: 10px;
            color: rgba(255,255,255,0.22);
            font-family: var(--mono);
        }

        .subtask-toggle {
            font-size: 10px;
            color: rgba(255,255,255,0.26);
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: var(--mono);
        }

        .subtask-toggle:hover { color: #EE4408; }

        .subtask-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: rgba(255,255,255,0.62);
            font-family: var(--mono);
        }

        .subtask-cb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1.5px solid rgba(255,255,255,0.18);
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .subtask-item.done .subtask-cb {
            background: rgba(238,68,8,0.18);
            border-color: #EE4408;
        }

        .subtask-item.done .subtask-cb::after {
            content: '';
            width: 7px;
            height: 4px;
            border-left: 1.5px solid #EE4408;
            border-bottom: 1.5px solid #EE4408;
            transform: rotate(-45deg) translateY(-1px);
        }

        .subtask-text { flex: 1; }

        .subtask-item.done .subtask-text {
            text-decoration: line-through;
            color: rgba(255,255,255,0.28);
        }

        .subtask-del {
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.18);
            cursor: pointer;
            font-size: 12px;
        }

        .subtask-del:hover { color: #EE4408; }

        .subtask-add-row {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }

        .subtask-input {
            flex: 1;

        /* ── JALONS HORIZONTAL TIMELINE ── */

        .jalons-manage-link {

        .jalons-scroll-wrap {

        .jalons-scroll-wrap::-webkit-scrollbar { height: 3px; }

        .jt-track { display: flex; align-items: flex-start; min-width: max-content; }

        /* ── RESPONSIVE ── */

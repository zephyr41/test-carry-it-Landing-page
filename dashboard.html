</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="navbar-logo">Carry It</a>
        <div class="navbar-links">
            <a href="objectif.html" class="navbar-link cta">+ Nouveau projet</a>
        </div>
    </nav>

    <!-- Dashboard -->
    <section class="dashboard-section active" id="dashboardSection">
        <div class="dashboard-container">

            <!-- Project switcher (tabs) -->
            <div class="db-switcher" id="dbSwitcher"></div>

            <!-- Project panels -->
            <div id="dbPanels"></div>
        </div>
    </section>

    <!-- ── MODAL: Add Measure ── -->
    <div id="measureModalOverlay" class="m-overlay">
        <div class="m-box" onclick="event.stopPropagation()">
            <h3 class="m-title">Ajouter une mesure</h3>
            <p class="m-sub">Enregistrez votre progression pour suivre votre évolution.</p>
            <form id="measureForm" onsubmit="handleMeasureSubmit(event)">
                <div class="m-field">
                    <label class="m-label" for="measureDate">Date</label>
                    <input class="m-input" type="date" id="measureDate">
                    <div class="m-error" id="dateError"></div>
                </div>
                <div class="m-field">
                    <label class="m-label" for="measureValue">Valeur</label>
                    <input class="m-input" type="number" min="0" step="any" id="measureValue" placeholder="ex: 42">
                    <div class="m-error" id="valueError"></div>
                </div>
                <div class="m-btns">
                    <button type="button" class="m-btn-cancel" onclick="closeMeasureModal()">Annuler</button>
                    <button type="submit" class="m-btn-ok">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ── MODAL: Edit Measure ── -->
    <div id="editMeasureModalOverlay" class="m-overlay">
        <div class="m-box" onclick="event.stopPropagation()">
            <h3 class="m-title">Modifier la mesure</h3>
            <p class="m-sub">Ajustez la date ou la valeur de votre mesure.</p>
            <form id="editMeasureForm" onsubmit="handleMeasureEditSubmit(event)">
                <div class="m-field">
                    <label class="m-label" for="editMeasureDate">Date</label>
                    <input class="m-input" type="date" id="editMeasureDate">
                    <div class="m-error" id="editDateError"></div>
                </div>
                <div class="m-field">
                    <label class="m-label" for="editMeasureValue">Valeur</label>
                    <input class="m-input" type="number" min="0" step="any" id="editMeasureValue" placeholder="ex: 42">
                    <div class="m-error" id="editValueError"></div>
                </div>
                <div class="m-btns">
                    <button type="button" class="m-btn-cancel" onclick="closeEditMeasureModal()">Annuler</button>
                    <button type="button" class="m-btn-delete" onclick="deleteMeasureDirect()">Supprimer</button>
                    <button type="submit" class="m-btn-ok">Sauvegarder</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ── MODAL: Delete Confirm ── -->
    <div id="deleteConfirmModal" class="m-overlay">
        <div class="m-box" onclick="event.stopPropagation()">
            <h3 class="m-title">Supprimer ce projet ?</h3>
            <p class="m-sub" id="deleteConfirmMessage">Cette action est irréversible.</p>
            <div class="m-btns">
                <button class="m-btn-cancel" onclick="cancelDelete()">Annuler</button>
                <button class="m-btn-ok" onclick="confirmDelete()">Supprimer</button>
            </div>
        </div>
    </div>

    <!-- ── TASK SIDE PANEL ── -->
    <div id="taskPanelOverlay" class="side-panel-overlay" onclick="closeTaskPanel()">
        <div class="side-panel" onclick="event.stopPropagation()">
            <button class="side-panel-close" onclick="closeTaskPanel()">×</button>
            <div id="taskPanelBody"></div>
        </div>
    </div>

    <script>
        // ──────────────────────────────────────────────────────────
        // STATE
        // ──────────────────────────────────────────────────────────
        let allObjectifs = [];
        let currentCarouselIndex = 0;
        let kpiCharts = {};
        let pendingDeleteIndex = null;
        let currentMeasureIndex = null;
        let todoEditState = {};
        let todoDoneCollapsed = {};
        let todoSubOpen = {};
        let subtaskDoneCollapsed = {};
        let taskPanelState = { projectIndex: null, taskId: null };

        // ──────────────────────────────────────────────────────────
        // STORAGE
        // ──────────────────────────────────────────────────────────
        function loadAllObjectifs() {
            const stored = localStorage.getItem('carryItAllObjectifs');
            if (stored) {
                try {
                    allObjectifs = JSON.parse(stored);
                    // backward compat: ensure tasks array exists
                    allObjectifs.forEach(obj => {
                        if (!obj.tasks) obj.tasks = [];
                        obj.tasks.forEach(t => {
                            if (!t.subtasks) t.subtasks = [];
                            if (!t.notes) t.notes = '';
                        });
                        if (!obj.createdAt) obj.createdAt = obj.id || Date.now();
                        if (!obj.kpiType) obj.kpiType = 'cumulatif';
                    });
                } catch(e) {
                    allObjectifs = [];
                }
            } else {
                // migration from old single-objectif format
                const old = localStorage.getItem('carryItObjectifSMART');
                if (old) {
                    try {
                        const parsed = JSON.parse(old);
                        allObjectifs = [{ id: Date.now(), createdAt: Date.now(), kpiType: 'cumulatif', ...parsed, tasks: [] }];
                        saveAllObjectifs();
                    } catch(e) { allObjectifs = []; }
                }
            }
        }

        function saveAllObjectifs() {
            localStorage.setItem('carryItAllObjectifs', JSON.stringify(allObjectifs));
        }

        // ──────────────────────────────────────────────────────────
        // DASHBOARD RENDER (no carousel, fixed panels)
        // ──────────────────────────────────────────────────────────
        function renderCarousel() { renderDashboard(); } // alias pour compatibilité

        function renderDashboard() {
            const switcher = document.getElementById('dbSwitcher');
            const panels   = document.getElementById('dbPanels');
            switcher.innerHTML = '';
            panels.innerHTML   = '';

            if (allObjectifs.length === 0) {
                switcher.style.display = 'none';
                panels.innerHTML = buildEmptyState();
                return;
            }

            switcher.style.display = allObjectifs.length > 1 ? 'flex' : 'none';
            currentCarouselIndex = Math.min(currentCarouselIndex, allObjectifs.length - 1);

            allObjectifs.forEach((obj, i) => {
                enforceKpiCadence(obj);
                // Tab
                if (allObjectifs.length > 1) {
                    const tab = document.createElement('button');
                    tab.className = 'db-tab' + (i === currentCarouselIndex ? ' active' : '');
                    tab.textContent = obj.titre || `Projet ${i + 1}`;
                    tab.onclick = () => switchProject(i);
                    switcher.appendChild(tab);
                }

                // Panel
                const panel = document.createElement('div');
                panel.className = 'db-panel' + (i === currentCarouselIndex ? ' active' : '');
                panel.id = `dbPanel-${i}`;
                panel.innerHTML = buildProjectCard(obj, i);
                panels.appendChild(panel);
            });

            // init charts only for visible panel
            setTimeout(() => initKPIChart(currentCarouselIndex, allObjectifs[currentCarouselIndex]), 0);
        }

        function switchProject(i) {
            currentCarouselIndex = i;

            // Update tabs
            document.querySelectorAll('.db-tab').forEach((t, idx) =>
                t.classList.toggle('active', idx === i));

            // Update panels
            document.querySelectorAll('.db-panel').forEach((p, idx) =>
                p.classList.toggle('active', idx === i));

            // Init chart for newly visible panel
            setTimeout(() => initKPIChart(i, allObjectifs[i]), 0);

            // Scroll to top of content
            window.scrollTo({ top: document.getElementById('dashboardSection').offsetTop - 80, behavior: 'smooth' });
        }

        function buildEmptyState() {
            return `
                <div class="proj-card">
                    <div class="db-empty-state">
                        <svg class="db-empty-icon" width="56" height="56" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                        </svg>
                        <p class="db-empty-title">Aucun objectif</p>
                        <p class="db-empty-sub">Commencez par définir votre premier objectif SMART.</p>
                        <a href="objectif.html" class="btn-create">+ Créer un objectif</a>
                    </div>
                </div>
            `;
        }

        function buildProjectCard(obj, i) {
            const kpiLabel = extractKPI(obj.mesurable) || 'Indicateur';
            const freqLabel = formatFrequence(obj.frequence, obj.jour);
            const dateLabel = formatDateBadge(obj.temporel);

            return `
            <div class="proj-card">
                <!-- Header -->
                <div class="proj-header">
                    <div class="proj-header-left">
                        <h2 class="proj-title">${escHtml(obj.titre || 'Sans titre')}</h2>
                        <div class="proj-badges">
                            ${dateLabel ? `<span class="proj-badge proj-badge-t">T · ${dateLabel}</span>` : ''}
                            ${freqLabel ? `<span class="proj-badge">${freqLabel}</span>` : ''}
                            ${obj.jalons && obj.jalons.length > 0 ? `<span class="proj-badge">${obj.jalons.length} jalon${obj.jalons.length > 1 ? 's' : ''}</span>` : ''}
                        </div>
                    </div>
                    <div class="proj-actions">
                        <a href="objectif.html" class="proj-edit-link">Modifier le projet →</a>
                        <button class="proj-btn-icon" title="Supprimer" onclick="deleteObjectif(${i})">
                            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Body -->
                <div class="proj-body">

                    <!-- Row 1: SMART + KPI -->
                    <div class="db-2col">
                        <!-- SMART -->
                        <div class="smart-panel">
                            <div class="smart-header">
                                <span style="font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.25);">Objectif SMART</span>
                                <button class="smart-edit-btn" type="button" onclick="enterSmartEdit(${i})">
                                    <svg width="10" height="10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                    </svg>
                                    Modifier
                                </button>
                            </div>
                            <div class="smart-view" id="smartView-${i}">
                                ${buildSmartRow('S', "L'Ambition", obj.specifique, 'specifique')}
                                ${buildSmartRow('M', 'La Mesure', obj.mesurable, 'mesurable')}
                                ${buildSmartRow('A', 'Atteignable', obj.atteignable, 'atteignable')}
                                ${buildSmartRow('R', 'Réaliste', obj.realiste, 'realiste')}
                                ${buildSmartRow('T', "L'Échéance", obj.temporel, 'temporel')}
                            </div>
                            <form class="smart-edit" id="smartEdit-${i}" onsubmit="saveSmartEdit(event, ${i})">
                                ${buildSmartEditRow('S', "L'Ambition", `smartSpec-${i}`, obj.specifique)}
                                ${buildSmartEditRow('M', 'La Mesure', `smartMes-${i}`, obj.mesurable)}
                                ${buildSmartEditRow('A', 'Atteignable', `smartAtt-${i}`, obj.atteignable)}
                                ${buildSmartEditRow('R', 'Réaliste', `smartRea-${i}`, obj.realiste)}
                                ${buildSmartEditRow('T', "L'Échéance", `smartTem-${i}`, obj.temporel)}
                                <div class="smart-error" id="smartError-${i}">Tous les champs sont requis.</div>
                                <div class="smart-edit-actions">
                                    <button class="smart-btn smart-btn-cancel" type="button" onclick="cancelSmartEdit(${i})">Annuler</button>
                                    <button class="smart-btn smart-btn-save" type="submit">Sauvegarder</button>
                                </div>
                            </form>
                        </div>

                        <!-- KPI -->
                        <div class="kpi-panel" id="kpiPanel-${i}">
                        <div class="kpi-panel-top">
                            <div>
                                <div class="kpi-title">${escHtml(obj.titre || 'Progression')}</div>
                                <div class="kpi-unit-label">${escHtml(kpiLabel.toUpperCase())}</div>
                            </div>
                            <button class="kpi-add-btn" onclick="openAddMeasureModal(${i})">+ Ajouter une mesure</button>
                        </div>
                            <div class="kpi-chart-area" id="kpiWrap-${i}">
                                <canvas id="kpiChart-${i}"></canvas>
                            </div>
                        </div>
                    </div>

                    <!-- Row 2: To-do -->
                    ${buildTodoPanel(obj, i)}

                    <!-- Row 3: Jalons Timeline -->
                    ${buildJalonsPanel(obj, i)}

                    <!-- Citation -->
                    <p class="db-citation">"C'est quand t'as envie d'abandonner que tout commence."</p>

                </div>
            </div>
            `;
        }

        function buildSmartRow(letter, label, value, fieldKey) {
            return `
                <div class="smart-row">
                    <span class="smart-letter"><span class="smart-letter-badge">${letter}</span></span>
                    <div class="smart-texts">
                        <div class="smart-sublabel">${label}</div>
                        <div class="smart-value" data-field="${fieldKey || ''}">${escHtml(value || '—')}</div>
                    </div>
                </div>
            `;
        }

        function buildSmartEditRow(letter, label, id, value) {
            return `
                <div class="smart-edit-row">
                    <div class="smart-edit-label">${letter}</div>
                    <div>
                        <div class="smart-sublabel">${label}</div>
                        <textarea class="smart-input" id="${id}" rows="2" placeholder="${label}...">${escHtml(value || '')}</textarea>
                    </div>
                </div>
            `;
        }

        // ──────────────────────────────────────────────────────────
        // TODO LIST
        // ──────────────────────────────────────────────────────────
        function buildTodoPanel(obj, i) {
            return `
            <div class="todo-panel">
                <div class="section-lbl">Exécution quotidienne</div>
                <div class="todo-row">
                    <input class="todo-input" type="text" id="todoInput-${i}"
                        placeholder="Quelle action aujourd'hui ?"
                        onkeydown="if(event.key==='Enter'){addTask(${i});event.preventDefault();}">
                    <button class="todo-plus-btn" onclick="addTask(${i})">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
                        </svg>
                    </button>
                </div>
                <div class="todo-list" id="todoList-${i}">
                    ${renderTasksList(obj.tasks || [], i)}
                </div>
            </div>
            `;
        }

        function renderTasksList(tasks, i) {
            if (!tasks || tasks.length === 0) {
                return '<div class="todo-empty">Aucune action — ajoutez votre première</div>';
            }
            const active = tasks.filter(t => !t.done);
            const done = tasks.filter(t => t.done);
            const activeHtml = active.length
                ? active.map((t, ti) => renderTaskItem(t, i, ti, false)).join('')
                : '<div class="todo-empty">Aucune action — ajoutez votre première</div>';

            const doneCount = done.length;
            const collapsed = todoDoneCollapsed[i] !== false;
            const doneHtml = doneCount
                ? `
                    <div class="todo-done-header">
                        <span class="section-lbl" style="margin-bottom:0;">Terminées (${doneCount})</span>
                        <button class="todo-done-toggle" onclick="toggleDoneBlock(${i})">
                            ${collapsed ? 'Afficher' : 'Masquer'}
                        </button>
                    </div>
                    <div style="display:${collapsed ? 'none' : 'block'};margin-top:6px;">
                        ${done.map((t, ti) => renderTaskItem(t, i, ti, true)).join('')}
                    </div>
                  `
                : '';

            return activeHtml + doneHtml;
        }

        function renderTaskItem(task, i, ti, isDone) {
            const isEditing = todoEditState[i] === task.id;
            if (isEditing) {
                return `
                <div class="todo-item">
                    <div class="todo-edit-row">
                        <input class="todo-edit-input" id="todoEditInput-${i}-${task.id}" value="${escHtml(task.text)}">
                        <button class="todo-mini-btn primary" onclick="saveTaskEdit(${i}, ${task.id})">OK</button>
                        <button class="todo-mini-btn" onclick="cancelTaskEdit(${i})">Annuler</button>
                    </div>
                </div>`;
            }
            return `
                <div class="todo-item ${isDone ? 'done' : ''}">
                    <button class="todo-drop" onclick="toggleSubtasks(${i}, ${task.id})">▾</button>
                    <div class="todo-cb" onclick="toggleTask(${i}, ${task.id})"></div>
                    <span class="todo-text" onclick="openTaskPanel(${i}, ${task.id})">${escHtml(task.text)}</span>
                    <button class="todo-edit" onclick="editTask(${i}, ${task.id})">✎</button>
                    <button class="todo-del" onclick="deleteTask(event, ${i}, ${task.id})">×</button>
                </div>
                ${renderSubtasksInline(task, i)}
            `;
        }

        function renderSubtasksInline(task, i) {
            const open = todoSubOpen[`${i}-${task.id}`];
            if (!open) return '';
            const subs = task.subtasks || [];
            const key = `${i}-${task.id}`;
            const doneCollapsed = subtaskDoneCollapsed[key] !== false;
            const openItems = subs.filter(s => !s.done);
            const doneItems = subs.filter(s => s.done);
            const items = openItems.length
                ? openItems.map(s => `
                    <div class="subtask-item ${s.done ? 'done' : ''}">
                        <div class="subtask-cb" onclick="toggleSubtask(${i}, ${task.id}, ${s.id})"></div>
                        <span class="subtask-text">${escHtml(s.text)}</span>
                        <button class="subtask-del" onclick="deleteSubtask(${i}, ${task.id}, ${s.id})">×</button>
                    </div>
                  `).join('')
                : '<div class="todo-empty" style="padding:4px 0;">Aucune sous-tâche</div>';

            const doneBlock = doneItems.length ? `
                <button class="subtask-toggle" onclick="toggleDoneSubtasks(${i}, ${task.id})">
                    ${doneCollapsed ? `Afficher terminées (${doneItems.length})` : `Masquer terminées (${doneItems.length})`}
                </button>
                <div style="display:${doneCollapsed ? 'none' : 'block'};margin-top:4px;">
                    ${doneItems.map(s => `
                        <div class="subtask-item ${s.done ? 'done' : ''}">
                            <div class="subtask-cb" onclick="toggleSubtask(${i}, ${task.id}, ${s.id})"></div>
                            <span class="subtask-text">${escHtml(s.text)}</span>
                            <button class="subtask-del" onclick="deleteSubtask(${i}, ${task.id}, ${s.id})">×</button>
                        </div>
                    `).join('')}
                </div>
            ` : '';

            return `
                <div class="subtasks">
                    <div class="subtask-head">
                        <span class="subtask-title">Checklist</span>
                        <span class="subtask-count">${openItems.length} open</span>
                    </div>
                    ${items}
                    ${doneBlock}
                    <div class="subtask-add-row">
                        <input class="subtask-input" id="subtaskInput-${i}-${task.id}" placeholder="+ Ajouter un item" onkeydown="if(event.key==='Enter'){addSubtask(${i}, ${task.id});event.preventDefault();}">
                        <button class="todo-mini-btn primary" onclick="addSubtask(${i}, ${task.id})">+</button>
                    </div>
                </div>
            `;
        }

        function addTask(i) {
            const input = document.getElementById(`todoInput-${i}`);
            const text = (input.value || '').trim();
            if (!text) return;

            if (!allObjectifs[i].tasks) allObjectifs[i].tasks = [];
            allObjectifs[i].tasks.push({
                id: Date.now(),
                text,
                done: false,
                createdAt: Date.now(),
                notes: '',
                subtasks: []
            });
            saveAllObjectifs();

            input.value = '';
            refreshTodoList(i);
        }

        function toggleTask(i, taskId) {
            const task = (allObjectifs[i]?.tasks || []).find(t => t.id === taskId);
            if (!task) return;
            task.done = !task.done;
            saveAllObjectifs();
            refreshTodoList(i);
        }

        function deleteTask(event, i, taskId) {
            event.stopPropagation();
            if (!allObjectifs[i] || !allObjectifs[i].tasks) return;
            const idx = allObjectifs[i].tasks.findIndex(t => t.id === taskId);
            if (idx === -1) return;
            allObjectifs[i].tasks.splice(idx, 1);
            saveAllObjectifs();
            refreshTodoList(i);
        }

        function refreshTodoList(i) {
            const el = document.getElementById(`todoList-${i}`);
            if (el) el.innerHTML = renderTasksList(allObjectifs[i].tasks || [], i);
        }

        function getTaskById(i, taskId) {
            return (allObjectifs[i]?.tasks || []).find(t => t.id === taskId);
        }

        function toggleDoneBlock(i) {
            todoDoneCollapsed[i] = !todoDoneCollapsed[i];
            refreshTodoList(i);
        }

        function editTask(i, taskId) {
            todoEditState[i] = taskId;
            refreshTodoList(i);
            setTimeout(() => {
                const input = document.getElementById(`todoEditInput-${i}-${taskId}`);
                if (input) input.focus();
            }, 0);
        }

        function saveTaskEdit(i, taskId) {
            const input = document.getElementById(`todoEditInput-${i}-${taskId}`);
            const text = (input?.value || '').trim();
            if (!text) return;
            const task = (allObjectifs[i]?.tasks || []).find(t => t.id === taskId);
            if (!task) return;
            task.text = text;
            todoEditState[i] = null;
            saveAllObjectifs();
            refreshTodoList(i);
        }

        function cancelTaskEdit(i) {
            todoEditState[i] = null;
            refreshTodoList(i);
        }

        function toggleSubtasks(i, taskId) {
            const key = `${i}-${taskId}`;
            todoSubOpen[key] = !todoSubOpen[key];
            refreshTodoList(i);
        }

        function addSubtask(i, taskId) {
            const task = getTaskById(i, taskId);
            if (!task) return;
            if (!task.subtasks) task.subtasks = [];
            const input = document.getElementById(`subtaskInput-${i}-${taskId}`);
            const text = (input?.value || '').trim();
            if (!text) return;
            task.subtasks.push({ id: Date.now(), text, done: false });
            saveAllObjectifs();
            if (input) input.value = '';
            refreshTodoList(i);
        }

        function toggleSubtask(i, taskId, subId) {
            const task = getTaskById(i, taskId);
            if (!task || !task.subtasks) return;
            const sub = task.subtasks.find(s => s.id === subId);
            if (!sub) return;
            sub.done = !sub.done;
            saveAllObjectifs();
            refreshTodoList(i);
        }

        function deleteSubtask(i, taskId, subId) {
            const task = getTaskById(i, taskId);
            if (!task || !task.subtasks) return;
            const idx = task.subtasks.findIndex(s => s.id === subId);
            if (idx === -1) return;
            task.subtasks.splice(idx, 1);
            saveAllObjectifs();
            refreshTodoList(i);
        }

        function toggleDoneSubtasks(i, taskId) {
            const key = `${i}-${taskId}`;
            subtaskDoneCollapsed[key] = !subtaskDoneCollapsed[key];
            refreshTodoList(i);
        }

        function openTaskPanel(i, taskId) {
            const task = getTaskById(i, taskId);
            if (!task) return;
            if (!task.subtasks) task.subtasks = [];
            if (!task.notes) task.notes = '';
            taskPanelState = { projectIndex: i, taskId };
            renderTaskPanel();
            document.getElementById('taskPanelOverlay').classList.add('open');
            todoSubOpen[`${i}-${taskId}`] = true;
            refreshTodoList(i);
        }

        function closeTaskPanel() {
            document.getElementById('taskPanelOverlay').classList.remove('open');
            taskPanelState = { projectIndex: null, taskId: null };
        }

        function renderTaskPanel() {
            const { projectIndex, taskId } = taskPanelState;
            const task = getTaskById(projectIndex, taskId);
            if (!task) return;
            const panel = document.getElementById('taskPanelBody');
            panel.innerHTML = `
                <h3 class="side-panel-title">${escHtml(task.text)}</h3>
                <div class="side-panel-label">Notes</div>
                <textarea class="side-panel-textarea" oninput="updateTaskNotes(${projectIndex}, ${taskId}, this.value)">${escHtml(task.notes || '')}</textarea>
                <div class="side-panel-label">Sous-tâches</div>
                ${renderSubtasksPanel(task, projectIndex)}
            `;
        }

        function renderSubtasksPanel(task, i) {
            const subs = task.subtasks || [];
            const key = `${i}-${task.id}`;
            const doneCollapsed = subtaskDoneCollapsed[key] !== false;
            const openItems = subs.filter(s => !s.done);
            const doneItems = subs.filter(s => s.done);
            const items = openItems.length
                ? openItems.map(s => `
                    <div class="subtask-item ${s.done ? 'done' : ''}">
                        <div class="subtask-cb" onclick="toggleSubtask(${i}, ${task.id}, ${s.id}); renderTaskPanel();"></div>
                        <span class="subtask-text">${escHtml(s.text)}</span>
                        <button class="subtask-del" onclick="deleteSubtask(${i}, ${task.id}, ${s.id}); renderTaskPanel();">×</button>
                    </div>
                  `).join('')
                : '<div class="todo-empty" style="padding:4px 0;">Aucune sous-tâche</div>';

            const doneBlock = doneItems.length ? `
                <button class="subtask-toggle" onclick="toggleDoneSubtasks(${i}, ${task.id}); renderTaskPanel();">
                    ${doneCollapsed ? `Afficher terminées (${doneItems.length})` : `Masquer terminées (${doneItems.length})`}
                </button>
                <div style="display:${doneCollapsed ? 'none' : 'block'};margin-top:4px;">
                    ${doneItems.map(s => `
                        <div class="subtask-item ${s.done ? 'done' : ''}">
                            <div class="subtask-cb" onclick="toggleSubtask(${i}, ${task.id}, ${s.id}); renderTaskPanel();"></div>
                            <span class="subtask-text">${escHtml(s.text)}</span>
                            <button class="subtask-del" onclick="deleteSubtask(${i}, ${task.id}, ${s.id}); renderTaskPanel();">×</button>
                        </div>
                    `).join('')}
                </div>
            ` : '';

            return `
                <div class="subtasks">
                    <div class="subtask-head">
                        <span class="subtask-title">Checklist</span>
                        <span class="subtask-count">${openItems.length} open</span>
                    </div>
                    ${items}
                    ${doneBlock}
                    <div class="subtask-add-row">
                        <input class="subtask-input" id="panelSubtaskInput-${i}-${task.id}" placeholder="+ Ajouter un item" onkeydown="if(event.key==='Enter'){addSubtaskFromPanel(${i}, ${task.id});event.preventDefault();}">
                        <button class="todo-mini-btn primary" onclick="addSubtaskFromPanel(${i}, ${task.id})">+</button>
                    </div>
                </div>
            `;
        }

        function addSubtaskFromPanel(i, taskId) {
            const input = document.getElementById(`panelSubtaskInput-${i}-${taskId}`);
            const text = (input?.value || '').trim();
            if (!text) return;
            const task = getTaskById(i, taskId);
            if (!task) return;
            if (!task.subtasks) task.subtasks = [];
            task.subtasks.push({ id: Date.now(), text, done: false });
            saveAllObjectifs();
            if (input) input.value = '';
            renderTaskPanel();
            refreshTodoList(i);
        }

        function updateTaskNotes(i, taskId, value) {
            const task = getTaskById(i, taskId);
            if (!task) return;
            task.notes = value;
            saveAllObjectifs();
        }

        // ──────────────────────────────────────────────────────────
        // SMART EDIT
        // ──────────────────────────────────────────────────────────
        function enterSmartEdit(i) {
            const view = document.getElementById(`smartView-${i}`);
            const edit = document.getElementById(`smartEdit-${i}`);
            const err  = document.getElementById(`smartError-${i}`);
            if (!view || !edit) return;
            view.style.display = 'none';
            edit.style.display = 'flex';
            if (err) { err.classList.remove('show'); }
        }

        function cancelSmartEdit(i) {
            const obj = allObjectifs[i];
            if (!obj) return;
            const view = document.getElementById(`smartView-${i}`);
            const edit = document.getElementById(`smartEdit-${i}`);
            const err  = document.getElementById(`smartError-${i}`);
            if (!view || !edit) return;

            // Reset values to current state
            setSmartInputValue(`smartSpec-${i}`, obj.specifique);
            setSmartInputValue(`smartMes-${i}`, obj.mesurable);
            setSmartInputValue(`smartAtt-${i}`, obj.atteignable);
            setSmartInputValue(`smartRea-${i}`, obj.realiste);
            setSmartInputValue(`smartTem-${i}`, obj.temporel);
            clearSmartInputErrors(edit);
            if (err) err.classList.remove('show');

            edit.style.display = 'none';
            view.style.display = 'block';
        }

        function saveSmartEdit(e, i) {
            e.preventDefault();
            const obj = allObjectifs[i];
            if (!obj) return;

            const fields = [
                { key: 'specifique', id: `smartSpec-${i}` },
                { key: 'mesurable', id: `smartMes-${i}` },
                { key: 'atteignable', id: `smartAtt-${i}` },
                { key: 'realiste', id: `smartRea-${i}` },
                { key: 'temporel', id: `smartTem-${i}` }
            ];

            let ok = true;
            fields.forEach(f => {
                const el = document.getElementById(f.id);
                if (!el) return;
                const val = (el.value || '').trim();
                if (!val) {
                    ok = false;
                    el.classList.add('invalid');
                } else {
                    el.classList.remove('invalid');
                }
            });

            const err = document.getElementById(`smartError-${i}`);
            if (!ok) {
                if (err) err.classList.add('show');
                return;
            }
            if (err) err.classList.remove('show');

            fields.forEach(f => {
                const el = document.getElementById(f.id);
                obj[f.key] = (el.value || '').trim();
            });
            saveAllObjectifs();
            renderDashboard();
        }

        function setSmartInputValue(id, value) {
            const el = document.getElementById(id);
            if (el) el.value = value || '';
        }

        function clearSmartInputErrors(container) {
            if (!container) return;
            container.querySelectorAll('.smart-input.invalid').forEach(el => el.classList.remove('invalid'));
        }

        // ──────────────────────────────────────────────────────────
        // JALONS HORIZONTAL TIMELINE
        // ──────────────────────────────────────────────────────────
        function buildJalonsPanel(obj, i) {
            const jalons = obj.jalons || [];

            const manageLink = `<a href="jalons.html" class="jalons-manage-link">Gérer →</a>`;

            if (jalons.length === 0) {
                return `<div style="text-align:center;padding:4px 0 0;">
                    <a href="jalons.html" style="font-size:12px;color:rgba(255,255,255,0.25);text-decoration:none;border-bottom:1px dashed rgba(255,255,255,0.12);padding-bottom:2px;transition:color 0.2s;" onmouseover="this.style.color='#EE4408'" onmouseout="this.style.color='rgba(255,255,255,0.25)'">+ Planifier les jalons de ce projet</a>
                </div>`;
            }

            // Build 3 parallel rows: top-labels | dots+lines | bottom-labels
            let topCols = '';
            let midCols = '';
            let botCols = '';

            jalons.forEach((jalon, ji) => {
                const status = jalon.statut || 'pending';
                const prevDone = ji > 0 && (jalons[ji-1].statut === 'completed');
                const lineDone = prevDone ? 'done' : '';

                // spacer between columns (connector line)
                const spacer = ji > 0 ? `<div class="jt-spacer" style="min-width:50px;flex:1;"></div>` : '';
                const midLine = ji > 0 ? `<div class="jt-line-seg ${lineDone}" style="flex:1;min-width:50px;"></div>` : '';

                topCols += spacer + `
                    <div class="jt-col-top">
                        ${jalon.tag ? `<span class="jt-tag">${escHtml(jalon.tag)}</span>` : '<span class="jt-tag" style="visibility:hidden;">·</span>'}
                        <span class="jt-date">${formatDateJalonCourt(jalon.date)}</span>
                    </div>`;

                const tooltipTitle = [jalon.titre || jalon.title || '', jalon.date ? formatDateJalonCourt(jalon.date) : ''].filter(Boolean).join(' · ');
                midCols += midLine + `
                    <div class="jt-dot-wrap">
                        <div class="jt-dot ${status}" title="${escHtml(tooltipTitle)}"></div>
                    </div>`;

                botCols += (ji > 0 ? '<div class="jt-spacer"></div>' : '') + `
                    <div class="jt-col-bot">
                        <span class="jt-title">${escHtml(jalon.titre || jalon.title || '')}</span>
                        ${jalon.kpi ? `<span class="jt-kpi">${escHtml(jalon.kpi)}</span>` : ''}
                        ${jalon.progression !== undefined ? `<span class="jt-prog">${jalon.progression}%</span>` : ''}
                    </div>`;
            });

            return `
            <div class="jalons-panel">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
                    <span class="section-lbl" style="margin-bottom:0;">Étapes Clés</span>
                    ${manageLink}
                </div>
                <div class="jalons-scroll-wrap">
                    <div style="display:flex;flex-direction:column;gap:6px;min-width:max-content;">
                        <div style="display:flex;align-items:flex-end;">${topCols}</div>
                        <div style="display:flex;align-items:center;">${midCols}</div>
                        <div style="display:flex;align-items:flex-start;">${botCols}</div>
                    </div>
                </div>
            </div>`;
        }

        // ──────────────────────────────────────────────────────────
        // KPI CHART
        // ──────────────────────────────────────────────────────────
        function initKPIChart(i, obj) {
            const canvas = document.getElementById(`kpiChart-${i}`);
            const wrap   = document.getElementById(`kpiWrap-${i}`);
            if (!canvas || !wrap) return;

            // Destroy previous
            if (kpiCharts[i]) { kpiCharts[i].destroy(); delete kpiCharts[i]; }

            const kpiUnit   = extractKPI(obj.mesurable) || '';
            const target    = extractTargetValue(obj.mesurable);
            ensureMeasureIds(obj);
            let measures    = [...(obj.measures || [])].sort((a,b) =>
                (a.timestamp || parseDateString(a.date)) - (b.timestamp || parseDateString(b.date))
            );

            if (measures.length === 0) {
                canvas.style.display = 'none';
                wrap.innerHTML = `
                    <div class="kpi-empty">
                        <svg width="52" height="52" fill="none" stroke="#EE4408" viewBox="0 0 24 24" style="opacity:0.6;">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                        </svg>
                        <p class="kpi-empty-title">Aucune mesure enregistrée</p>
                        <p class="kpi-empty-sub">Premier pas : enregistrez votre point de départ</p>
                    </div>`;
                return;
            }

            if (measures.length === 1) {
                const m = measures[0];
                const pct = target ? Math.round((m.value / target) * 100) : null;
                canvas.style.display = 'none';
                wrap.innerHTML = `
                    <div class="kpi-single-wrap">
                        <div class="kpi-big-val">${m.value}</div>
                        <div class="kpi-big-unit" style="margin-top:8px;">${escHtml(kpiUnit)}</div>
                        ${pct !== null ? `<div style="margin-top:14px;"><span class="kpi-prog-badge">${pct}% de l'objectif</span></div>` : ''}
                        <div class="kpi-single-hint" style="margin-top:14px;">Ajoutez une deuxième mesure pour voir l'évolution</div>
                    </div>`;
                return;
            }

            // Multiple measures — Chart.js
            canvas.style.display = 'block';

            const labels = measures.map(m => m.date);
            const data   = measures.map(m => m.value);
            const last   = measures[measures.length - 1];
            const pct    = target ? Math.round((last.value / target) * 100) : null;
            const freqLabel = formatFrequence(obj.frequence, obj.jour);
            const axisXTitle = kpiUnit ? `KPI · ${kpiUnit}` : 'KPI';
            const axisYTitle = freqLabel ? `Cadence · ${freqLabel}` : 'Cadence';

            const datasets = [{
                label: 'Progression',
                data,
                borderColor: '#EE4408',
                backgroundColor: (ctx) => {
                    const gradient = ctx.chart.ctx.createLinearGradient(0, 0, 0, ctx.chart.height);
                    gradient.addColorStop(0, 'rgba(238,68,8,0.22)');
                    gradient.addColorStop(1, 'rgba(238,68,8,0.02)');
                    return gradient;
                },
                borderWidth: 2,
                tension: 0.4,
                fill: true,
                pointBackgroundColor: '#EE4408',
                pointBorderColor: '#111113',
                pointBorderWidth: 2,
                pointRadius: 4,
                pointHoverRadius: 6
            }];

            // Add target line if available
            if (target) {
                datasets.push({
                    label: 'Objectif',
                    data: labels.map(() => target),
                    borderColor: 'rgba(255,255,255,0.18)',
                    borderWidth: 1.5,
                    borderDash: [5, 4],
                    pointRadius: 0,
                    pointHoverRadius: 0,
                    fill: false,
                    tension: 0
                });
            }

            kpiCharts[i] = new Chart(canvas.getContext('2d'), {
                type: 'line',
                data: { labels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 400 },
                    onHover: (evt, elements) => {
                        const canvasEl = evt?.native?.target;
                        if (canvasEl) canvasEl.style.cursor = elements.length ? 'pointer' : 'default';
                    },
                    onClick: (evt, elements) => {
                        if (!elements || !elements.length) return;
                        const idx = elements[0].index;
                        const measure = measures[idx];
                        if (measure && measure.id) openEditMeasureModal(i, measure.id);
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(8,8,9,0.95)',
                            titleColor: '#FFFDF6',
                            bodyColor: '#929292',
                            borderColor: 'rgba(238,68,8,0.3)',
                            borderWidth: 1,
                            padding: 12,
                            displayColors: false,
                            callbacks: {
                                title: ctx => ctx[0] ? `Entrée du ${ctx[0].label}` : '',
                                label: ctx => ctx.datasetIndex === 0
                                    ? `Mesure: ${ctx.parsed.y} ${kpiUnit}`
                                    : `Objectif: ${ctx.parsed.y} ${kpiUnit}`,
                                footer: () => 'Cliquer pour éditer'
                            }
                        }
                    },
                    interaction: { mode: 'nearest', intersect: true },
                    scales: {
                        x: {
                            grid: { color: 'rgba(255,255,255,0.04)', drawTicks: false },
                            ticks: { color: '#929292', font: { family: 'Inter', size: 10 }, maxRotation: 35 },
                            title: { display: true, text: axisXTitle, color: 'rgba(255,255,255,0.35)', font: { family: 'Inter', size: 10, weight: '600' } }
                        },
                        y: {
                            grid: { color: 'rgba(255,255,255,0.04)', drawTicks: false },
                            ticks: {
                                color: '#929292',
                                font: { family: 'Inter', size: 10 },
                                callback: v => v
                            },
                            beginAtZero: true,
                            max: target ? Math.max(target, Math.max(...data)) * 1.05 : undefined,
                            title: { display: true, text: axisYTitle, color: 'rgba(255,255,255,0.35)', font: { family: 'Inter', size: 10, weight: '600' } }
                        }
                    }
                }
            });

            // append stats below chart
            const panel = document.getElementById(`kpiPanel-${i}`);
            let statsEl = panel.querySelector('.kpi-stats');
            if (statsEl) statsEl.remove();
            const stats = document.createElement('div');
            stats.className = 'kpi-stats';
            stats.innerHTML = `
                <div>
                    <div class="kpi-current-val">${last.value} ${escHtml(kpiUnit)}</div>
                    <div class="kpi-current-label">Dernière mesure · ${last.date}</div>
                </div>
                ${pct !== null ? `<span class="kpi-prog-badge">${pct}% de l'objectif</span>` : ''}
            `;
            panel.appendChild(stats);
        }

        // (navigation gérée par switchProject)

        // ──────────────────────────────────────────────────────────
        // DELETE
        // ──────────────────────────────────────────────────────────
        function deleteObjectif(i) {
            const obj = allObjectifs[i];
            if (!obj) return;
            pendingDeleteIndex = i;
            document.getElementById('deleteConfirmMessage').textContent =
                `Supprimer "${obj.titre}" ? Cette action est irréversible.`;
            openModal('deleteConfirmModal');
        }

        function confirmDelete() {
            if (pendingDeleteIndex === null) return;
            const titre = allObjectifs[pendingDeleteIndex]?.titre || '';
            allObjectifs.splice(pendingDeleteIndex, 1);
            if (currentCarouselIndex >= allObjectifs.length && allObjectifs.length > 0) {
                currentCarouselIndex = allObjectifs.length - 1;
            }
            saveAllObjectifs();
            renderCarousel();
            closeModal('deleteConfirmModal');
            pendingDeleteIndex = null;
            showToast(`"${titre}" supprimé`);
        }

        function cancelDelete() {
            closeModal('deleteConfirmModal');
            pendingDeleteIndex = null;
        }

        // ──────────────────────────────────────────────────────────
        // MEASURE MODAL
        // ──────────────────────────────────────────────────────────
        function openAddMeasureModal(i) {
            currentMeasureIndex = i;
            document.getElementById('measureForm').reset();
            document.getElementById('dateError').textContent = '';
            document.getElementById('dateError').classList.remove('show');
            document.getElementById('valueError').textContent = '';
            document.getElementById('valueError').classList.remove('show');
            document.getElementById('measureDate').value = new Date().toISOString().split('T')[0];
            openModal('measureModalOverlay');
            setTimeout(() => document.getElementById('measureValue').focus(), 100);
        }

        function closeMeasureModal() {
            closeModal('measureModalOverlay');
            currentMeasureIndex = null;
        }

        function handleMeasureSubmit(e) {
            e.preventDefault();
            const dateInput  = document.getElementById('measureDate').value;
            const valueInput = document.getElementById('measureValue').value;
            let ok = true;

            if (!dateInput) {
                showFieldError('dateError', 'La date est requise');
                ok = false;
            } else {
                hideFieldError('dateError');
            }

            const numericValue = parseFloat(valueInput);
            if (valueInput === '' || isNaN(numericValue)) {
                showFieldError('valueError', 'Valeur numérique requise');
                ok = false;
            } else if (numericValue < 0) {
                showFieldError('valueError', 'Valeur négative interdite');
                ok = false;
            } else {
                hideFieldError('valueError');
            }

            if (!ok) return;

            const [y, mo, d] = dateInput.split('-');
            const formatted = `${d}/${mo}/${y}`;
            addMeasure(currentMeasureIndex, formatted, numericValue);
            closeMeasureModal();
        }

        function showFieldError(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.classList.add('show');
        }

        function hideFieldError(id) {
            document.getElementById(id).classList.remove('show');
        }

        function addMeasure(i, date, value) {
            if (!allObjectifs[i]) return;
            if (!allObjectifs[i].measures) allObjectifs[i].measures = [];
            allObjectifs[i].measures.push({ id: Date.now(), date, value, timestamp: parseDateString(date) });
            allObjectifs[i].measures.sort((a,b) => a.timestamp - b.timestamp);
            saveAllObjectifs();
            setTimeout(() => initKPIChart(i, allObjectifs[i]), 80);
        }

        function openEditMeasureModal(i, measureId) {
            const obj = allObjectifs[i];
            if (!obj || !obj.measures) return;
            const measure = obj.measures.find(m => m.id === measureId);
            if (!measure) return;
            currentMeasureIndex = i;

            const dateInput = document.getElementById('editMeasureDate');
            const valueInput = document.getElementById('editMeasureValue');
            const [d, mo, y] = (measure.date || '').split('/');
            if (d && mo && y) dateInput.value = `${y}-${mo}-${d}`;
            else dateInput.value = '';
            valueInput.value = measure.value;

            document.getElementById('editDateError').classList.remove('show');
            document.getElementById('editValueError').classList.remove('show');
            document.getElementById('editDateError').textContent = '';
            document.getElementById('editValueError').textContent = '';

            document.getElementById('editMeasureForm').dataset.measureId = String(measureId);
            openModal('editMeasureModalOverlay');
        }

        function closeEditMeasureModal() {
            closeModal('editMeasureModalOverlay');
            currentMeasureIndex = null;
        }

        function handleMeasureEditSubmit(e) {
            e.preventDefault();
            const form = document.getElementById('editMeasureForm');
            const measureId = parseInt(form.dataset.measureId || '', 10);
            if (!measureId) return;

            const dateInput  = document.getElementById('editMeasureDate').value;
            const valueInput = document.getElementById('editMeasureValue').value;
            let ok = true;

            if (!dateInput) {
                showFieldError('editDateError', 'La date est requise');
                ok = false;
            } else {
                hideFieldError('editDateError');
            }

            const numericValue = parseFloat(valueInput);
            if (valueInput === '' || isNaN(numericValue)) {
                showFieldError('editValueError', 'Valeur numérique requise');
                ok = false;
            } else if (numericValue < 0) {
                showFieldError('editValueError', 'Valeur négative interdite');
                ok = false;
            } else {
                hideFieldError('editValueError');
            }

            if (!ok) return;

            const [y, mo, d] = dateInput.split('-');
            const formatted = `${d}/${mo}/${y}`;
            const obj = allObjectifs[currentMeasureIndex];
            if (!obj || !obj.measures) return;
            const m = obj.measures.find(x => x.id === measureId);
            if (!m) return;
            const idx = currentMeasureIndex;
            m.date = formatted;
            m.value = numericValue;
            m.timestamp = parseDateString(formatted);
            obj.measures.sort((a,b) => a.timestamp - b.timestamp);
            saveAllObjectifs();
            closeEditMeasureModal();
            setTimeout(() => initKPIChart(idx, obj), 80);
        }

        function deleteMeasureDirect() {
            const form = document.getElementById('editMeasureForm');
            const measureId = parseInt(form.dataset.measureId || '', 10);
            if (!measureId) return;
            const obj = allObjectifs[currentMeasureIndex];
            if (!obj || !obj.measures) return;
            const idx = obj.measures.findIndex(m => m.id === measureId);
            if (idx !== -1) obj.measures.splice(idx, 1);
            const chartIndex = currentMeasureIndex;
            saveAllObjectifs();
            closeEditMeasureModal();
            setTimeout(() => initKPIChart(chartIndex, obj), 80);
        }

        // ──────────────────────────────────────────────────────────
        // MODAL HELPERS
        // ──────────────────────────────────────────────────────────
        function openModal(id) {
            document.getElementById(id).classList.add('open');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('open');
        }

        // ──────────────────────────────────────────────────────────
        // TOAST
        // ──────────────────────────────────────────────────────────
        function showToast(msg) {
            const t = document.createElement('div');
            t.style.cssText = `
                position:fixed;bottom:40px;left:50%;
                transform:translateX(-50%) translateY(80px);
                background:#2C8657;color:#fff;
                padding:12px 24px;border-radius:10px;
                font-size:14px;font-weight:600;
                z-index:20000;transition:all 0.3s;
                font-family:'Inter',sans-serif;
            `;
            t.textContent = msg;
            document.body.appendChild(t);
            requestAnimationFrame(() => {
                t.style.transform = 'translateX(-50%) translateY(0)';
                setTimeout(() => {
                    t.style.transform = 'translateX(-50%) translateY(80px)';
                    setTimeout(() => t.remove(), 300);
                }, 2800);
            });
        }

        // ──────────────────────────────────────────────────────────
        // UTILS
        // ──────────────────────────────────────────────────────────
        function extractKPI(text) {
            if (!text) return '';
            const m = text.match(/^\[([^\]]+)\]/);
            return m ? m[1] : text;
        }

        function extractTargetValue(text) {
            if (!text) return null;
            const m = text.match(/(\d[\d\s,]*)(\s*k)?/i);
            if (!m) return null;
            let v = parseFloat(m[1].replace(/[\s,]/g, ''));
            if (m[2]) v *= 1000;
            return isNaN(v) ? null : v;
        }

        function parseDateString(s) {
            if (!s) return Date.now();
            const p = s.split('/');
            if (p.length === 3) return new Date(+p[2], +p[1]-1, +p[0]).getTime();
            return Date.now();
        }

        function formatDateDDMMYYYY(date) {
            const d = String(date.getDate()).padStart(2, '0');
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const y = date.getFullYear();
            return `${d}/${m}/${y}`;
        }

        function addPeriod(date, freq) {
            const d = new Date(date.getTime());
            if (freq === 'quotidien') d.setDate(d.getDate() + 1);
            else if (freq === 'hebdomadaire') d.setDate(d.getDate() + 7);
            else if (freq === 'mensuel') d.setMonth(d.getMonth() + 1);
            else if (freq === 'trimestriel') d.setMonth(d.getMonth() + 3);
            else if (freq === 'annuel') d.setFullYear(d.getFullYear() + 1);
            else d.setDate(d.getDate() + 7);
            return d;
        }

        function alignStartDate(start, freq, jour) {
            const d = new Date(start.getTime());
            if (freq === 'hebdomadaire' && jour) {
                const days = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
                const target = days.indexOf(jour);
                if (target >= 0) {
                    while (d.getDay() !== target) d.setDate(d.getDate() + 1);
                }
            } else if (freq === 'mensuel' && jour) {
                const day = parseInt(jour, 10);
                if (!isNaN(day)) {
                    d.setDate(Math.min(day, daysInMonth(d.getFullYear(), d.getMonth())));
                    if (d < start) d.setMonth(d.getMonth() + 1);
                }
            } else if (freq === 'trimestriel' && jour) {
                const monthMap = { janvier:0, avril:3, juillet:6, octobre:9 };
                if (monthMap[jour] !== undefined) {
                    d.setMonth(monthMap[jour], d.getDate());
                    if (d < start) d.setFullYear(d.getFullYear() + 1);
                }
            } else if (freq === 'annuel' && jour) {
                const monthMap = { janvier:0, fevrier:1, février:1, mars:2, avril:3, mai:4, juin:5, juillet:6, aout:7, août:7, septembre:8, octobre:9, novembre:10, decembre:11, décembre:11 };
                if (monthMap[jour] !== undefined) {
                    d.setMonth(monthMap[jour], d.getDate());
                    if (d < start) d.setFullYear(d.getFullYear() + 1);
                }
            }
            return d;
        }

        function daysInMonth(year, monthIndex) {
            return new Date(year, monthIndex + 1, 0).getDate();
        }

        function enforceKpiCadence(obj) {
            if (!obj || !obj.frequence) return;
            const freq = obj.frequence;
            const kpiType = obj.kpiType || 'cumulatif';
            if (!obj.measures) obj.measures = [];

            const start = new Date(obj.createdAt || obj.id || Date.now());
            let cursor = alignStartDate(start, freq, obj.jour);
            const today = new Date();
            const existingDates = new Set(obj.measures.map(m => m.date));

            // Generate expected dates up to today
            const expected = [];
            while (cursor <= today) {
                expected.push(new Date(cursor.getTime()));
                cursor = addPeriod(cursor, freq);
            }

            if (expected.length === 0) return;

            // Use last known value for cumulatif
            const sorted = [...obj.measures].sort((a,b) => (a.timestamp || parseDateString(a.date)) - (b.timestamp || parseDateString(b.date)));
            let lastValue = sorted.length ? sorted[sorted.length - 1].value : 0;

            expected.forEach(d => {
                const dateStr = formatDateDDMMYYYY(d);
                if (existingDates.has(dateStr)) return;
                const value = kpiType === 'cadence' ? 0 : lastValue;
                const id = Date.now() + Math.floor(Math.random() * 10000);
                obj.measures.push({ id, date: dateStr, value, timestamp: parseDateString(dateStr), auto: true });
                existingDates.add(dateStr);
                if (kpiType !== 'cadence') lastValue = value;
            });

            obj.measures.sort((a,b) => a.timestamp - b.timestamp);
            saveAllObjectifs();
        }

        function ensureMeasureIds(obj) {
            if (!obj || !obj.measures) return;
            let changed = false;
            obj.measures.forEach(m => {
                if (!m.id) {
                    m.id = Date.now() + Math.floor(Math.random() * 100000);
                    changed = true;
                }
            });
            if (changed) saveAllObjectifs();
        }

        function formatDateJalonCourt(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            if (isNaN(d)) return dateStr;
            const months = ['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Août','Sep','Oct','Nov','Déc'];
            return `${months[d.getMonth()]} ${d.getFullYear()}`;
        }

        function formatDateBadge(temporelText) {
            if (!temporelText) return '';
            const dateRx = /(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})|(\d{4})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})/;
            const m = temporelText.match(dateRx);
            if (m) {
                let d;
                if (m[1]) d = new Date(+m[3], +m[2]-1, +m[1]);
                else       d = new Date(+m[4], +m[5]-1, +m[6]);
                const months = ['jan','fév','mar','avr','mai','juin','juil','août','sep','oct','nov','déc'];
                return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
            }
            return temporelText.length > 30 ? '' : temporelText;
        }

        function formatFrequence(freq, jour) {
            if (!freq) return '';
            const labels = {
                quotidien: 'Quotidien',
                hebdomadaire: 'Hebdomadaire',
                mensuel: 'Mensuel',
                trimestriel: 'Trimestriel',
                annuel: 'Annuel'
            };
            const label = labels[freq] || freq;
            return jour ? `${label} · ${jour}` : label;
        }

        function escHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        // ──────────────────────────────────────────────────────────
        // INIT
        // ──────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', () => {
            loadAllObjectifs();
            renderCarousel();

            // Close modals on overlay click
            document.getElementById('measureModalOverlay').addEventListener('click', function(e) {
                if (e.target === this) closeMeasureModal();
            });
            document.getElementById('editMeasureModalOverlay').addEventListener('click', function(e) {
                if (e.target === this) closeEditMeasureModal();
            });
            document.getElementById('deleteConfirmModal').addEventListener('click', function(e) {
                if (e.target === this) cancelDelete();
            });

            // Escape key
            document.addEventListener('keydown', e => {
                if (e.key === 'Escape') {
                    closeMeasureModal();
                    closeEditMeasureModal();
                    cancelDelete();
                }
            });
        });
    </script>
</body>
